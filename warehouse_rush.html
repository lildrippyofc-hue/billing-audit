<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WAREHOUSE RUSH</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  canvas {
    display: block;
    cursor: pointer;
    image-rendering: pixelated;
  }
  #ui-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }
  /* Shop screen */
  #shop-screen {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10,10,30,0.97);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: 'Courier New', monospace;
  }
  #shop-screen.active { display: flex; }
  #shop-screen h1 {
    font-size: 2.5em;
    color: #f0c040;
    text-shadow: 0 0 20px #f0c04088;
    margin-bottom: 0.2em;
    letter-spacing: 4px;
  }
  #shop-screen .cash-display {
    font-size: 1.4em;
    color: #4fc;
    margin-bottom: 1.5em;
  }
  .shop-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    max-width: 700px;
    width: 90%;
    margin-bottom: 1.5em;
  }
  .shop-item {
    background: #16213e;
    border: 2px solid #334;
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    pointer-events: all;
    position: relative;
  }
  .shop-item:hover:not(.disabled) { border-color: #f0c040; background: #1a2a50; }
  .shop-item.disabled { opacity: 0.45; cursor: not-allowed; }
  .shop-item.owned { border-color: #4fc; }
  .shop-item h3 { font-size: 1em; color: #f0c040; margin-bottom: 6px; }
  .shop-item p { font-size: 0.78em; color: #aaa; margin-bottom: 8px; }
  .shop-item .price { font-size: 0.9em; color: #4fc; font-weight: bold; }
  .shop-item .level-badge {
    position: absolute; top: 8px; right: 10px;
    font-size: 0.7em; color: #888;
  }
  .shop-item.maxed .price { color: #f0c040; }
  #next-day-btn {
    background: #f0c040;
    color: #111;
    border: none;
    padding: 14px 40px;
    font-size: 1.2em;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    pointer-events: all;
    letter-spacing: 2px;
    transition: all 0.15s;
  }
  #next-day-btn:hover { background: #ffe066; transform: scale(1.05); }

  /* Result screen */
  #result-screen {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10,10,30,0.97);
    z-index: 90;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: 'Courier New', monospace;
    text-align: center;
  }
  #result-screen.active { display: flex; }
  #result-screen h1 { font-size: 2.8em; color: #f0c040; letter-spacing: 4px; margin-bottom: 0.4em; }
  .stars-row { font-size: 3em; margin-bottom: 0.5em; }
  .result-stats { font-size: 1em; color: #ccc; line-height: 2; margin-bottom: 1.5em; }
  .result-stats span { color: #4fc; font-weight: bold; }
  .result-buttons { display: flex; gap: 16px; }
  .result-btn {
    background: #16213e;
    border: 2px solid #f0c040;
    color: #f0c040;
    padding: 12px 32px;
    font-size: 1em;
    font-family: 'Courier New', monospace;
    border-radius: 8px;
    cursor: pointer;
    pointer-events: all;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .result-btn:hover { background: #f0c040; color: #111; }
  .result-btn.primary { background: #f0c040; color: #111; }
  .result-btn.primary:hover { background: #ffe066; }

  /* Title screen */
  #title-screen {
    display: flex;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #0d0d1a;
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: 'Courier New', monospace;
    text-align: center;
  }
  #title-screen h1 {
    font-size: 3.5em;
    color: #f0c040;
    text-shadow: 0 0 30px #f0c04099;
    letter-spacing: 6px;
    margin-bottom: 0.1em;
  }
  #title-screen .sub {
    font-size: 1em;
    color: #888;
    letter-spacing: 3px;
    margin-bottom: 2em;
  }
  .title-desc {
    max-width: 500px;
    color: #aaa;
    font-size: 0.85em;
    line-height: 1.8;
    margin-bottom: 2.5em;
  }
  #start-btn {
    background: #f0c040;
    color: #111;
    border: none;
    padding: 16px 52px;
    font-size: 1.3em;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 3px;
    transition: all 0.15s;
    animation: pulse 1.8s ease-in-out infinite;
  }
  #start-btn:hover { background: #ffe066; transform: scale(1.05); }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 10px #f0c04066; }
    50% { box-shadow: 0 0 30px #f0c040cc; }
  }
  .best-score { color: #666; font-size: 0.8em; margin-top: 1.5em; }

  /* Toast messages */
  #toast-container {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 50;
    pointer-events: none;
  }
  .toast {
    background: rgba(20,20,40,0.92);
    border: 1px solid #f0c04066;
    color: #f0c040;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 0.85em;
    font-family: 'Courier New', monospace;
    animation: toastIn 0.3s ease, toastOut 0.4s ease 1.8s forwards;
    white-space: nowrap;
  }
  @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-8px); } }
</style>
</head>
<body>

<canvas id="game"></canvas>

<!-- Toast messages -->
<div id="toast-container"></div>

<!-- Title Screen -->
<div id="title-screen">
  <h1>WAREHOUSE RUSH</h1>
  <div class="sub">DOCK MANAGEMENT CHAOS SIMULATOR</div>
  <div class="title-desc">
    Trucks are pulling up. Workers are waiting. Time is money.<br>
    Click trucks to assign workers and unload before they leave angry.<br>
    Manage 6 dock doors through 3 minutes of escalating chaos.
  </div>
  <button id="start-btn" onclick="startGame()">START SHIFT</button>
  <div class="best-score" id="best-score-display"></div>
</div>

<!-- Result Screen -->
<div id="result-screen">
  <h1 id="result-title">DAY DONE</h1>
  <div class="stars-row" id="result-stars">★★★</div>
  <div class="result-stats" id="result-stats"></div>
  <div class="result-buttons">
    <button class="result-btn" onclick="tryAgain()">TRY AGAIN</button>
    <button class="result-btn primary" id="shop-btn" onclick="openShop()">SHOP & NEXT DAY</button>
  </div>
</div>

<!-- Shop Screen -->
<div id="shop-screen">
  <h1>DOCK UPGRADES</h1>
  <div class="cash-display" id="shop-cash-display">Available: $0</div>
  <div class="shop-grid" id="shop-grid"></div>
  <button id="next-day-btn" onclick="nextDay()">NEXT DAY →</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  const maxW = Math.min(window.innerWidth, 900);
  const maxH = window.innerHeight;
  const aspect = 16/10;
  if (maxW / maxH > aspect) {
    H = maxH; W = Math.round(H * aspect);
  } else {
    W = maxW; H = Math.round(W / aspect);
  }
  canvas.width = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', () => { resize(); });

// Persistent storage
let bestScore = parseInt(localStorage.getItem('wr_best') || '0');
let bankCash = parseInt(localStorage.getItem('wr_cash') || '0');
let savedUpgrades = JSON.parse(localStorage.getItem('wr_upgrades') || '{}');

// Game config
const DOOR_COUNT = 6;
const DAY_DURATION = 180; // seconds
const BASE_UNLOAD_TIME = 2.5; // seconds per pallet

const TRUCK_TYPES = {
  standard:     { color: '#8a8a8a', highlight: '#bbb', label: 'STD',  payMult: 1.0, timeMult: 1.0, unloadMult: 1.0, needsHazmat: false },
  heavy:        { color: '#8B5E3C', highlight: '#c08060', label: 'HVY',  payMult: 1.5, timeMult: 1.2, unloadMult: 1.5, needsHazmat: false },
  refrigerated: { color: '#3a7bd5', highlight: '#6ab0ff', label: 'REF',  payMult: 1.0, timeMult: 0.6, unloadMult: 1.0, needsHazmat: false },
  hazmat:       { color: '#d4a017', highlight: '#f0c040', label: 'HAZ',  payMult: 2.0, timeMult: 0.5, unloadMult: 1.2, needsHazmat: true  },
};

const UPGRADE_DEFS = [
  { id: 'faster_workers', name: 'Faster Workers',     desc: 'Reduce unload time by 15% per level', maxLevel: 4, prices: [150, 250, 400, 600], effect: 'unloadSpeed' },
  { id: 'extra_worker',   name: 'Extra Worker',        desc: 'Process one more truck at a time',    maxLevel: 3, prices: [200, 350, 500],       effect: 'extraWorkers' },
  { id: 'angry_buffer',   name: 'Chill Buffer',        desc: 'Trucks wait 20% longer per level',   maxLevel: 3, prices: [175, 300, 450],       effect: 'angryBuffer' },
  { id: 'hazmat_license', name: 'Hazmat License',      desc: 'Allows handling hazmat trucks',       maxLevel: 1, prices: [300],                 effect: 'hazmat' },
  { id: 'door_upgrade',   name: 'Bay Upgrade',         desc: 'Faster door open = quicker start',   maxLevel: 2, prices: [200, 400],             effect: 'doorSpeed' },
];

// Active game state
let state = {
  phase: 'title', // title | playing | result | shop
  day: 1,
  dayTime: 0,
  cash: 0,
  starsLost: 0,
  trucksProcessed: 0,
  trucksMissed: 0,
  totalPallets: 0,
  doors: [],
  trucks: [],
  workers: [],
  upgrades: {},
  spawnTimer: 0,
  nextSpawnIn: 3,
  lastTimestamp: 0,
  messages: [],
  streakCount: 0,
  particles: [],
  dayNumber: 1,
};

let upgrades = {}; // current session upgrades (copy of savedUpgrades at start)

// ═══════════════════════════════════════════════════════════════
// UPGRADE HELPERS
// ═══════════════════════════════════════════════════════════════
function getUpgradeLevel(id) {
  return (upgrades[id] || 0);
}

function getMaxWorkers() {
  return 2 + getUpgradeLevel('extra_worker');
}

function getUnloadSpeedMult() {
  return Math.pow(0.85, getUpgradeLevel('faster_workers'));
}

function getAngryBufferMult() {
  return 1 + getUpgradeLevel('angry_buffer') * 0.20;
}

function hasHazmat() {
  return getUpgradeLevel('hazmat_license') >= 1;
}

function getDoorSpeedBonus() {
  return getUpgradeLevel('door_upgrade') * 0.15;
}

// ═══════════════════════════════════════════════════════════════
// TRUCK TIMERS (how long before they leave, in seconds)
// ═══════════════════════════════════════════════════════════════
function getTruckMaxTime(truckType, pallets, wave) {
  const base = { standard: 18, heavy: 22, refrigerated: 10, hazmat: 8 };
  const t = base[truckType] * TRUCK_TYPES[truckType].timeMult;
  const wavePenalty = 1 - (wave - 1) * 0.12;
  const buf = getAngryBufferMult();
  return Math.max(5, t * wavePenalty * buf + pallets * 0.5);
}

// ═══════════════════════════════════════════════════════════════
// DOOR LAYOUT
// ═══════════════════════════════════════════════════════════════
function getDoorX(i) {
  const padding = W * 0.08;
  const spacing = (W - padding * 2) / DOOR_COUNT;
  return padding + spacing * i + spacing / 2;
}

function getDockY() { return H * 0.22; }
function getTruckY(doorIdx, slot) { return getDockY() + H * 0.28; }

// ═══════════════════════════════════════════════════════════════
// SPAWN SYSTEM
// ═══════════════════════════════════════════════════════════════
function getWave() {
  if (state.dayTime < 60) return 1;
  if (state.dayTime < 120) return 2;
  return 3;
}

function getSpawnInterval(wave) {
  const base = [null, 6, 4, 2.5];
  return base[wave] * (0.8 + Math.random() * 0.6);
}

function getTypeForWave(wave) {
  const r = Math.random();
  if (wave === 1) {
    if (r < 0.7) return 'standard';
    if (r < 0.9) return 'heavy';
    return 'refrigerated';
  }
  if (wave === 2) {
    if (r < 0.45) return 'standard';
    if (r < 0.7) return 'heavy';
    if (r < 0.88) return 'refrigerated';
    return hasHazmat() ? 'hazmat' : 'standard';
  }
  // wave 3
  if (r < 0.3) return 'standard';
  if (r < 0.55) return 'heavy';
  if (r < 0.72) return 'refrigerated';
  return hasHazmat() ? 'hazmat' : 'heavy';
}

function spawnTruck() {
  // Find empty door
  const occupied = new Set(state.trucks.map(t => t.door));
  const freeDoors = [];
  for (let i = 0; i < DOOR_COUNT; i++) if (!occupied.has(i)) freeDoors.push(i);
  if (freeDoors.length === 0) return;

  const wave = getWave();
  const door = freeDoors[Math.floor(Math.random() * freeDoors.length)];
  const type = getTypeForWave(wave);
  const pallets = Math.floor(Math.random() * 7) + 1 + (type === 'heavy' ? 1 : 0);
  const maxTime = getTruckMaxTime(type, pallets, wave);

  const truck = {
    id: Math.random().toString(36).slice(2),
    door,
    type,
    pallets,
    maxTime,
    timeLeft: maxTime,
    state: 'waiting', // waiting | unloading | done | angry
    unloadProgress: 0,
    unloadTotal: pallets * BASE_UNLOAD_TIME * TRUCK_TYPES[type].unloadMult * getUnloadSpeedMult() * (1 - getDoorSpeedBonus()),
    worker: null,
    arrivalAnim: 0, // 0-1 slide-in
    shakeT: 0,
    flashT: 0,
    earnedCash: 0,
    y: getDockY() + H * 0.28,
  };

  state.trucks.push(truck);
  occupied.add(door);

  if (occupied.size === DOOR_COUNT) {
    toast('Chaos. Pure chaos.');
  } else {
    const doorMsgs = [`Door ${door+1} needs you!`, `Another one 🚚`, `They keep coming`, `Bay ${door+1} incoming!`];
    toast(doorMsgs[Math.floor(Math.random() * doorMsgs.length)]);
  }
}

// ═══════════════════════════════════════════════════════════════
// WORKER ASSIGNMENT
// ═══════════════════════════════════════════════════════════════
function getActiveWorkerCount() {
  return state.trucks.filter(t => t.state === 'unloading').length;
}

function assignWorker(truck) {
  if (truck.state !== 'waiting') return false;
  if (truck.type === 'hazmat' && !hasHazmat()) {
    toast('Need Hazmat License for that one!');
    return false;
  }
  if (getActiveWorkerCount() >= getMaxWorkers()) {
    toast('All workers busy!');
    return false;
  }
  truck.state = 'unloading';
  truck.flashT = 0.4;
  spawnWorkerParticle(truck.door);
  return true;
}

function spawnWorkerParticle(door) {
  const x = getDoorX(door);
  const y = getDockY() + H * 0.05;
  state.particles.push({ x, y, vx: (Math.random()-0.5)*2, vy: 2+Math.random()*2, life: 1, type: 'worker' });
}

function spawnCashParticle(x, y, amount) {
  state.particles.push({ x, y, vx: (Math.random()-0.5)*1.5, vy: -3-Math.random()*2, life: 1, type: 'cash', amount });
}

function spawnAngerParticle(x, y) {
  for (let i = 0; i < 6; i++) {
    const angle = (i/6)*Math.PI*2;
    state.particles.push({ x, y, vx: Math.cos(angle)*3, vy: Math.sin(angle)*3, life: 1, type: 'anger' });
  }
}

// ═══════════════════════════════════════════════════════════════
// TOAST SYSTEM
// ═══════════════════════════════════════════════════════════════
let toastQueue = [];
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 2300);
}

// ═══════════════════════════════════════════════════════════════
// CLICK / TOUCH HANDLING
// ═══════════════════════════════════════════════════════════════
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  let cx, cy;
  if (e.touches) {
    cx = (e.touches[0].clientX - rect.left) * scaleX;
    cy = (e.touches[0].clientY - rect.top) * scaleY;
  } else {
    cx = (e.clientX - rect.left) * scaleX;
    cy = (e.clientY - rect.top) * scaleY;
  }
  return { x: cx, y: cy };
}

function handleClick(e) {
  if (state.phase !== 'playing') return;
  e.preventDefault();
  const pos = getCanvasPos(e);
  // Hit test trucks
  for (const truck of state.trucks) {
    const tx = getDoorX(truck.door);
    const ty = truck.y;
    const tw = W * 0.12;
    const th = H * 0.22;
    if (pos.x > tx - tw/2 && pos.x < tx + tw/2 && pos.y > ty - th*0.1 && pos.y < ty + th*0.9) {
      if (truck.state === 'waiting') {
        const ok = assignWorker(truck);
        if (ok) {
          state.streakCount++;
          if (state.streakCount > 3 && state.streakCount % 3 === 0) {
            toast(Math.random() < 0.5 ? "You're actually doing it" : "Smooth operations");
          }
        }
      }
      return;
    }
  }
}

canvas.addEventListener('click', handleClick);
canvas.addEventListener('touchstart', handleClick, { passive: false });

// ═══════════════════════════════════════════════════════════════
// MAIN GAME LOOP
// ═══════════════════════════════════════════════════════════════
let raf = null;
function gameLoop(ts) {
  if (!state.lastTimestamp) state.lastTimestamp = ts;
  const dt = Math.min((ts - state.lastTimestamp) / 1000, 0.1);
  state.lastTimestamp = ts;

  if (state.phase === 'playing') {
    update(dt);
  }

  draw();
  raf = requestAnimationFrame(gameLoop);
}

function update(dt) {
  state.dayTime += dt;

  // Day over
  if (state.dayTime >= DAY_DURATION) {
    endDay();
    return;
  }

  // Spawn
  state.spawnTimer += dt;
  if (state.spawnTimer >= state.nextSpawnIn) {
    state.spawnTimer = 0;
    state.nextSpawnIn = getSpawnInterval(getWave());
    spawnTruck();
  }

  // Update trucks
  const toRemove = [];
  for (const truck of state.trucks) {
    // Slide in
    if (truck.arrivalAnim < 1) {
      truck.arrivalAnim = Math.min(1, truck.arrivalAnim + dt * 3);
    }

    // Flash timer
    if (truck.flashT > 0) truck.flashT -= dt;
    if (truck.shakeT > 0) truck.shakeT -= dt;

    if (truck.state === 'waiting') {
      truck.timeLeft -= dt;
      if (truck.timeLeft <= 4 && !truck._warnedUrgent) {
        truck._warnedUrgent = true;
        const urgentMsgs = [`THAT TRUCK IS LEAVING!`, `Red alert at door ${truck.door+1}!`, `Move it on bay ${truck.door+1}!`];
        toast(urgentMsgs[Math.floor(Math.random() * urgentMsgs.length)]);
        truck.shakeT = 0.5;
      }
      if (truck.timeLeft <= 0) {
        // Truck leaves angry
        truck.state = 'angry';
        state.starsLost++;
        state.trucksMissed++;
        state.streakCount = 0;
        const angerMsgs = ["Lost one. Classic.", "They're not coming back.", `There goes $50`, "Called it.", "Gone. Bye."];
        toast(angerMsgs[Math.floor(Math.random() * angerMsgs.length)]);
        spawnAngerParticle(getDoorX(truck.door), truck.y);
        truck.leaveTimer = 0.8;
      }
    } else if (truck.state === 'unloading') {
      truck.unloadProgress += dt;
      truck.timeLeft -= dt * 0.3; // still ticks, but slower
      if (truck.unloadProgress >= truck.unloadTotal) {
        // Done!
        truck.state = 'done';
        const pay = Math.round(truck.pallets * 10 * TRUCK_TYPES[truck.type].payMult);
        truck.earnedCash = pay;
        state.cash += pay;
        state.trucksProcessed++;
        state.totalPallets += truck.pallets;
        spawnCashParticle(getDoorX(truck.door), truck.y - H*0.05, pay);
        truck.leaveTimer = 0.7;
      }
    } else if (truck.state === 'done' || truck.state === 'angry') {
      truck.leaveTimer -= dt;
      if (truck.leaveTimer <= 0) toRemove.push(truck.id);
    }
  }
  state.trucks = state.trucks.filter(t => !toRemove.includes(t.id));

  // Update particles
  for (const p of state.particles) {
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vy += (p.type === 'cash' ? -0.05 : 0.15) * dt * 60;
    p.life -= dt * (p.type === 'worker' ? 0.8 : 1.2);
  }
  state.particles = state.particles.filter(p => p.life > 0);
}

// ═══════════════════════════════════════════════════════════════
// DRAWING
// ═══════════════════════════════════════════════════════════════
function draw() {
  ctx.clearRect(0, 0, W, H);

  if (state.phase === 'playing' || state.phase === 'result') {
    drawBackground();
    drawDock();
    drawDoors();
    drawTrucks();
    drawParticles();
    drawHUD();
  } else {
    // Animated background for other screens
    drawBackground();
  }
}

function drawBackground() {
  // Sky / ground gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#1a1a3a');
  sky.addColorStop(0.5, '#0d1a2e');
  sky.addColorStop(1, '#3a3020');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.fillStyle = '#2a2510';
  ctx.fillRect(0, H * 0.65, W, H);

  // Road markings
  ctx.strokeStyle = '#554422';
  ctx.lineWidth = 2;
  ctx.setLineDash([W*0.03, W*0.03]);
  ctx.beginPath();
  ctx.moveTo(0, H * 0.78);
  ctx.lineTo(W, H * 0.78);
  ctx.stroke();
  ctx.setLineDash([]);

  // Stars (static)
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  const starSeed = [0.1,0.3,0.5,0.7,0.9,0.15,0.45,0.65,0.85,0.25,0.55,0.75];
  for (let i = 0; i < 12; i++) {
    const sx = starSeed[i] * W;
    const sy = starSeed[(i+3)%12] * H * 0.3;
    ctx.fillRect(sx, sy, 2, 2);
  }
}

function drawDock() {
  const dockH = H * 0.18;
  const dockY = getDockY() - dockH;

  // Main building
  const bldGrad = ctx.createLinearGradient(0, dockY, 0, dockY + dockH);
  bldGrad.addColorStop(0, '#4a4a5a');
  bldGrad.addColorStop(1, '#2a2a3a');
  ctx.fillStyle = bldGrad;
  ctx.fillRect(0, dockY, W, dockH);

  // Roof edge
  ctx.fillStyle = '#5a5a6a';
  ctx.fillRect(0, dockY, W, 6);

  // Dock platform ledge
  const ledgeGrad = ctx.createLinearGradient(0, getDockY()-8, 0, getDockY()+10);
  ledgeGrad.addColorStop(0, '#666677');
  ledgeGrad.addColorStop(1, '#444455');
  ctx.fillStyle = ledgeGrad;
  ctx.fillRect(0, getDockY() - 10, W, 18);

  // "ECLIPSE ADVANTAGE DISTRIBUTION CENTER" sign
  ctx.fillStyle = '#f0c040';
  ctx.font = `bold ${Math.round(W*0.018)}px Courier New`;
  ctx.textAlign = 'center';
  ctx.fillText('ECLIPSE ADVANTAGE — DISTRIBUTION CENTER', W/2, dockY + dockH * 0.35);

  // WAREHOUSE RUSH sign
  ctx.fillStyle = '#ff6644';
  ctx.font = `bold ${Math.round(W*0.015)}px Courier New`;
  ctx.fillText('⚡ WAREHOUSE RUSH ⚡', W/2, dockY + dockH * 0.6);
}

function drawDoors() {
  const dockY = getDockY();
  const doorW = W * 0.11;
  const doorH = H * 0.12;

  for (let i = 0; i < DOOR_COUNT; i++) {
    const cx = getDoorX(i);
    const dy = dockY - doorH - 2;

    // Door frame
    ctx.fillStyle = '#222233';
    ctx.fillRect(cx - doorW/2 - 4, dy - 4, doorW + 8, doorH + 6);

    // Check if truck is at this door
    const truck = state.trucks.find(t => t.door === i);
    const isOpen = truck && truck.arrivalAnim > 0.3;

    // Door panels
    if (isOpen) {
      // Open door — show inside
      ctx.fillStyle = '#111120';
      ctx.fillRect(cx - doorW/2, dy, doorW, doorH);
      // Interior light
      const grd = ctx.createRadialGradient(cx, dy + doorH*0.5, 2, cx, dy + doorH*0.5, doorW*0.7);
      grd.addColorStop(0, 'rgba(255,200,80,0.25)');
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(cx - doorW/2, dy, doorW, doorH);

      // Door panels slid aside
      ctx.fillStyle = '#3a3a4a';
      ctx.fillRect(cx - doorW/2 - 10, dy, 10, doorH);
      ctx.fillRect(cx + doorW/2, dy, 10, doorH);
    } else {
      // Closed door
      const doorGrad = ctx.createLinearGradient(cx - doorW/2, 0, cx + doorW/2, 0);
      doorGrad.addColorStop(0, '#3a4a5a');
      doorGrad.addColorStop(0.5, '#4a5a6a');
      doorGrad.addColorStop(1, '#3a4a5a');
      ctx.fillStyle = doorGrad;
      ctx.fillRect(cx - doorW/2, dy, doorW, doorH);
      // Horizontal panels
      for (let p = 0; p < 4; p++) {
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(cx - doorW/2, dy + (doorH/4)*p, doorW, 3);
      }
    }

    // Door number
    ctx.fillStyle = '#f0c040';
    ctx.font = `bold ${Math.round(W*0.014)}px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillText(`${i+1}`, cx, dy - 6);

    // Door number plate
    ctx.fillStyle = '#1a1a2a';
    const tw = ctx.measureText(`${i+1}`).width + 8;
    ctx.fillRect(cx - tw/2 - 2, dy - 20, tw + 4, 18);
    ctx.fillStyle = '#f0c040';
    ctx.fillText(`${i+1}`, cx, dy - 6);
  }
}

function drawTrucks() {
  // Sort by door order
  const sorted = [...state.trucks].sort((a,b) => a.door - b.door);
  for (const truck of sorted) drawTruck(truck);
}

function drawTruck(truck) {
  const cfg = TRUCK_TYPES[truck.type];
  const cx = getDoorX(truck.door);
  const baseY = getDockY() + H * 0.28;

  // Slide in from bottom
  const slideY = baseY + (1 - truck.arrivalAnim) * H * 0.4;
  truck.y = slideY;

  // Shake when urgent
  let sx = 0;
  if (truck.shakeT > 0 || (truck.state === 'waiting' && truck.timeLeft < 4)) {
    sx = Math.sin(Date.now() * 0.03) * (truck.shakeT > 0 ? 4 : 2);
  }
  const tx = cx + sx;

  const tw = W * 0.115;
  const th = H * 0.22;

  ctx.save();

  // Anger flash
  if (truck.state === 'angry') {
    ctx.globalAlpha = Math.max(0, truck.leaveTimer / 0.8);
  }

  // Truck cab (top)
  const cabH = th * 0.32;
  const cabGrad = ctx.createLinearGradient(tx - tw/2, slideY - th*0.5, tx + tw/2, slideY - th*0.5);
  cabGrad.addColorStop(0, cfg.color);
  cabGrad.addColorStop(0.5, cfg.highlight);
  cabGrad.addColorStop(1, cfg.color);
  ctx.fillStyle = cabGrad;
  roundRect(tx - tw*0.4, slideY - th*0.5, tw*0.8, cabH, 6);
  ctx.fill();

  // Truck body
  const bodyGrad = ctx.createLinearGradient(tx - tw/2, 0, tx + tw/2, 0);
  bodyGrad.addColorStop(0, cfg.color);
  bodyGrad.addColorStop(0.5, cfg.highlight);
  bodyGrad.addColorStop(1, cfg.color);
  ctx.fillStyle = bodyGrad;
  roundRect(tx - tw/2, slideY - th*0.5 + cabH - 4, tw, th*0.65, 4);
  ctx.fill();

  // Windshield
  ctx.fillStyle = 'rgba(100,180,255,0.5)';
  roundRect(tx - tw*0.3, slideY - th*0.5 + 4, tw*0.6, cabH * 0.55, 3);
  ctx.fill();

  // Type label on body
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(tx - tw*0.38, slideY - th*0.5 + cabH + 4, tw*0.76, 18);
  ctx.fillStyle = cfg.highlight;
  ctx.font = `bold ${Math.round(W*0.012)}px Courier New`;
  ctx.textAlign = 'center';
  ctx.fillText(cfg.label, tx, slideY - th*0.5 + cabH + 16);

  // Pallet count
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(W*0.016)}px Courier New`;
  ctx.fillText(`📦${truck.pallets}`, tx, slideY - th*0.5 + cabH + 40);

  // Wheels
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(tx - tw*0.3, slideY - th*0.5 + cabH + th*0.65 - 4, tw*0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(tx + tw*0.3, slideY - th*0.5 + cabH + th*0.65 - 4, tw*0.1, 0, Math.PI*2);
  ctx.fill();
  // Wheel highlights
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(tx - tw*0.3, slideY - th*0.5 + cabH + th*0.65 - 4, tw*0.06, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(tx + tw*0.3, slideY - th*0.5 + cabH + th*0.65 - 4, tw*0.06, 0, Math.PI*2);
  ctx.fill();

  // Hazmat stripes
  if (truck.type === 'hazmat') {
    ctx.save();
    ctx.globalAlpha = 0.6;
    for (let i = 0; i < 6; i++) {
      ctx.fillStyle = i % 2 === 0 ? '#f0c040' : '#222';
      ctx.fillRect(tx - tw/2 + i * (tw/6), slideY - th*0.5 + cabH - 4, tw/6, 8);
    }
    ctx.restore();
  }

  // --- Timer bar ---
  const barW = tw * 1.0;
  const barH = 8;
  const barY = slideY - th*0.5 - 20;
  const barX = tx - barW/2;

  ctx.fillStyle = '#222';
  roundRect(barX, barY, barW, barH, 3);
  ctx.fill();

  const pct = Math.max(0, truck.timeLeft / truck.maxTime);
  const barColor = pct > 0.5 ? '#4fc' : pct > 0.25 ? '#f0c040' : '#ff4444';
  ctx.fillStyle = barColor;
  if (pct > 0) {
    roundRect(barX + 1, barY + 1, (barW - 2) * pct, barH - 2, 2);
    ctx.fill();
  }

  // Urgent pulsing glow
  if (pct < 0.25 && truck.state === 'waiting') {
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 10 + Math.sin(Date.now() * 0.008) * 8;
    ctx.fillStyle = 'rgba(255,68,68,0.15)';
    ctx.fillRect(tx - tw/2 - 4, slideY - th*0.5 - 4, tw + 8, th*0.72 + 8);
    ctx.shadowBlur = 0;
  }

  // --- Unload progress bar ---
  if (truck.state === 'unloading') {
    const upct = truck.unloadProgress / truck.unloadTotal;
    const uy = barY - 12;
    ctx.fillStyle = '#333';
    roundRect(barX, uy, barW, barH, 3);
    ctx.fill();
    ctx.fillStyle = '#4fc';
    roundRect(barX + 1, uy + 1, (barW - 2) * upct, barH - 2, 2);
    ctx.fill();
    // Worker icon
    ctx.fillStyle = '#f0c040';
    ctx.font = `${Math.round(W * 0.022)}px serif`;
    ctx.fillText('👷', tx - tw/2 - 6, uy + barH + 2);
  }

  // Click hint for waiting trucks
  if (truck.state === 'waiting' && truck.arrivalAnim >= 1) {
    const pulse = 0.6 + 0.4 * Math.sin(Date.now() * 0.005);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#f0c040';
    ctx.font = `bold ${Math.round(W*0.011)}px Courier New`;
    ctx.fillText('[ CLICK ]', tx, slideY + th*0.18);
    ctx.globalAlpha = 1;
  }

  // Angry mark
  if (truck.state === 'angry') {
    ctx.fillStyle = '#ff4444';
    ctx.font = `${Math.round(W*0.04)}px serif`;
    ctx.fillText('💢', tx, slideY - th*0.5 - 25);
  }

  // Done check
  if (truck.state === 'done') {
    ctx.fillStyle = '#4fc';
    ctx.font = `${Math.round(W*0.035)}px serif`;
    ctx.fillText('✓', tx, slideY - th*0.5 - 20);
  }

  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawParticles() {
  for (const p of state.particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    if (p.type === 'cash') {
      ctx.fillStyle = '#4fc';
      ctx.font = `bold ${Math.round(W*0.016)}px Courier New`;
      ctx.textAlign = 'center';
      ctx.fillText(`+$${p.amount}`, p.x, p.y);
    } else if (p.type === 'worker') {
      ctx.fillStyle = '#f0c040';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
      ctx.fill();
    } else if (p.type === 'anger') {
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawHUD() {
  // HUD bar at top
  ctx.fillStyle = 'rgba(10,10,20,0.85)';
  ctx.fillRect(0, 0, W, H * 0.08);

  const hh = H * 0.04;
  const hy = H * 0.055;

  // Cash
  ctx.fillStyle = '#4fc';
  ctx.font = `bold ${Math.round(W*0.025)}px Courier New`;
  ctx.textAlign = 'left';
  ctx.fillText(`$${state.cash}`, W*0.02, hy);

  // Day
  ctx.fillStyle = '#888';
  ctx.font = `${Math.round(W*0.018)}px Courier New`;
  ctx.textAlign = 'left';
  ctx.fillText(`DAY ${state.dayNumber}`, W*0.02, hy - H*0.026);

  // Timer
  const timeLeft = Math.max(0, DAY_DURATION - state.dayTime);
  const mins = Math.floor(timeLeft / 60);
  const secs = Math.floor(timeLeft % 60);
  const timeStr = `${mins}:${secs.toString().padStart(2,'0')}`;
  const wave = getWave();
  const waveColors = ['', '#4fc', '#f0c040', '#ff6644'];
  ctx.fillStyle = timeLeft < 30 ? '#ff4444' : waveColors[wave];
  ctx.font = `bold ${Math.round(W*0.035)}px Courier New`;
  ctx.textAlign = 'center';
  ctx.fillText(timeStr, W/2, hy);

  // Wave indicator
  ctx.fillStyle = waveColors[wave];
  ctx.font = `${Math.round(W*0.015)}px Courier New`;
  ctx.fillText(`WAVE ${wave}`, W/2, hy - H*0.026);

  // Stars
  const starCount = Math.max(0, 3 - state.starsLost);
  ctx.textAlign = 'right';
  ctx.font = `${Math.round(W*0.028)}px serif`;
  const stars = '★'.repeat(starCount) + '☆'.repeat(3 - starCount);
  ctx.fillStyle = '#f0c040';
  ctx.fillText(stars, W*0.98, hy);

  // Workers
  const activeW = getActiveWorkerCount();
  const maxW = getMaxWorkers();
  ctx.fillStyle = '#888';
  ctx.font = `${Math.round(W*0.015)}px Courier New`;
  ctx.fillText(`Workers: ${activeW}/${maxW}`, W*0.98, hy - H*0.026);

  // Wave progress bar
  const waveStart = (wave-1) * 60;
  const waveEnd = wave * 60;
  const wavePct = (state.dayTime - waveStart) / 60;
  const pbW = W * 0.2;
  const pbX = W/2 - pbW/2;
  const pbY = H * 0.074;
  ctx.fillStyle = '#222';
  ctx.fillRect(pbX, pbY, pbW, 4);
  ctx.fillStyle = waveColors[wave];
  ctx.fillRect(pbX, pbY, pbW * Math.min(1, wavePct), 4);

  // "Day done" flash if near end
  if (timeLeft < 10 && timeLeft > 0) {
    ctx.globalAlpha = 0.3 + 0.3 * Math.sin(Date.now() * 0.01);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
}

// ═══════════════════════════════════════════════════════════════
// SCREEN MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  upgrades = { ...savedUpgrades };
  initDay();
}

function initDay() {
  state = {
    phase: 'playing',
    day: state.dayNumber || 1,
    dayTime: 0,
    cash: 0,
    starsLost: 0,
    trucksProcessed: 0,
    trucksMissed: 0,
    totalPallets: 0,
    doors: [],
    trucks: [],
    workers: [],
    spawnTimer: 0,
    nextSpawnIn: 3,
    lastTimestamp: 0,
    messages: [],
    streakCount: 0,
    particles: [],
    dayNumber: state.dayNumber || 1,
  };
  state.phase = 'playing';
}

function endDay() {
  state.phase = 'result';

  // Save cash
  bankCash += state.cash;
  localStorage.setItem('wr_cash', bankCash.toString());

  // Save best
  if (state.cash > bestScore) {
    bestScore = state.cash;
    localStorage.setItem('wr_best', bestScore.toString());
  }

  // Stars
  const starsLeft = Math.max(0, 3 - state.starsLost);
  const starDisplay = '★'.repeat(starsLeft) + '☆'.repeat(3 - starsLeft);

  document.getElementById('result-stars').textContent = starDisplay;
  document.getElementById('result-title').textContent =
    starsLeft === 3 ? '🏆 FLAWLESS SHIFT' : starsLeft === 2 ? 'SOLID WORK' : starsLeft === 1 ? 'ROUGH DAY' : 'DISASTER';

  document.getElementById('result-stats').innerHTML = `
    Day Cash Earned: <span>$${state.cash}</span><br>
    Bank Total: <span>$${bankCash}</span><br>
    Trucks Processed: <span>${state.trucksProcessed}</span><br>
    Trucks Missed: <span>${state.trucksMissed}</span><br>
    Pallets Unloaded: <span>${state.totalPallets}</span><br>
    Best Day: <span>$${bestScore}</span>
  `;

  document.getElementById('result-screen').classList.add('active');
}

function tryAgain() {
  document.getElementById('result-screen').classList.remove('active');
  state.dayNumber = state.dayNumber; // keep day number
  initDay();
}

function openShop() {
  document.getElementById('result-screen').classList.remove('active');
  renderShop();
  document.getElementById('shop-screen').classList.add('active');
}

function nextDay() {
  document.getElementById('shop-screen').classList.remove('active');
  state.dayNumber = (state.dayNumber || 1) + 1;
  upgrades = { ...savedUpgrades };
  initDay();
}

function renderShop() {
  document.getElementById('shop-cash-display').textContent = `Available: $${bankCash}`;
  const grid = document.getElementById('shop-grid');
  grid.innerHTML = '';

  for (const def of UPGRADE_DEFS) {
    const level = savedUpgrades[def.id] || 0;
    const maxed = level >= def.maxLevel;
    const price = maxed ? null : def.prices[level];
    const canAfford = price !== null && bankCash >= price;

    const el = document.createElement('div');
    el.className = `shop-item${maxed ? ' maxed owned' : canAfford ? '' : ' disabled'}`;
    el.innerHTML = `
      <div class="level-badge">${maxed ? 'MAX' : `LV${level}`}</div>
      <h3>${def.name}</h3>
      <p>${def.desc}</p>
      <div class="price">${maxed ? '✓ OWNED' : `$${price}`}</div>
    `;
    if (!maxed && canAfford) {
      el.onclick = () => buyUpgrade(def.id, price);
    }
    grid.appendChild(el);
  }
}

function buyUpgrade(id, price) {
  if (bankCash < price) return;
  bankCash -= price;
  savedUpgrades[id] = (savedUpgrades[id] || 0) + 1;
  localStorage.setItem('wr_cash', bankCash.toString());
  localStorage.setItem('wr_upgrades', JSON.stringify(savedUpgrades));
  renderShop();
  toast(`Upgrade purchased!`);
}

// ═══════════════════════════════════════════════════════════════
// TITLE SCREEN INIT
// ═══════════════════════════════════════════════════════════════
function initTitleScreen() {
  const bestEl = document.getElementById('best-score-display');
  bestEl.textContent = bestScore > 0 ? `Best shift: $${bestScore}` : '';
}

initTitleScreen();

// Start render loop immediately (for animated background on title)
state.phase = 'title';
state.dayNumber = 1;
requestAnimationFrame(gameLoop);
</script>
