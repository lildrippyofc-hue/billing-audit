let windForce = 0, windTimer = 0;

// ─── PARTICLES ────────────────────────────────────────────────────────────────
let particles = [];
function spawnParticles(x, y, color, count, speedMult) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random()-0.5)*4*speedMult, vy: (Math.random()-0.5)*4*speedMult - 2,
      life: 1.0, decay: 0.02+Math.random()*0.04, r: 3+Math.random()*4, color
    });
  }
}
function spawnFlame(x, y) {
  const colors = ['#ff6600','#ff8800','#ffaa00','#ffcc00'];
  particles.push({
    x: x + (Math.random()-0.5)*8, y: y + Math.random()*8,
    vx: (Math.random()-0.5)*1.5, vy: 1.5+Math.random()*2,
    life: 1.0, decay: 0.07+Math.random()*0.07, r: 2+Math.random()*4,
    color: colors[Math.floor(Math.random()*colors.length)]
  });
}

// ─── KEYS ─────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'Escape') { if (G.state === 'playing') G.state = 'paused'; else if (G.state === 'paused') G.state = 'playing'; }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── TOUCH ────────────────────────────────────────────────────────────────────
let touchJet = false, touchLeft = false, touchRight = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.touches) {
    const r = canvas.getBoundingClientRect();
    const sx = (t.clientX - r.left) * W / r.width;
    const sy = (t.clientY - r.top) * H / r.height;
    if (G.state !== 'playing') { handleClick(sx, sy); return; }
    if (sx < W/3) touchLeft = true;
    else if (sx > W*2/3) touchRight = true;
    else touchJet = true;
  }
}, {passive:false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchLeft = false; touchRight = false; touchJet = false;
}, {passive:false});
canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const sx = (e.clientX - r.left) * W / r.width;
  const sy = (e.clientY - r.top) * H / r.height;
  handleClick(sx, sy);
});

// ─── COLLISION ────────────────────────────────────────────────────────────────
function rectOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// ─── LOAD LEVEL ───────────────────────────────────────────────────────────────
function loadLevel(num) {
  const def = LEVEL_DEFS[num-1];
  level.def = def;

  // Deep copy platforms with moving state
  level.platforms = def.platforms.map(p => ({
    ...p,
    ox: p.x, oy: p.y,
    t: Math.random()*Math.PI*2
  }));

  // Deep copy enemies with state
  level.enemies = def.enemies.map(e => ({
    ...e,
    ox: e.x, oy: e.y,
    dir: 1, t: Math.random()*Math.PI*2,
    laserOn: false, laserTimer: Math.random()*e.period||0,
    alive: true
  }));

  // Deep copy coins
  level.coins = def.coins.map(c => ({...c, collected: false, t: Math.random()*Math.PI*2}));

  // Fuel canisters
  level.fuel = def.fuel.map(f => ({...f, collected: false}));

  // Gates
  level.gates = (def.gates || []).map(g => ({...g, openTime: g.open, t: Math.random()*g.period, open: false}));

  // Spotlights
  level.spotlights = (def.spotlights || []).map(s => ({...s, a: s.angle}));

  // Exit
  level.exit = {...def.exit, t: 0};

  // Apply upgrades
  const ft = G.upgrades.fuelTank || 0;
  P.maxFuel = 1.0 + ft * 0.25;
  P.fuel = P.maxFuel;
  G.shieldActive = (G.upgrades.shield || 0) >= 1;
  G.magnetActive = (G.upgrades.coinMagnet || 0) >= 1;

  P.reset(380);
  CAM.x = 0;
  G.levelCoins = 0;
  G.levelTime = 0;
  G.lowFuelWarned = false;
  G.sarcasm = '';
  G.sarcasmTimer = 0;
  windForce = 0; windTimer = 0;
  particles = [];
}

// ─── SARCASM ─────────────────────────────────────────────────────────────────
const SARCS = {
  lowFuel: ["Uh oh, running low.", "Fuel canister somewhere?", "Gliding now. Not ideal."],
  drone: ["The drone wins this round.", "Never saw it coming. Bold."],
  zapper: ["Touched the zapper. Bold.", "The electricity said no."],
  guard: ["The rent-a-cop got you.", "Security 1, James 0."],
  laser: ["Lasers are bad for the skin.", "Should've ducked."],
  death: ["Back to start. Classic.", "James is down.", "Respawning in 3... 2..."],
  fast: ["Speed run? Impressive.", "In and out.", "Was that even a level?"],
};
function showSarcasm(cat) {
  const arr = SARCS[cat] || SARCS.death;
  G.sarcasm = arr[Math.floor(Math.random()*arr.length)];
  G.sarcasmTimer = 180;
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
const GRAVITY = 0.45;
const BASE_SPEED = 3.2;
const BASE_JETPOWER = 0.55;

function update(dt) {
  if (G.state !== 'playing') return;
  G.levelTime += dt / 60;

  const def = level.def;
  const speedMult = 1 + (G.upgrades.speedBoots||0) * 0.18;
  const jetMult   = 1 + (G.upgrades.jetpackPow||0) * 0.25;
  const moveSpeed = BASE_SPEED * speedMult;

  // Wind
  if (def.wind) {
    windTimer--;
    if (windTimer <= 0) {
      windForce = (Math.random()-0.5)*1.4;
      windTimer = 120 + Math.random()*180;
    }
  }

  // Input
  const left  = keys['ArrowLeft']  || keys['KeyA'] || touchLeft;
  const right = keys['ArrowRight'] || keys['KeyD'] || touchRight;
  const jet   = keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || touchJet;

  const icy = P.onIcy;
  const friction = icy ? 0.96 : 0.75;

  if (left)  P.vx -= moveSpeed * (icy ? 0.3 : 1);
  if (right) P.vx += moveSpeed * (icy ? 0.3 : 1);
  if (!left && !right) P.vx *= friction;
  P.vx = Math.max(-12, Math.min(12, P.vx));

  P.jetpackOn = false;
  if (jet && P.fuel > 0) {
    P.vy -= BASE_JETPOWER * jetMult;
    P.vy = Math.max(P.vy, -9);
    P.fuel = Math.max(0, P.fuel - 0.008);
    P.jetpackOn = true;
    spawnFlame(P.x + P.w/2, P.y + P.h);
    spawnFlame(P.x + P.w/2, P.y + P.h);
  }

  if (def.wind) P.vx += windForce;

  P.vy = Math.min(P.vy + GRAVITY, 14);
  P.x += P.vx;
  P.y += P.vy;

  // Fuel regen (slow, only when on ground)
  if (P.onGround && !P.jetpackOn) P.fuel = Math.min(P.maxFuel, P.fuel + 0.002);

  // Low fuel sarcasm
  if (!G.lowFuelWarned && P.fuel < 0.18) {
    showSarcasm('lowFuel');
    G.lowFuelWarned = true;
  }
  if (P.fuel > 0.3) G.lowFuelWarned = false;

  // Clamp left
  if (P.x < 0) { P.x = 0; P.vx = 0; }
  // Clamp right
  if (P.x + P.w > def.width) { P.x = def.width - P.w; P.vx = 0; }

  // Platform collision
  P.onGround = false;
  P.onIcy = false;
  for (const plat of level.platforms) {
    // Update moving platforms
    plat.t += 0.02;
    if (plat.moving) {
      if (plat.moveX) { plat.x = plat.ox + Math.sin(plat.t * plat.speed) * plat.moveX/2; }
      if (plat.moveY) { plat.y = plat.oy + Math.sin(plat.t * plat.speed) * plat.moveY/2; }
    }
    if (rectOverlap(P.x, P.y, P.w, P.h, plat.x, plat.y, plat.w, plat.h)) {
      // resolve from which side
      const overlapTop = (P.y + P.h) - plat.y;
      const overlapBot = (plat.y + plat.h) - P.y;
      const overlapLeft = (P.x + P.w) - plat.x;
      const overlapRight = (plat.x + plat.w) - P.x;
      const minOv = Math.min(overlapTop, overlapBot, overlapLeft, overlapRight);
      if (minOv === overlapTop && P.vy >= 0) {
        P.y = plat.y - P.h;
        P.vy = 0;
        P.onGround = true;
        if (plat.icy) P.onIcy = true;
      } else if (minOv === overlapBot && P.vy < 0) {
        P.y = plat.y + plat.h;
        P.vy = 0;
      } else if (minOv === overlapLeft) {
        P.x = plat.x - P.w;
        P.vx = 0;
      } else if (minOv === overlapRight) {
        P.x = plat.x + plat.w;
        P.vx = 0;
      }
    }
  }

  // Ground (bottom of level)
  if (P.y + P.h >= H + 20) {
    playerDie('death');
    return;
  }

  // Update enemies
  for (const e of level.enemies) {
    if (!e.alive) continue;
    e.t += 0.02;
    if (e.type === 'guard') {
      const spd = e.speed || 1.2;
      e.x += e.dir * spd;
      if (Math.abs(e.x - e.ox) > (e.patrol||100)) e.dir *= -1;
    } else if (e.type === 'drone') {
      const spd = (e.speed || 1.0) * 0.8;
      e.x = e.ox + Math.sin(e.t * spd) * (e.patrolX||100);
      e.y = e.oy + Math.sin(e.t * spd * 1.3) * (e.patrolY||40);
    } else if (e.type === 'laser') {
      e.laserTimer = (e.laserTimer || 0) + 16;
      if (e.laserTimer >= e.period) e.laserTimer = 0;
      e.laserOn = e.laserTimer < e.period * 0.35;
    }
    // Check collision with player
    if (P.invincible <= 0) {
      let hit = false;
      if (e.type === 'laser' && e.laserOn) {
        // laser beam collision
        if (e.dir === 'h') {
          // horizontal beam across whole level height from e.y
          if (P.y < e.y + 8 && P.y + P.h > e.y && P.x < def.width && P.x > 0) hit = true;
        } else {
          if (P.x < e.x + 8 && P.x + P.w > e.x && P.y < H && P.y > 0) hit = true;
        }
      } else if (e.type !== 'laser') {
        const ew = e.type === 'zapper' ? 22 : (e.type === 'drone' ? 24 : 22);
        const eh = e.type === 'zapper' ? 30 : (e.type === 'drone' ? 20 : 30);
        if (rectOverlap(P.x+4, P.y+4, P.w-8, P.h-8, e.x-ew/2, e.y-eh/2, ew, eh)) hit = true;
      }
      if (hit) {
        const cats = {guard:'guard',drone:'drone',zapper:'zapper',laser:'laser'};
        playerDie(cats[e.type] || 'death');
        return;
      }
    }
  }

  // Gates
  for (const g of level.gates) {
    g.t = (g.t || 0) + 16;
    if (g.t > g.period) g.t = 0;
    g.open = g.t < (g.openTime || 1000);
    if (!g.open && P.invincible <= 0) {
      if (rectOverlap(P.x, P.y, P.w, P.h, g.x, g.y, 16, g.h)) {
        playerDie('laser'); return;
      }
    }
  }

  // Spotlights
  for (const s of level.spotlights) {
    s.a += s.speed * 0.01;
    if (s.a > s.angle + s.sweep/2) s.a = s.angle - s.sweep/2;
    // spotlight detection doesn't kill, just shows "spotted" message
  }

  // Coins
  const magnetRange = G.magnetActive ? 120 : 30;
  for (const c of level.coins) {
    if (c.collected) continue;
    c.t += 0.05;
    const dx = (P.x + P.w/2) - c.x;
    const dy = (P.y + P.h/2) - c.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (G.magnetActive && dist < magnetRange) {
      c.x += dx * 0.08;
      c.y += dy * 0.08;
    }
    if (dist < 20) {
      c.collected = true;
      G.levelCoins++;
      G.totalCoins++;
      spawnParticles(c.x, c.y, '#ffd700', 6, 1.5);
    }
  }

  // Fuel canisters
  for (const f of level.fuel) {
    if (f.collected) continue;
    if (rectOverlap(P.x, P.y, P.w, P.h, f.x-14, f.y-20, 28, 40)) {
      f.collected = true;
      P.fuel = Math.min(P.maxFuel, P.fuel + 0.6);
      spawnParticles(f.x, f.y, '#00ff88', 10, 2);
      G.lowFuelWarned = false;
    }
  }

  // Exit
  level.exit.t += 0.05;
  if (rectOverlap(P.x, P.y, P.w, P.h, level.exit.x-20, level.exit.y-50, 40, 60)) {
    levelComplete();
    return;
  }

  // Update particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (P.invincible > 0) P.invincible--;

  // Camera
  CAM.x = Math.max(0, Math.min(def.width - W, P.x - W*0.35));
  CAM.y = 0;

  if (G.sarcasmTimer > 0) G.sarcasmTimer--;

  // Sarcasm timers
}

function playerDie(cat) {
  spawnParticles(P.x+P.w/2, P.y+P.h/2, '#ff4444', 20, 2.5);
  if (G.shieldActive) {
    G.shieldActive = false;
    P.invincible = 120;
    showSarcasm('fast');
    return;
  }
  G.lives--;
  showSarcasm(cat);
  if (G.lives <= 0) {
    setTimeout(() => { G.state = 'gameover'; }, 600);
  } else {
    P.invincible = 120;
    P.reset();
    CAM.x = 0;
    P.fuel = P.maxFuel;
    // re-show coins but don't re-add them
    G.totalCoins -= G.levelCoins;
    G.levelCoins = 0;
  }
}

function levelComplete() {
  const time = G.levelTime;
  let stars = 1;
  const total = level.coins.length;
  const pct = G.levelCoins / total;
  if (pct >= 0.9 && time < 60) stars = 3;
  else if (pct >= 0.6 || time < 90) stars = 2;
  const prev = G.stars[G.currentLevel] || 0;
  G.stars[G.currentLevel] = Math.max(prev, stars);
  if (G.currentLevel >= G.highestLevel) G.highestLevel = Math.min(10, G.currentLevel + 1);
  save();
  if (time < 45) showSarcasm('fast');
  G.state = 'levelcomplete';
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  switch (G.state) {
    case 'menu':        drawMenu(); break;
    case 'levelselect': drawLevelSelect(); break;
    case 'shop':        drawShop(); break;
    case 'playing':     drawGame(); break;
    case 'paused':      drawGame(); drawPause(); break;
    case 'levelcomplete': drawLevelComplete(); break;
    case 'gameover':    drawGameOver(); break;
  }
}

// ─── BACKGROUND PARALLAX ─────────────────────────────────────────────────────
function drawBackground(def) {
  // Sky gradient
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, def.bg1);
  grd.addColorStop(1, def.bg2);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Parallax layer 1 (slow) — big shapes
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = '#ffffff';
  const off1 = CAM.x * 0.2;
  for (let i = 0; i < 20; i++) {
    const bx = ((i * 380 - off1) % (W+400)) - 100;
    const by = 60 + (i*47)%200;
    const bw = 60 + (i*31)%120;
    const bh = 20 + (i*17)%60;
    drawRect(bx, by, bw, bh, '#334');
  }
  // Parallax layer 2 (faster)
  const off2 = CAM.x * 0.5;
  for (let i = 0; i < 15; i++) {
    const bx = ((i * 240 - off2) % (W+300)) - 80;
    const by = 150 + (i*61)%200;
    ctx.fillStyle = '#556';
    ctx.globalAlpha = 0.08;
    ctx.fillRect(bx, by, 20+(i*23)%60, 80+(i*19)%80);
  }
  ctx.globalAlpha = 1;
}

function drawRect(x, y, w, h, color, alpha) {
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x - CAM.x), Math.round(y - CAM.y), Math.round(w), Math.round(h));
  if (alpha !== undefined) ctx.globalAlpha = 1;
}

function worldX(x) { return Math.round(x - CAM.x); }
function worldY(y) { return Math.round(y - CAM.y); }

function drawGame() {
  const def = level.def;
  if (!def) return;

  drawBackground(def);

  // Dark overlay for night levels
  if (def.dark) {
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, W, H);
    // Spotlights
    for (const s of level.spotlights) {
      const sx = worldX(s.x);
      const grad = ctx.createRadialGradient(sx, 0, 0, sx, 0, 500);
      grad.addColorStop(0, 'rgba(255,255,200,0.22)');
      grad.addColorStop(1, 'rgba(255,255,200,0)');
      ctx.save();
      ctx.translate(sx, 0);
      ctx.rotate(s.a);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, 500, -0.25, 0.25);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    // Always show a small area around player
    const px = worldX(P.x+P.w/2), py = worldY(P.y+P.h/2);
    const lg = ctx.createRadialGradient(px, py, 0, px, py, 120);
    lg.addColorStop(0, 'rgba(0,0,0,0)');
    lg.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = lg;
    ctx.fillRect(0,0,W,H);
  }

  // Ground
  ctx.fillStyle = def.groundColor;
  ctx.fillRect(0, H - 10, W, 10);

  // Platforms
  for (const plat of level.platforms) {
    const px = worldX(plat.x), py = worldY(plat.y);
    if (px > W+10 || px+plat.w < -10) continue;
    ctx.fillStyle = plat.icy ? '#7ad4f5' : def.platformColor;
    ctx.fillRect(px, py, plat.w, plat.h);
    // Edge highlight
    ctx.fillStyle = plat.icy ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)';
    ctx.fillRect(px, py, plat.w, 3);
    if (plat.icy) {
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      for (let ix = px+4; ix < px+plat.w-8; ix += 16) ctx.fillRect(ix, py+6, 8, 3);
    }
  }

  // Gates
  for (const g of level.gates) {
    if (g.open) continue;
    const gx = worldX(g.x);
    ctx.fillStyle = '#ff0000';
    ctx.globalAlpha = 0.9;
    ctx.fillRect(gx, worldY(g.y), 16, g.h);
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#ff6600';
    ctx.lineWidth = 1;
    ctx.strokeRect(gx, worldY(g.y), 16, g.h);
  }

  // Coins
  for (const c of level.coins) {
    if (c.collected) continue;
    const cx = worldX(c.x), cy = worldY(c.y + Math.sin(c.t)*4);
    if (cx < -20 || cx > W+20) continue;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(cx, cy, 7, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#ffaa00';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#fff8';
    ctx.beginPath();
    ctx.arc(cx-2, cy-2, 2, 0, Math.PI*2);
    ctx.fill();
  }

  // Fuel canisters
  for (const f of level.fuel) {
    if (f.collected) continue;
    const fx = worldX(f.x), fy = worldY(f.y);
    if (fx < -30 || fx > W+30) continue;
    ctx.fillStyle = '#00cc66';
    ctx.fillRect(fx-10, fy-22, 20, 32);
    ctx.fillStyle = '#00ff88';
    ctx.fillRect(fx-6, fy-26, 12, 8);
    ctx.fillStyle = '#fff';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('⛽', fx, fy-6);
  }

  // Enemies
  for (const e of level.enemies) {
    if (!e.alive) continue;
    const ex = worldX(e.x), ey = worldY(e.y);
    if (ex < -80 || ex > W+80) {
      // still handle laser off-screen
      if (e.type !== 'laser') continue;
    }
    if (e.type === 'zapper') {
      // Zapper: yellow electrified box
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(ex-11, ey-15, 22, 30);
      ctx.fillStyle = '#ff4400';
      ctx.fillRect(ex-7, ey-20, 14, 6);
      // Sparks
      if (Math.random() < 0.4) {
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(ex + (Math.random()-0.5)*10, ey-15);
        ctx.lineTo(ex + (Math.random()-0.5)*16, ey-25);
        ctx.stroke();
      }
    } else if (e.type === 'drone') {
      // Drone: dark blue hexagon-ish
      ctx.fillStyle = '#2244aa';
      ctx.fillRect(ex-12, ey-8, 24, 16);
      ctx.fillStyle = '#4466dd';
      ctx.fillRect(ex-8, ey-12, 16, 6);
      ctx.fillRect(ex-8, ey+6, 16, 6);
      // Propellers
      ctx.fillStyle = '#88aaff';
      ctx.fillRect(ex-18, ey-14, 10, 3);
      ctx.fillRect(ex+8, ey-14, 10, 3);
      ctx.fillRect(ex-18, ey+11, 10, 3);
      ctx.fillRect(ex+8, ey+11, 10, 3);
      // Red eye
      ctx.fillStyle = '#ff2222';
      ctx.beginPath();
      ctx.arc(ex, ey, 4, 0, Math.PI*2);
      ctx.fill();
    } else if (e.type === 'guard') {
      const gdir = e.dir || 1;
      ctx.fillStyle = '#334455';
      ctx.fillRect(ex-11*gdir, ey-28, 22, 34);
      ctx.fillStyle = '#556677';
      ctx.fillRect(ex-9*gdir, ey-36, 18, 12);
      // Eyes
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(ex+(gdir>0?3:-8), ey-30, 5, 5);
      // Weapon
      ctx.fillStyle = '#222';
      ctx.fillRect(ex+(gdir>0?10:-14), ey-22, 14*gdir, 4);
    } else if (e.type === 'laser') {
      // Turret body
      ctx.fillStyle = '#8b0000';
      ctx.fillRect(ex-12, ey-12, 24, 24);
      ctx.fillStyle = '#cc0000';
      ctx.fillRect(ex-8, ey-8, 16, 16);
      // Barrel
      if (e.dir === 'h') {
        ctx.fillStyle = '#ff2222';
        ctx.fillRect(ex+8, ey-3, 30, 6);
      } else {
        ctx.fillStyle = '#ff2222';
        ctx.fillRect(ex-3, ey-38, 6, 30);
      }
      // Laser beam
      if (e.laserOn) {
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = '#ff0000';
        if (e.dir === 'h') {
          ctx.fillRect(ex+12, ey-2, W, 4);
        } else {
          ctx.fillRect(ex-2, 0, 4, ey-12);
        }
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#ff8888';
        if (e.dir === 'h') {
          ctx.fillRect(ex+12, ey-6, W, 12);
        } else {
          ctx.fillRect(ex-6, 0, 12, ey-12);
        }
        ctx.globalAlpha = 1;
      }
    }
  }

  // Exit door
  const ex2 = worldX(level.exit.x), ey2 = worldY(level.exit.y);
  const doorGlow = 0.6 + Math.sin(level.exit.t) * 0.4;
  ctx.globalAlpha = doorGlow;
  ctx.fillStyle = '#00ff88';
  ctx.fillRect(ex2-22, ey2-58, 44, 64);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#004422';
  ctx.fillRect(ex2-20, ey2-56, 40, 60);
  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('EXIT', ex2, ey2-28);
  ctx.fillStyle = '#00ff88';
  ctx.beginPath();
  ctx.arc(ex2+10, ey2-30, 3, 0, Math.PI*2);
  ctx.fill();
  level.exit.t += 0.06;

  // Player
  drawPlayer();

  // Particles
  for (const p of particles) {
    const px2 = worldX(p.x), py2 = worldY(p.y);
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(px2 - p.r/2, py2 - p.r/2, p.r, p.r);
  }
  ctx.globalAlpha = 1;

  // HUD
  drawHUD();

  // Sarcasm
  if (G.sarcasmTimer > 0) {
    ctx.globalAlpha = Math.min(1, G.sarcasmTimer / 30);
    ctx.fillStyle = '#000a';
    ctx.fillRect(W/2-160, H-80, 320, 36);
    ctx.fillStyle = '#ffdd44';
    ctx.font = '14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(G.sarcasm, W/2, H-56);
    ctx.globalAlpha = 1;
  }
}

function drawPlayer() {
  const px = worldX(P.x), py = worldY(P.y);
  const flash = P.invincible > 0 && Math.floor(P.invincible/4)%2 === 0;
  if (flash) return;

  // Jetpack
  ctx.fillStyle = '#334455';
  ctx.fillRect(px+P.w-6, py+6, 10, 22);
  ctx.fillStyle = '#556677';
  ctx.fillRect(px+P.w-5, py+8, 8, 18);

  // Body
  ctx.fillStyle = '#cc8844';
  ctx.fillRect(px, py+14, P.w, P.h-14);
  // Jacket
  ctx.fillStyle = '#445566';
  ctx.fillRect(px, py+14, P.w, 16);

  // Head
  ctx.fillStyle = '#f0c070';
  ctx.fillRect(px+4, py, P.w-8, 16);

  // Eyes
  ctx.fillStyle = '#222';
  ctx.fillRect(px+8, py+4, 5, 5);
  ctx.fillRect(px+16, py+4, 5, 5);

  // Shield
  if (G.shieldActive) {
    ctx.strokeStyle = '#00ccff';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(px+P.w/2, py+P.h/2, 22, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawHUD() {
  const def = level.def;
  // Top bar background
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, 48);

  // Level name
  ctx.fillStyle = '#aabbcc';
  ctx.font = '11px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`LVL ${G.currentLevel}: ${def.name}`, 10, 14);

  // Time
  ctx.fillStyle = '#8899aa';
  ctx.textAlign = 'right';
  ctx.fillText(`${G.levelTime.toFixed(1)}s`, W-10, 14);

  // Fuel bar
  ctx.fillStyle = '#333';
  ctx.fillRect(10, 22, 160, 14);
  const fuelColor = P.fuel > 0.5 ? '#00cc66' : P.fuel > 0.25 ? '#ffaa00' : '#ff3300';
  ctx.fillStyle = fuelColor;
  ctx.fillRect(11, 23, (P.fuel / P.maxFuel) * 158, 12);
  ctx.strokeStyle = '#556';
  ctx.lineWidth = 1;
  ctx.strokeRect(10, 22, 160, 14);
  ctx.fillStyle = '#fff';
  ctx.font = '9px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('FUEL', 14, 33);

  // Coins
  ctx.fillStyle = '#ffd700';
  ctx.font = '14px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(`⬤ ${G.totalCoins}`, W/2, 30);

  // Lives
  ctx.textAlign = 'right';
  for (let i = 0; i < G.lives; i++) {
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(W - 24 - i*24, 22, 16, 16);
    ctx.fillStyle = '#ff8888';
    ctx.fillRect(W - 24 - i*24 + 4, 22, 4, 4);
  }

  // Wind indicator
  if (def.wind && Math.abs(windForce) > 0.2) {
    ctx.fillStyle = '#88aaff';
    ctx.font = '11px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(windForce > 0 ? '>>> WIND >>>' : '<<< WIND <<<', 180, 33);
  }
}

// ─── MENU SCREENS ─────────────────────────────────────────────────────────────
let menuT = 0;
let shopScroll = 0;
let shopHover = -1;
const UI = { btns: [] };

function btn(label, x, y, w, h, color, textColor) {
  ctx.fillStyle = color || '#223344';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#446688';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = textColor || '#aaddff';
  ctx.font = 'bold 14px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(label, x+w/2, y+h/2+5);
  UI.btns.push({label, x, y, w, h});
}

function handleClick(sx, sy) {
  for (const b of UI.btns) {
    if (sx >= b.x && sx <= b.x+b.w && sy >= b.y && sy <= b.y+b.h) {
      clickBtn(b.label, sx, sy);
      return;
    }
  }
  // Level tiles
  if (G.state === 'levelselect') {
    for (let i = 0; i < 10; i++) {
      const col = i % 5, row = Math.floor(i/5);
      const tx = 60 + col * 140, ty = 160 + row * 140;
      if (sx >= tx && sx <= tx+110 && sy >= ty && sy <= ty+100) {
        if (i+1 <= G.highestLevel) {
          G.currentLevel = i+1;
          G.lives = 3 + (G.upgrades.extraLife||0);
          loadLevel(G.currentLevel);
          G.state = 'playing';
        }
      }
    }
  }
}

function clickBtn(label) {
  switch(label) {
    case 'PLAY': G.state = 'levelselect'; break;
    case 'UPGRADES': G.state = 'shop'; shopScroll = 0; break;
    case 'BACK': G.state = G.prevState || 'menu'; break;
    case 'BACK TO MENU': G.state = 'menu'; break;
    case 'LEVEL SELECT': G.state = 'levelselect'; break;
    case 'NEXT LEVEL':
      if (G.currentLevel < 10) {
        G.currentLevel++;
        G.lives = 3 + (G.upgrades.extraLife||0);
        loadLevel(G.currentLevel);
        G.state = 'playing';
      } else {
        G.state = 'menu';
      }
      break;
    case 'TRY AGAIN':
      G.lives = 3 + (G.upgrades.extraLife||0);
      loadLevel(G.currentLevel);
      G.state = 'playing';
      break;
    case 'RESUME': G.state = 'playing'; break;
    case 'RESTART':
      G.lives = 3 + (G.upgrades.extraLife||0);
      loadLevel(G.currentLevel);
      G.state = 'playing';
      break;
  }
  // Shop buys
  for (let i = 0; i < UPGRADES.length; i++) {
    if (label === 'BUY_' + i) {
      const upg = UPGRADES[i];
      const cur = G.upgrades[upg.id] || 0;
      const cost = upg.cost * (cur + 1);
      if (G.totalCoins >= cost && cur < upg.maxLevel) {
        G.totalCoins -= cost;
        G.upgrades[upg.id] = cur + 1;
        save();
      }
    }
  }
}

function drawMenu() {
  menuT += 0.02;
  UI.btns = [];

  // BG
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#05080f');
  grd.addColorStop(1, '#0a1225');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < 80; i++) {
    const bx = (i * 97 + 50) % W;
    const by = (i * 53 + 30) % (H*0.7);
    const br = 0.5 + Math.sin(menuT*2 + i) * 0.5;
    ctx.fillStyle = `rgba(255,255,255,${0.3+br*0.5})`;
    ctx.fillRect(bx, by, 2, 2);
  }

  // Title
  ctx.fillStyle = '#00ddff';
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#0088ff';
  ctx.font = 'bold 54px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('JETPACK', W/2, 130);
  ctx.fillStyle = '#ffdd00';
  ctx.shadowColor = '#ff8800';
  ctx.fillText('JAMES 2', W/2, 196);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#8899aa';
  ctx.font = '13px Courier New';
  ctx.fillText('The one with levels.', W/2, 228);

  // Animated James
  const jx = W/2 - 14, jy = 255 + Math.sin(menuT*2)*8;
  ctx.fillStyle = '#cc8844'; ctx.fillRect(jx+4, jy, 20, 16);
  ctx.fillStyle = '#445566'; ctx.fillRect(jx, jy+14, 28, 16);
  ctx.fillStyle = '#f0c070'; ctx.fillRect(jx+4, jy-14, 20, 14);
  // flame
  if (Math.sin(menuT*8) > 0) {
    ctx.fillStyle = '#ff6600';
    ctx.fillRect(jx+8, jy+30, 12, 10);
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(jx+10, jy+36, 8, 8);
  }

  btn('PLAY', W/2-80, 310, 160, 44, '#1a3344', '#00ddff');
  btn('UPGRADES', W/2-80, 368, 160, 40, '#1a2a1a', '#00ff88');
  btn('LEVEL SELECT', W/2-80, 422, 160, 36, '#1a1a2a', '#aabbff');

  ctx.fillStyle = '#445566';
  ctx.font = '11px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(`Total coins: ${G.totalCoins}  |  Levels unlocked: ${G.highestLevel}/10`, W/2, H-12);
}

function drawLevelSelect() {
  UI.btns = [];
  ctx.fillStyle = '#080b14';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#00ddff';
  ctx.font = 'bold 26px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('SELECT LEVEL', W/2, 50);

  ctx.fillStyle = '#556677';
  ctx.font = '12px Courier New';
  ctx.fillText(`Coins: ${G.totalCoins}`, W/2, 75);

  const themes = ['#1a1a2e','#0d1b2a','#1a0a00','#0a1628','#0a1929','#0f0f1a','#030308','#020d1a','#0f0000','#08000f'];

  for (let i = 0; i < 10; i++) {
    const col = i % 5, row = Math.floor(i/5);
    const tx = 60 + col * 140, ty = 110 + row * 160;
    const unlocked = i+1 <= G.highestLevel;
    const stars = G.stars[i+1] || 0;

    ctx.fillStyle = unlocked ? themes[i] : '#111';
    ctx.fillRect(tx, ty, 110, 110);
    ctx.strokeStyle = unlocked ? '#4488aa' : '#333';
    ctx.lineWidth = 2;
    ctx.strokeRect(tx, ty, 110, 110);

    ctx.fillStyle = unlocked ? '#aaddff' : '#444';
    ctx.font = 'bold 16px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(`LVL ${i+1}`, tx+55, ty+30);

    if (unlocked) {
      ctx.fillStyle = '#88aacc';
      ctx.font = '9px Courier New';
      const name = LEVEL_DEFS[i].name;
      const words = name.split(' ');
      let line = '', lineY = ty+50;
      for (const w of words) {
        if ((line+' '+w).length > 12 && line) { ctx.fillText(line, tx+55, lineY); line = w; lineY += 13; }
        else line = line ? line+' '+w : w;
      }
      ctx.fillText(line, tx+55, lineY);

      // Stars
      ctx.font = '14px Courier New';
      for (let s = 0; s < 3; s++) {
        ctx.fillStyle = s < stars ? '#ffd700' : '#333';
        ctx.fillText('★', tx+22+s*28, ty+96);
      }
    } else {
      ctx.fillStyle = '#444';
      ctx.font = '24px Courier New';
      ctx.fillText('🔒', tx+55, ty+70);
    }
  }

  btn('BACK TO MENU', W/2-90, H-52, 180, 36, '#112233', '#aabbcc');
}

function drawShop() {
  UI.btns = [];
  ctx.fillStyle = '#080f08';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 26px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('UPGRADES SHOP', W/2, 44);

  ctx.fillStyle = '#ffd700';
  ctx.font = '14px Courier New';
  ctx.fillText(`Coins: ${G.totalCoins}`, W/2, 68);

  for (let i = 0; i < UPGRADES.length; i++) {
    const upg = UPGRADES[i];
    const cur = G.upgrades[upg.id] || 0;
    const cost = upg.cost * (cur + 1);
    const maxed = cur >= upg.maxLevel;
    const canBuy = !maxed && G.totalCoins >= cost;

    const col = i % 2, row = Math.floor(i/2);
    const sx = 40 + col * 370, sy = 90 + row * 98;

    ctx.fillStyle = '#0f1f0f';
    ctx.fillRect(sx, sy, 340, 86);
    ctx.strokeStyle = maxed ? '#00ff88' : (canBuy ? '#446644' : '#223322');
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, sy, 340, 86);

    ctx.fillStyle = '#00ff88';
    ctx.font = '20px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(upg.icon, sx+12, sy+38);

    ctx.fillStyle = '#ccffcc';
    ctx.font = 'bold 13px Courier New';
    ctx.fillText(upg.name, sx+44, sy+26);

    ctx.fillStyle = '#88aa88';
    ctx.font = '11px Courier New';
    ctx.fillText(upg.desc, sx+44, sy+42);

    // Level pips
    for (let p = 0; p < upg.maxLevel; p++) {
      ctx.fillStyle = p < cur ? '#00ff88' : '#223322';
      ctx.fillRect(sx+44+p*18, sy+52, 14, 8);
    }

    if (!maxed) {
      btn('BUY_'+i, sx+220, sy+54, 100, 24,
        canBuy ? '#1a4a1a' : '#1a1a1a',
        canBuy ? '#00ff88' : '#446644');
      ctx.fillStyle = canBuy ? '#ffd700' : '#556655';
      ctx.font = '11px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(`${cost} coins`, sx+270, sy+50);
    } else {
      ctx.fillStyle = '#00ff88';
      ctx.font = 'bold 11px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('MAXED', sx+270, sy+68);
    }
  }

  btn('BACK TO MENU', W/2-90, H-48, 180, 36, '#112211', '#aaccaa');
}

function drawLevelComplete() {
  UI.btns = [];
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#001a00');
  grd.addColorStop(1, '#003300');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#00ff88';
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#00ff88';
  ctx.font = 'bold 42px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL COMPLETE', W/2, 110);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ccffcc';
  ctx.font = '18px Courier New';
  ctx.fillText(LEVEL_DEFS[G.currentLevel-1].name, W/2, 148);

  const stars = G.stars[G.currentLevel] || 1;
  ctx.font = '40px Courier New';
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < stars ? '#ffd700' : '#333';
    ctx.fillText('★', W/2 - 70 + i*70, 210);
  }

  ctx.fillStyle = '#88ddaa';
  ctx.font = '14px Courier New';
  ctx.fillText(`Coins collected: ${G.levelCoins}`, W/2, 248);
  ctx.fillText(`Time: ${G.levelTime.toFixed(1)}s`, W/2, 272);

  if (G.sarcasmTimer > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = '13px Courier New';
    ctx.fillText(G.sarcasm, W/2, 300);
  }

  if (G.currentLevel < 10) {
    btn('NEXT LEVEL', W/2-100, 330, 200, 46, '#1a4a1a', '#00ff88');
  } else {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 18px Courier New';
    ctx.fillText('YOU BEAT THE GAME!', W/2, 345);
    ctx.fillStyle = '#00ff88';
    ctx.font = '14px Courier New';
    ctx.fillText('Incredible. James made it.', W/2, 368);
  }
  btn('LEVEL SELECT', W/2-90, 392, 180, 36, '#112233', '#aabbff');
  btn('UPGRADES', W/2-90, 440, 180, 36, '#1a2a1a', '#aaffaa');
}

function drawGameOver() {
  UI.btns = [];
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#1a0000');
  grd.addColorStop(1, '#330000');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ff4444';
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#ff0000';
  ctx.font = 'bold 52px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, 130);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ff8888';
  ctx.font = '16px Courier New';
  ctx.fillText(`Failed at: ${LEVEL_DEFS[G.currentLevel-1].name}`, W/2, 172);

  const deathMessages = [
    "James tried his best. His best wasn't enough.",
    "The building wins. Again.",
    "Security: 1. James: 0.",
    "Maybe the real treasure was the enemies we made along the way.",
  ];
  ctx.fillStyle = '#cc6666';
  ctx.font = '13px Courier New';
  ctx.fillText(deathMessages[Math.floor(menuT*0.3)%deathMessages.length], W/2, 206);

  ctx.fillStyle = '#ff6666';
  ctx.font = '14px Courier New';
  ctx.fillText(`Coins kept: ${G.totalCoins}`, W/2, 244);

  btn('TRY AGAIN', W/2-100, 284, 200, 46, '#3a1111', '#ff8888');
  btn('UPGRADES', W/2-90, 346, 180, 40, '#1a2a1a', '#aaffaa');
  btn('LEVEL SELECT', W/2-90, 400, 180, 36, '#112233', '#aabbff');
  btn('BACK TO MENU', W/2-90, 450, 180, 36, '#1a1122', '#aabbcc');
}

function drawPause() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 36px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W/2, 200);
  ctx.fillStyle = '#aabbcc';
  ctx.font = '13px Courier New';
  ctx.fillText('Press ESC to resume', W/2, 236);
  btn('RESUME', W/2-80, 268, 160, 42, '#1a2a3a', '#aaddff');
  btn('RESTART', W/2-80, 324, 160, 42, '#2a1a1a', '#ffaabb');
  btn('BACK TO MENU', W/2-80, 380, 160, 40, '#1a1a2a', '#aabbcc');
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
let last = 0;
function loop(ts) {
  const dt = Math.min(ts - last, 50);
  last = ts;
  menuT += 0.016;
  UI.btns = [];
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
load();
// Preload first level
loadLevel(1);
G.state = 'menu';
requestAnimationFrame(loop);
</script>
</body>
</html>
