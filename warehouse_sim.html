// ═══════════════════════════════════════════════════════════════════════════
//  SFX ENGINE  —  Web Audio API, zero external deps
// ═══════════════════════════════════════════════════════════════════════════
const SFX = (() => {
  let ctx = null;
  // Unlock on first gesture
  const unlock = () => {
    if(!ctx){ ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    if(ctx.state === 'suspended') ctx.resume();
  };
  document.addEventListener('pointerdown', unlock, { once: true });
  document.addEventListener('keydown',     unlock, { once: true });

  function tone(type, freq, vol, dur, delay=0, freqEnd=null){
    if(!ctx) return;
    try {
      const t = ctx.currentTime + delay;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = type;
      o.frequency.setValueAtTime(freq, t);
      if(freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, t + dur * 0.8);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.start(t); o.stop(t + dur + 0.01);
    } catch(e){}
  }

  function noise(vol, dur, delay=0){
    if(!ctx) return;
    try {
      const t = ctx.currentTime + delay;
      const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i] = (Math.random()*2-1);
      const src = ctx.createBufferSource();
      const g = ctx.createGain();
      const filt = ctx.createBiquadFilter();
      filt.type = 'bandpass'; filt.frequency.value = 200; filt.Q.value = 0.5;
      src.buffer = buf;
      src.connect(filt); filt.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      src.start(t); src.stop(t + dur + 0.01);
    } catch(e){}
  }

  return {
    // Pallet hit — deep thud with rising combo pitch
    hit(combo=1){
      const f = Math.min(120 + combo * 18, 280);
      tone('triangle', f,    0.5, 0.12);
      tone('sine',     f*0.5, 0.3, 0.18);
      noise(0.15, 0.06);
    },
    // PERFECT hit (first 40% of window) — bright chime
    perfect(){
      tone('sine', 880,  0.3, 0.18);
      tone('sine', 1320, 0.2, 0.22, 0.05);
    },
    // Miss — harsh buzz
    miss(){
      tone('sawtooth', 160, 0.4, 0.15, 0, 80);
      noise(0.2, 0.12);
    },
    // Combo milestone ding (every 5 combo)
    comboDing(n){
      const freqs = [523, 659, 784, 988, 1175, 1397];
      const f = freqs[Math.min(Math.floor(n/5), freqs.length-1)];
      tone('sine', f,    0.25, 0.3);
      tone('sine', f*1.5, 0.12, 0.25, 0.08);
    },
    // Short UI click
    click(){
      tone('square', 600, 0.12, 0.04, 0, 400);
    },
    // Dialogue open pop
    pop(){
      tone('sine', 480, 0.18, 0.08);
      tone('sine', 720, 0.1,  0.06, 0.04);
    },
    // Achievement fanfare
    achievement(){
      [523,659,784,1047].forEach((f,i) => tone('sine', f, 0.28, 0.3, i*0.09));
    },
    // Truck horn (game start / truck arrival)
    horn(){
      tone('sawtooth', 110, 0.45, 0.4);
      tone('sawtooth',  90, 0.35, 0.55, 0.3);
    },
    // Shift-end / completion fanfare
    shiftDone(){
      [392,494,587,784].forEach((f,i) => tone('sine', f, 0.3, 0.4, i*0.12));
    },
    // Soft footstep (called on movement)
    step(){
      noise(0.06, 0.04);
      tone('triangle', 55 + Math.random()*20, 0.08, 0.05);
    },
    // James shout (sawtooth burst)
    james(){
      tone('sawtooth', 220, 0.4, 0.12);
      tone('sawtooth', 180, 0.3, 0.18, 0.08);
    },
    // Danger pulse (suspicion rising)
    danger(){
      tone('sine', 180, 0.3, 0.15, 0, 220);
    },
  };
})();

// Speech bubble helper — draws a proper rounded-rect bubble with tail
function drawSpeechBubble(gfx, cx, cy, text, textObj){
  gfx.clear();
  const bounds = textObj.getBounds();
  const pad = 9;
  const bx = bounds.x - pad;
  const by = bounds.y - pad;
  const bw = Math.max(bounds.width + pad*2, 60);
  const bh = bounds.height + pad*2;
  const br = 8; // border radius

  // Shadow
  gfx.fillStyle(0x000000, 0.18);
  gfx.fillRoundedRect(bx+3, by+3, bw, bh, br);

  // Bubble fill
  gfx.fillStyle(0xffffff, 0.97);
  gfx.fillRoundedRect(bx, by, bw, bh, br);

  // Border
  gfx.lineStyle(1.5, 0x444444, 0.7);
  gfx.strokeRoundedRect(bx, by, bw, bh, br);

  // Tail pointing down toward character
  const tailX = cx;
  const tailTop = by + bh;
  gfx.fillStyle(0xffffff, 0.97);
  gfx.fillTriangle(tailX-7, tailTop, tailX+7, tailTop, tailX, tailTop+11);
  gfx.lineStyle(1.5, 0x444444, 0.7);
  gfx.strokeTriangle(tailX-7, tailTop, tailX+7, tailTop, tailX, tailTop+11);
  // Cover the border where tail meets bubble
  gfx.lineStyle(2, 0xffffff, 1);
  gfx.lineBetween(tailX-6, tailTop, tailX+6, tailTop);
}

class GameScene extends Phaser.Scene {

    this.cameras.main.setBackgroundColor('#111111');

    // Build the world
    this.createMap();
    this.createWalls();
    this.createObjects();
    this.createPlayer();
    this.createNPCs();
    this.createTrucks();

    // Camera
    // Physics world bounds MUST match the game world size, not the canvas size
    this.physics.world.setBounds(0, 0, WW, WH);
    this.cameras.main.setBounds(0, 0, WW, WH);
    this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
    this.cameras.main.setZoom(GW < 600 ? 0.7 : 0.85);

    // Input
    this.cursors = this.input.keyboard.createCursorKeys();
    this.wasd = this.input.keyboard.addKeys({ up:'W', left:'A', down:'S', right:'D', interact:'E', map:'M' });
    this.input.keyboard.on('keydown-E', ()=> this.tryInteract());
    this.input.keyboard.on('keydown-M', ()=> this.toggleMiniMap());

    // Mobile touch joystick
    this.createTouchControls();

    // Timers & events
    this.gameTimer = 0; // elapsed real ms

    this.suspicionDecayTimer = 0;
    this.npcChatterTimer = 0;
    this.patrolTimer = 0;

    // Dialogue state
    this.dialogue = null;
    this.createDialogueBox();

    // Mini-game state
    this.miniGame = null;
    this.createMiniGameUI();

    // Message log
    this.msgLog = [];
    this.createMessageLog();

    // Smoke chat session panel
    this.createSmokeChat();

    // Floating text pool
    this.floatTexts = [];

    // Minimap
    this.miniMapVisible = false;
    this.createMiniMap();

    // Start UI scene
    this.scene.launch('UI');
    this.scene.bringToTop('UI');

    // Assign first truck after short delay
    this.time.delayedCall(2000, ()=>{
      if(!STATE.dialogueActive) this.showAssignment();

  createInteractable(x, y, w, h, color, label, id){
    const g = this.add.graphics();
    g.fillStyle(color, 1);
    g.fillRoundedRect(x-w/2, y-h/2, w, h, 6);
    g.lineStyle(2, 0xffa01e, 0.6);
    g.strokeRoundedRect(x-w/2, y-h/2, w, h, 6);
    const txt = this.add.text(x, y, label, {
      fontSize:'10px', fill:'#fff', fontFamily:'monospace',
      align:'center', stroke:'#000', strokeThickness:2
    }).setOrigin(0.5);
    // Invisible physics body for collision
    const body = this.add.rectangle(x, y, w, h, 0, 0);
    this.physics.add.existing(body, true);
    body.interactId = id;
    body.interactLabel = label;
    return body;
  }

  createNPCs(){

    NPC_DEFS.forEach(def => {

      const sx = zone.x + zone.w * 0.35 + Math.random()*zone.w*0.3;
      const sy = zone.y + zone.h * 0.3 + Math.random()*zone.h*0.4;

      // NPC person sprite
      makePersonTexture(this, 'npc_'+def.id, def.appearance || {});

      sprite.setCollideWorldBounds(true);

      sprite.setDepth(9);

        backgroundColor:'rgba(0,0,0,0.65)', padding:{x:5,y:2}
      }).setOrigin(0.5, 1).setDepth(14);

      const bubble = this.add.text(sx, sy-90, '', {

        wordWrap:{width:175}, align:'center',
        resolution: 2
      }).setOrigin(0.5, 1).setDepth(16).setVisible(false);

      // Speech bubble: graphics (drawn behind text)
      const bubbleGfx = this.add.graphics().setDepth(15).setVisible(false);

      const npc = {
        ...def, sprite, tag, bubble, bubbleGfx,
        targetX: sx, targetY: sy,
        moveTimer: 0,
        patrolIndex: 0,
        patrolPath: def.patrol ? this.genPatrolPath(def.zone) : [],
        bubbleTimer: 0,
        interacting: false,
        bubbleDirty: false,
      };

      this.physics.add.collider(sprite, this.walls);
      this.npcs.push(npc);
    });
  }

  genPatrolPath(zone){
    const z = ZONES[zone];
    const pts = [];
    const steps = 4 + Math.floor(Math.random()*3);
    for(let i=0;i<steps;i++){
      pts.push({
        x: z.x + 40 + Math.random()*(z.w-80),
        y: z.y + 30 + Math.random()*(z.h-60)
      });
    }
    return pts;
  }

      const sc = stripeColors[i%6];

  // ── PLAYER MOVEMENT ────────────────────────────────────────────────────────
  movePlayer(delta){
    const speed = 180 * (STATE.energy>0 ? 1 : 0.4);
    const cur = this.cursors;
    const w = this.wasd;
    let vx=0, vy=0;

    const left  = cur.left.isDown  || w.left.isDown  || this.joyDir.left;
    const right = cur.right.isDown || w.right.isDown || this.joyDir.right;
    const up    = cur.up.isDown    || w.up.isDown    || this.joyDir.up;
    const down  = cur.down.isDown  || w.down.isDown  || this.joyDir.down;

    if(left)  vx -= speed;
    if(right) vx += speed;
    if(up)    vy -= speed;
    if(down)  vy += speed;

    if(vx!==0 && vy!==0){ vx*=0.707; vy*=0.707; }

    if(vx||vy){
      this.player.setVelocity(vx, vy);
      // Flip sprite to face movement direction
      if(vx < 0) this.player.scaleX = -1;
      else if(vx > 0) this.player.scaleX = 1;
      // Subtle walk bob
      this._walkTick = (this._walkTick||0) + 1;
      this.player.y += Math.sin(this._walkTick * 0.3) * 0.4;
    } else {
      this.player.setVelocity(0,0);
    }
  }

  // ── TOUCH CONTROLS ─────────────────────────────────────────────────────────
  createTouchControls(){
    this.joyDir = {left:false, right:false, up:false, down:false};
    if(!this.sys.game.device.input.touch && window.innerWidth>600) return;

    const joyZone = this.add.rectangle(80, GH-80, 140, 140, 0x000000, 0)
      .setScrollFactor(0).setInteractive().setDepth(50);

    const joyBase = this.add.circle(80, GH-80, 55, 0xffffff, 0.1)
      .setScrollFactor(0).setDepth(50);
    const joyKnob = this.add.circle(80, GH-80, 22, 0xffa01e, 0.7)
      .setScrollFactor(0).setDepth(51);

    // Interact button
    const intBtn = this.add.circle(GW-70, GH-80, 32, 0xffa01e, 0.7)
      .setScrollFactor(0).setInteractive().setDepth(50);
    this.add.text(GW-70, GH-80, 'E', {fontSize:'18px',fill:'#fff',fontFamily:'monospace'})
      .setScrollFactor(0).setDepth(51).setOrigin(0.5);
    intBtn.on('pointerdown', ()=> this.tryInteract());

    const baseX=80, baseY=GH-80, deadzone=10;
    this.input.on('pointermove', ptr=>{
      const dx=ptr.x-baseX, dy=ptr.y-baseY, d=Math.hypot(dx,dy);
      if(ptr.isDown && d>deadzone && ptr.x<160){
        const max=50;
        const kx=baseX+Phaser.Math.Clamp(dx,-max,max);
        const ky=baseY+Phaser.Math.Clamp(dy,-max,max);
        joyKnob.setPosition(kx,ky);
        this.joyDir.left  = dx < -deadzone;
        this.joyDir.right = dx > deadzone;
        this.joyDir.up    = dy < -deadzone;
        this.joyDir.down  = dy > deadzone;
      }
    });
    this.input.on('pointerup', ()=>{
      joyKnob.setPosition(baseX,baseY);
      this.joyDir = {left:false,right:false,up:false,down:false};
    });
  }

  openDialogue(npc){
    if(STATE.dialogueActive || STATE.miniGameActive) return;
    SFX.pop();
    STATE.dialogueActive = true;
    this.dialogue = npc;
    this.player.setVelocity(0,0);

    // Gossip mode: Lee + following + outside = switch to gossip dialogue
    const gossipMode = (npc.id === 'lee' && STATE.leeFollowing && STATE.currentZone === 'outside');

    const choices = gossipMode ? npc.gossipChoices : npc.choices;

    let line;
    if(gossipMode){
      const gossipOpeners = [
        '"Okay okay okay, I HAVE to tell you something."',
        '"Girl... you will NOT believe what I heard."',
        '"Right, so. Nobody is supposed to know this but—"',
        '"Okay so this stays between us. Who do you want to start with?"',
      ];
      line = Phaser.Math.RND.pick(gossipOpeners);
    } else if(npc.id === 'lee' && STATE.leeFollowing){
      line = '"We\'re almost at the smokers corner! Keep walking, don\'t look suspicious."';
    } else {
      line = Phaser.Math.RND.pick(npc.lines);
    }

    // Draw background (gossip = pink tinted)
    this.dlgBg.clear().setVisible(true);
    this.dlgBg.fillStyle(gossipMode ? 0x1a0010 : 0x000000, 0.88);
    this.dlgBg.fillRect(0, GH-165, GW, 165);
    this.dlgBg.lineStyle(2, gossipMode ? 0xff60c0 : 0xffa01e, 0.6);
    this.dlgBg.strokeRect(0, GH-165, GW, 165);
    if(gossipMode){
      // Smoke emoji trail
      this.dlgBg.fillStyle(0xff80c0, 0.06);
      for(let i=0;i<8;i++) this.dlgBg.fillCircle(20+i*110, GH-155+20, 18+i*3);
    }

    // Portrait
    this.dlgPortrait.setFillStyle(npc.color).setVisible(true);
    const portraitLabel = gossipMode ? 'Lee 🚬\n(Gossip)' : npc.name+'\n'+npc.title;
    this.dlgPortraitTxt.setText(portraitLabel).setVisible(true);

    // Text
    this.dlgText.setText((gossipMode ? '🚬 Lee: ' : npc.name+': ')+line).setVisible(true);
    this.dlgCloseTxt.setVisible(true);

    // Choices
    choices.forEach((choice, i)=>{
      const btn = this.dlgChoiceBtns[i];
      btn.setText(`${i+1}. ${choice}`).setPosition(130, GH-112+i*26).setVisible(true);
      btn.removeAllListeners('pointerdown');
      btn.on('pointerdown', ()=> gossipMode ? this.handleGossip(npc, i) : this.handleChoice(npc, i));
    });

    // Keyboard shortcuts
    this.choiceKeys = [];
    choices.forEach((_, i) => {
      const k = this.input.keyboard.addKey(49+i);
      k.once('down', ()=>{ if(STATE.dialogueActive){
        gossipMode ? this.handleGossip(npc, i) : this.handleChoice(npc, i);
      }});
      this.choiceKeys.push(k);
    });
  }

  startMiniGame(truckIdx){
    if(STATE.dialogueActive || STATE.miniGameActive) return;
    if(truckIdx < 0 || truckIdx >= this.trucks.length || this.trucks[truckIdx].done) return;

    STATE.miniGameActive = true;
    STATE.currentTruck = truckIdx;
    this.mgTruck = this.trucks[truckIdx];
    this.mgPalletsTotal = this.mgTruck.pallets;
    this.mgPalletsLeft = this.mgPalletsTotal;
    this.mgHits = 0; this.mgMisses = 0;
    this.mgCombo = 0; this.mgPts = 0;
    this.mgTimeLeft = 45000; // 45 seconds
    this.mgKeys = ['←','→','↑','↓','SPACE'];
    this.mgKeyMap = { 'ArrowLeft':'←','ArrowRight':'→','ArrowUp':'↑','ArrowDown':'↓',' ':'SPACE' };
    this.mgCurrentKey = '';
    this.mgWindowLeft = 0;

    // Initialize dock view state
    this._jackX = GW/2;
    this._palletOnJack = false;
    this._dockViewY = 120;

    this.mgShowNext();

    // Show UI
    this.mgBg.clear().setVisible(true);
    this.mgBg.fillStyle(0x000000, 0.9);
    this.mgBg.fillRect(0,0,GW,GH);
    this.mgBg.fillStyle(0x1a2a1a,1);
    this.mgBg.fillRoundedRect(GW/2-300, 40, 600, GH-80, 16);
    this.mgBg.lineStyle(2,0x44cc44,0.8);
    this.mgBg.strokeRoundedRect(GW/2-300, 40, 600, GH-80, 16);

    [this.mgTitle,this.mgPrompt,this.mgStatus,this.mgBar,this.mgScore,this.mgQuit].forEach(o=>o.setVisible(true));
    this.mgTitle.setText(`🚛 UNLOADING TRUCK ${truckIdx+1}  —  ${this.mgPalletsTotal} PALLETS`);

    this.mgDockBg.setVisible(true);
    this.mgJackGfx.setVisible(true);
    this.mgComboTxt.setVisible(true);
    this._drawDockView();

    // Key listener for mini-game
    this.mgKeyListener = (event)=>{
      if(!STATE.miniGameActive) return;
      const pressed = this.mgKeyMap[event.key];
      if(!pressed) return;
      this.mgCheckPress(pressed);
    };
    window.addEventListener('keydown', this.mgKeyListener);

    // Tap for mobile
    this.mgTapArea = this.add.rectangle(GW/2, GH/2, 400, 200, 0, 0)
      .setScrollFactor(0).setDepth(95).setInteractive();
    this.mgTapArea.on('pointerdown', ()=> this.mgCheckPress(this.mgCurrentKey));

    this.mgLoop = this.time.addEvent({
      delay: 100, loop: true,
      callback: ()=>{
        if(!STATE.miniGameActive) return;
        this.mgTimeLeft -= 100;
        this.mgWindowLeft -= 100;
        if(this.mgWindowLeft <= 0 && this.mgPalletsLeft > 0){
          this.mgMisses++; this.mgCombo=0;
          this.mgStatus.setText('❌ Missed! Combo reset.').setStyle({fill:'#ff6666'});
          this.mgShowNext();
        }
        if(this.mgTimeLeft<=0 || this.mgPalletsLeft<=0) this.endMiniGame(this.mgPalletsLeft<=0);
        this.mgUpdateBar();
      }
    });
  }

  mgShowNext(){
    if(this.mgPalletsLeft <= 0){ this.endMiniGame(true); return; }
    const opts = ['←','→','↑','↓'];
    this.mgCurrentKey = opts[Math.floor(Math.random()*opts.length)];
    this.mgWindowLeft = 2000 - this.mgHits * 8; // gets harder
    this.mgWindowLeft = Math.max(700, this.mgWindowLeft);
    this.mgPrompt.setText(this.mgCurrentKey);
    // Flash animation
    this.tweens.add({ targets:this.mgPrompt, scaleX:[1.4,1], scaleY:[1.4,1], duration:200 });
    this.mgScore.setText(`✅ ${this.mgHits} pallets  |  Combo ×${this.mgCombo+1}  |  +${this.mgPts} pts`);
  }

  mgCheckPress(key){
    if(key === this.mgCurrentKey){
      this.mgHits++; this.mgCombo++; this.mgPalletsLeft--;
      const pts = 10 * this.mgCombo;
      this.mgPts += pts;
      STATE.score += pts;
      STATE.energy = Math.max(0, STATE.energy - 1.5);
      SFX.hit(this.mgCombo);
      if(this.mgCombo > 0 && this.mgCombo % 5 === 0) SFX.comboDing(this.mgCombo);
      this.mgStatus.setText(`✅ PALLET! Combo ×${this.mgCombo} (+${pts} pts)`).setStyle({fill:'#44ff44'});
      this.tweens.add({ targets:this.mgPrompt, y:GH/2-40, yoyo:true, duration:100 });

      // Combo display
      if(this.mgComboTxt){
        this.mgComboTxt.setText(this.mgCombo > 1 ? `×${this.mgCombo}` : '').setVisible(true);
        this.tweens.add({ targets:this.mgComboTxt, scaleX:[1.4,1], scaleY:[1.4,1], duration:180 });
      }

      // Animate jack: jack drives to truck, loads pallet, drives back to storage
      if(this.mgDockBg && this.mgDockBg.visible){
        const truckX   = GW/2 + 180; // truck side
        const storageX = GW/2 - 190; // storage side
        const homeX    = GW/2;
        this._jackX = homeX;
        this._palletOnJack = false;
        // Drive to truck
        this.tweens.add({
          targets: this, _jackX: truckX, duration: 220, ease: 'Linear',
          onUpdate: ()=> this._drawDockView(),
          onComplete: ()=>{
            this._palletOnJack = true;
            this._drawDockView();
            // Drive back to storage
            this.tweens.add({
              targets: this, _jackX: storageX, duration: 260, ease: 'Linear',
              onUpdate: ()=> this._drawDockView(),
              onComplete: ()=>{
                this._palletOnJack = false;
                this._jackX = homeX;
                this._drawDockView();
              }
            });
          }
        });
      }
      this.mgShowNext();
    } else {
      this.mgMisses++; this.mgCombo=0;
      SFX.miss();
      this.mgStatus.setText('❌ Wrong key! Pallet dropped.').setStyle({fill:'#ff4444'});
      if(this.mgComboTxt) this.mgComboTxt.setText('').setVisible(false);
      // Shake the jack
      if(this.mgDockBg && this.mgDockBg.visible){
        const origX = this._jackX;
        this.tweens.add({
          targets: this, _jackX: origX + 18, duration: 70, yoyo: true, repeat: 3,
          onUpdate: ()=> this._drawDockView(),
          onComplete: ()=>{ this._jackX = origX; this._drawDockView(); }
        });
      }
      this.tweens.add({ targets:this.mgPrompt, x:GW/2+10, yoyo:true, duration:80, repeat:2,
        onComplete:()=>this.mgPrompt.setX(GW/2) });
    }
  }

  mgUpdateBar(){
    this.mgBar.clear();
    const pct = this.mgTimeLeft/45000;
    const bw = 500, bh = 16, bx = GW/2-250, by = 100;
    this.mgBar.fillStyle(0x333333,1); this.mgBar.fillRect(bx,by,bw,bh);
    const col = pct>0.5?0x44cc44:pct>0.25?0xffaa00:0xff3333;
    this.mgBar.fillStyle(col,1); this.mgBar.fillRect(bx,by,bw*pct,bh);
    this.mgBar.lineStyle(1,0xffffff,0.3); this.mgBar.strokeRect(bx,by,bw,bh);
    // Pallets remaining bar
    const pp = 1 - (this.mgPalletsLeft/this.mgPalletsTotal);
    this.mgBar.fillStyle(0x225522,1); this.mgBar.fillRect(bx,by+24,bw,8);
    this.mgBar.fillStyle(0x44ff44,1); this.mgBar.fillRect(bx,by+24,bw*pp,8);
  }

  endMiniGame(success){
    if(!STATE.miniGameActive) return;
    STATE.miniGameActive = false;
    if(this.mgLoop){ this.mgLoop.remove(); this.mgLoop=null; }
    if(this.mgKeyListener){ window.removeEventListener('keydown',this.mgKeyListener); this.mgKeyListener=null; }
    if(this.mgTapArea){ this.mgTapArea.destroy(); this.mgTapArea=null; }

    if(this.mgDockBg) this.mgDockBg.setVisible(false);
    if(this.mgJackGfx) this.mgJackGfx.setVisible(false);
    if(this.mgComboTxt) this.mgComboTxt.setVisible(false);

    if(success) SFX.shiftDone();
    else        SFX.miss();

    const truck = this.trucks[STATE.currentTruck];
    if(truck){
      const ratio = this.mgHits / this.mgPalletsTotal;
      const bonus = Math.floor(ratio * 100);
      STATE.score += bonus;
      STATE.trucksUnloaded++;
      STATE.suspicion = Math.max(0, STATE.suspicion - 20);

      if(ratio >= 0.5){ truck.done = true; truck.label.setText('✅ Done!').setStyle({fill:'#44cc44'}); }
      const msg = ratio >= 0.8 ? '💪 Great unload! +'+bonus+' pts' :
                  ratio >= 0.5 ? '👍 Decent work. +'+bonus+' pts' :
                  '😬 Sloppy. +'+bonus+' pts';
      this.floatText(this.player.x, this.player.y, msg, '#ffd700');

      if(STATE.trucksUnloaded >= 3 && !STATE.achievements.includes('3_trucks')){
        STATE.achievements.push('3_trucks');
        this.floatText(this.player.x, this.player.y-40, '🏆 ACHIEVEMENT: Workhorse!', '#ffa01e');
      }
    }

    [this.mgBg,this.mgTitle,this.mgPrompt,this.mgStatus,this.mgBar,this.mgScore,this.mgQuit,this.mgDockBg,this.mgJackGfx,this.mgComboTxt].forEach(o=>o&&o.setVisible(false));
    STATE.currentTruck = null;

    // Check next assignment
    this.time.delayedCall(1500, ()=>{ if(!STATE.dialogueActive) this.showAssignment(); });
  }

  // ── INTERACTION ────────────────────────────────────────────────────────────
  tryInteract(){
    if(STATE.dialogueActive || STATE.miniGameActive) return;

    const range = 90;
    const px = this.player.x, py = this.player.y;

    // Check NPCs — pick the NEAREST one, not the first in array order
    let nearestNPC = null, nearestNPCD = range;
    for(const npc of this.npcs){
      const d = Phaser.Math.Distance.Between(px,py,npc.sprite.x,npc.sprite.y);
      if(d < nearestNPCD){ nearestNPCD = d; nearestNPC = npc; }
    }
    if(nearestNPC){ this.openDialogue(nearestNPC); return; }

    // Check trucks
    for(let i=0;i<this.trucks.length;i++){
      const t = this.trucks[i];
      if(!t.done && t === STATE.currentTruckObj){
        const d = Phaser.Math.Distance.Between(px,py,t.x,t.y);
        if(d < range+50){ this.startMiniGame(i); return; }
      }
    }

    // Check interactables
    for(const obj of this.interactables){
      const d = Phaser.Math.Distance.Between(px,py,obj.x,obj.y);
      if(d < range){ this.useObject(obj.interactId); return; }
    }
  }

  useObject(id){
    const responses = {
      timeclock: ()=>{ this.floatText(this.player.x,this.player.y,'⏱ Clocked in!',  '#44ff44'); STATE.score+=5; },
      tldesk:    ()=>{ this.showAssignment(); },
      vending:   ()=>{ STATE.energy=Math.min(100,STATE.energy+15); this.floatText(this.player.x,this.player.y,'🥤 Energy +15!','#44aaff'); STATE.score+=2; },
      coffee:    ()=>{ STATE.energy=Math.min(100,STATE.energy+25); this.floatText(this.player.x,this.player.y,'☕ Coffee! Energy +25!','#cc8844'); STATE.score+=3; },
      fridge:    ()=>{ STATE.energy=Math.min(100,STATE.energy+20); this.floatText(this.player.x,this.player.y,'🧊 Snack! Energy +20','#44ddff'); STATE.score+=3; },
      smoke:     ()=>{ STATE.energy=Math.min(100,STATE.energy+30); STATE.suspicion=Math.max(0,STATE.suspicion-10); this.floatText(this.player.x,this.player.y,'🚬 Smoke break! Suspicion -10','#aaff88'); STATE.score+=5; },
      smokearea: ()=>{ this.showSmokeAreaMenu(); },
      extinguisher:()=>{ this.fireExtinguisher(); },
      mysterybox:()=>{ this.openMysteryBox(); },
    };
    if(responses[id]) responses[id]();
  }

  fireExtinguisher(){
    const pam = this.npcs.find(n=>n.id==='pam');
    STATE.score += 50;
    STATE.suspicion = Math.min(100, STATE.suspicion+40);
    this.floatText(this.player.x, this.player.y, '🧯 FIRE EXTINGUISHER! Chaos +50pts', '#ff4444');
    if(pam){ this.showBubble(pam, '"WHAT ARE YOU DOING?!"'); }
    this.cameras.main.shake(500, 0.02);
    if(!STATE.achievements.includes('chaos_agent')){
      STATE.achievements.push('chaos_agent');
      this.time.delayedCall(1000, ()=>
        this.floatText(this.player.x,this.player.y-50,'🏆 ACHIEVEMENT: Chaos Agent!','#ff4444'));
    }
  }

  openMysteryBox(){
    const outcomes = [
      ['Extra Large Pizza (Todd\'s)', 80, '🍕 +80 pts!'],
      ['A single fry', 1, '🍟 ...just one fry. +1 pt.'],
      ['Chandler\'s lunch', 40, '🥪 You ate Chandler\'s lunch! +40'],
      ['Todd\'s secret stash', 100, '🧊 Todd\'s STASH! +100 pts!!'],
      ['A letter from HR', -20, '📋 HR letter... -20 pts.'],

      STATE.achievements.push('mystery_winner');
      this.time.delayedCall(1000,()=>this.floatText(this.player.x,this.player.y-50,'🏆 ACHIEVEMENT: Mystery Winner!','#ffd700'));

  // ── SMOKE CHAT SESSION ────────────────────────────────────────────────────
  createSmokeChat(){
    const PX = GW - 262, PY = 60, PW = 258;
    this._scPX = PX; this._scPY = PY; this._scPW = PW;

    this.scBg = this.add.graphics().setScrollFactor(0).setDepth(72).setVisible(false);

    this.scHeaderTxt = this.add.text(PX + PW/2, PY + 5, '🚬  SMOKE BREAK  🚬', {
      fontSize:'12px', fill:'#aaffaa', fontFamily:'monospace', fontStyle:'bold'
    }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(73).setVisible(false);

    this.scWhoTxt = this.add.text(PX + 6, PY + 22, '', {
      fontSize:'9px', fill:'#88cc88', fontFamily:'monospace', wordWrap:{ width: PW - 12 }
    }).setScrollFactor(0).setDepth(73).setVisible(false);

    // Pre-allocate message slots (10 slots)
    this.scMsgPool = [];
    for(let i = 0; i < 10; i++){
      const t = this.add.text(PX + 6, PY + 44 + i * 44, '', {
        fontSize:'11px', fill:'#ffffff', fontFamily:'monospace',
        wordWrap:{ width: PW - 12 }, lineSpacing: 1
      }).setScrollFactor(0).setDepth(73).setVisible(false).setAlpha(0);
      this.scMsgPool.push(t);
    }

    this.scLeaveTxt = this.add.text(PX + PW/2, GH - 14, '[ESC] Leave smoke area', {
      fontSize:'9px', fill:'rgba(150,255,150,0.45)', fontFamily:'monospace'
    }).setOrigin(0.5, 1).setScrollFactor(0).setDepth(73).setVisible(false);

    this._scMessages = [];
    this._scParticleTimer = null;
  }

  openSmokeChat(){
    if(STATE.smokeChatOpen) return;
    STATE.smokeChatOpen = true;
    this._scMessages = [];

    const PX = this._scPX, PY = this._scPY, PW = this._scPW;

    // Draw panel background
    this.scBg.clear();
    this.scBg.fillStyle(0x050c08, 0.91);
    this.scBg.fillRoundedRect(PX - 2, PY - 2, PW + 4, GH - PY, 10);
    this.scBg.lineStyle(1.5, 0x44ff88, 0.35);
    this.scBg.strokeRoundedRect(PX - 2, PY - 2, PW + 4, GH - PY, 10);
    this.scBg.lineStyle(1, 0x44ff88, 0.2);
    this.scBg.lineBetween(PX, PY + 40, PX + PW, PY + 40);
    this.scBg.setVisible(true);

    // Build who's-here list
    const atSmoke = (id) => {
      const npc = this.npcs.find(n=>n.id===id);
      if(!npc) return false;
      const z = ZONES.outside;
      return npc.sprite.x >= z.x && npc.sprite.x <= z.x+z.w &&
             npc.sprite.y >= z.y && npc.sprite.y <= z.y+z.h;
    };
    const NPC_SC_COLORS = { james:'#ffa01e', chance:'#44aaff', lee:'#ff80c0', chandler:'#bbbbbb', drew:'#cc88ff', jeff:'#44dd44' };
    const hereNames = ['james','lee','chance','chandler','drew','jeff']
      .filter(id => atSmoke(id) || STATE.smokingNPCs.includes(id))
      .map(id =>{ const n = this.npcs.find(x=>x.id===id); return n ? n.name : id; });
    this.scWhoTxt.setText(hereNames.length ? `👥 ${hereNames.join('  ')}` : '👤 Just you out here.').setVisible(true);
    this.scHeaderTxt.setVisible(true);
    this.scLeaveTxt.setVisible(true);

    // Clear message pool
    this.scMsgPool.forEach(t => t.setText('').setVisible(false).setAlpha(0));

    // Zoom camera into smoke area
    this.cameras.main.stopFollow();
    this.cameras.main.zoomTo(1.8, 700, 'Quad.easeInOut');
    this.cameras.main.pan(160, 90, 700, 'Quad.easeInOut');

    // Smoke particle emitter
    if(this._scParticleTimer) this._scParticleTimer.remove();
    this._scParticleTimer = this.time.addEvent({
      delay: 650, callback: this._spawnSmokeParticle, callbackScope: this, loop: true
    });

    // Post a welcome line
    this.time.delayedCall(800, ()=>{
      this.postSmokeChat('player', '*steps outside and lights up* 💨');
    });
  }

  closeSmokeChat(){
    if(!STATE.smokeChatOpen) return;
    STATE.smokeChatOpen = false;
    this.scBg.setVisible(false);
    this.scHeaderTxt.setVisible(false);
    this.scWhoTxt.setVisible(false);
    this.scLeaveTxt.setVisible(false);
    this.scMsgPool.forEach(t => t.setVisible(false));
    // Restore camera
    this.cameras.main.stopFollow();
    this.cameras.main.zoomTo(GW < 600 ? 0.7 : 0.85, 500, 'Quad.easeInOut');
    this.cameras.main.pan(this.player.x, this.player.y, 500, 'Quad.easeInOut');
    // Re-attach follow
    this.time.delayedCall(520, ()=>{
      this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
    });
    if(this._scParticleTimer){ this._scParticleTimer.remove(); this._scParticleTimer = null; }
  }

  postSmokeChat(id, text){
    if(!STATE.smokeChatOpen) return;
    const NPC_SC_COLORS = {
      james:'#ffa01e', chance:'#44aaff', lee:'#ff80c0',
      chandler:'#bbbbbb', drew:'#cc88ff', jeff:'#44dd44',
      todd:'#88aaff', pam:'#ffcc44', player:'#aaffaa'
    };
    const npc = this.npcs ? this.npcs.find(n=>n.id===id) : null;
    const name = npc ? npc.name : (id === 'player' ? STATE.playerName || 'You' : id);
    const color = NPC_SC_COLORS[id] || '#cccccc';

    this._scMessages.push({ name, color, text });
    if(this._scMessages.length > 10) this._scMessages.shift();
    this._redrawSmokeChat();

    // Animate newest slot sliding in
    const newest = this.scMsgPool[this._scMessages.length - 1];
    if(newest){
      newest.setAlpha(0);
      this.tweens.add({ targets: newest, alpha: 1, duration: 280, ease: 'Quad.Out' });
    }
  }

  _redrawSmokeChat(){
    this.scMsgPool.forEach(t => t.setVisible(false).setAlpha(0));
    const msgs = this._scMessages;
    msgs.forEach((msg, i) => {
      const slot = this.scMsgPool[i];
      if(!slot) return;
      const age = msgs.length - 1 - i; // 0 = newest
      const alpha = Math.max(0.35, 1 - age * 0.11);
      slot.setText(`${msg.name} › ${msg.text}`)
          .setStyle({ fill: msg.color, fontSize:'11px', fontFamily:'monospace', wordWrap:{ width: this._scPW - 12 } })
          .setAlpha(alpha)
          .setVisible(true);
    });
  }

  _spawnSmokeParticle(){
    const gfx = this.add.graphics().setDepth(6);
    const x = 108 + Math.random() * 110;
    const y = 72 + Math.random() * 44;
    const r = 3 + Math.random() * 5;
    gfx.fillStyle(0x99bb99, 0.22);
    gfx.fillCircle(0, 0, r);
    gfx.setPosition(x, y);
    this.tweens.add({
      targets: gfx, y: y - 50, alpha: 0, scaleX: 2.8, scaleY: 2.8,
      duration: 2800 + Math.random() * 1400, ease: 'Quad.Out',
      onComplete: ()=> gfx.destroy()
    });
  }

  // ── SMOKE AREA MENU ───────────────────────────────────────────────────────
  showSmokeAreaMenu(){
    if(STATE.dialogueActive || STATE.miniGameActive || STATE.groupRoastActive) return;

    const SMOKE_X = 160, SMOKE_Y = 90; // centre of smoke area

    // Open zoomed-in chat session
    this.openSmokeChat();

    // Helper: is an NPC currently in the outside zone (smoke area)?
    const atSmoke = (id) => {
      const npc = this.npcs.find(n=>n.id===id);
      if(!npc) return false;
      const z = ZONES.outside;
      return npc.sprite.x >= z.x && npc.sprite.x <= z.x+z.w &&
             npc.sprite.y >= z.y && npc.sprite.y <= z.y+z.h;
    };

    const chandlerHere = atSmoke('chandler');
    const jamesHere    = atSmoke('james');
    const chanceHere   = atSmoke('chance');
    const leeHere      = atSmoke('lee') || STATE.leeFollowing;

    // Pre-calculate roast + party states
    const others = [jamesHere, chanceHere, leeHere].filter(Boolean).length;

      choices.push({ label:'🥡 Yell EGGROLL at Lee 😈',   id:'partyLeeEggroll', hot:true });
      choices.push({ label:'💨 Just vibe out here',        id:'chill' });
    } else {
      if(!chandlerHere) choices.push({ label:'📞 Call Chandler out here', id:'callChandler' });
      if(!jamesHere)    choices.push({ label:'📞 Call James out here',    id:'callJames'    });
      if(!chanceHere)   choices.push({ label:'📞 Call Chance out here',   id:'callChance'   });
      if(!leeHere)      choices.push({ label:'📞 Call Lee out here',      id:'callLee'      });
      if(roastReady)    choices.unshift({ label:'🔥 GROUP ROAST Chandler — DO IT', id:'groupRoast', hot:true });
      choices.push({ label:'💨 Just chill here (+energy)', id:'chill' });

    // ── BUILD THE DIALOGUE UI ──

    // Draw dialogue box
    const boxY = GH - 145;
    this.dlgBg.setVisible(true);
    this.dlgBg.clear()
      .fillStyle(0x0a0f18, 0.93).fillRoundedRect(5, boxY-5, GW-10, 145, 10)
      .lineStyle(2, 0x44ff88, 0.8).strokeRoundedRect(5, boxY-5, GW-10, 145, 10);

    // Header — use the portrait area for the title
    let headerTxt = '🚬 Smoke\nArea';
    if(partyMode)             headerTxt = '🔥 THE\nCREW 🔥';
    else if(roastReady)       headerTxt = '🔥 ROAST\nTIME 🔥';
    else if(roastAlmostReady) headerTxt = '🚬 Call\nChandler!';
    const _portColor    = partyMode ? 0xff6600 : roastReady ? 0xff3300 : 0x116611;
    const _portTxtColor = (partyMode || roastReady) ? '#ff6a00' : '#aaffaa';
    this.dlgPortrait.setFillStyle(_portColor).setVisible(true);
    this.dlgPortraitTxt.setText(headerTxt)
      .setStyle({fill: _portTxtColor, fontSize:'11px'}).setVisible(true);

    // Who's here
    const hereList = [];
    if(chandlerHere) hereList.push('Chandler 🍞');
    if(jamesHere)    hereList.push('James 📋');
    if(chanceHere)   hereList.push('Chance 🧢');
    if(leeHere)      hereList.push('Lee 💕');
    const hereTxt = partyMode
      ? '🔥 James\'s crew is out here. Time to be TERRIBLE. 🔥'
      : (hereList.length ? 'Here now: '+hereList.join(', ') : 'Just you out here.');
    this.dlgText.setText(hereTxt).setStyle({fill: partyMode ? '#ff6a00' : '#aaffaa'}).setVisible(true);

    // Hide unused buttons first
    this.dlgChoiceBtns.forEach(b=>b.setVisible(false));

    choices.slice(0,4).forEach((ch, i)=>{
      const btn = this.dlgChoiceBtns[i];
      const col = ch.hot ? '#ff4400' : '#aaffaa';
      btn.setText(`${i+1}. ${ch.label}`).setPosition(130, boxY+30+i*26)
         .setStyle({fill:col}).setVisible(true);
      btn.removeAllListeners('pointerdown');
      btn.on('pointerdown', ()=> this.handleSmokeAreaChoice(ch.id, SMOKE_X, SMOKE_Y));
      const k = this.input.keyboard.addKey(49+i);
      k.once('down', ()=>{ if(STATE.dialogueActive) this.handleSmokeAreaChoice(ch.id, SMOKE_X, SMOKE_Y); });
      this.choiceKeys.push(k);
    });

    this.dlgCloseTxt.setText('[ESC] Leave area').setVisible(true);
  }

  handleSmokeAreaChoice(choiceId, sx, sy){
    this.closeDialogue();

    const sendToSmoke = (id, line) => {
      const npc = this.npcs.find(n=>n.id===id);
      if(!npc) return;
      npc.targetX = sx + (Math.random()-0.5)*80;
      npc.targetY = sy + (Math.random()-0.5)*40;

      this.time.delayedCall(300, ()=>{ this.showBubble(npc, line); });
      this.floatText(this.player.x, this.player.y, `📞 ${npc.name} is heading out!`, '#aaffaa');
      // Also log to smoke chat
      this.time.delayedCall(320, ()=> this.postSmokeChat(id, line));
    };

  // ── ASSIGNMENT SYSTEM ──────────────────────────────────────────────────────
  showAssignment(){
    if(STATE.dialogueActive || STATE.miniGameActive) return;
    const available = this.trucks.filter(t=>!t.done);
    if(available.length === 0){
      this.floatText(this.player.x, this.player.y, '🎉 All trucks done! Bonus!', '#ffd700');
      STATE.score += 100;
      return;
    }
    const truck = Phaser.Math.RND.pick(available);
    const idx   = this.trucks.indexOf(truck);
    const james  = this.npcs.find(n=>n.id==='james');

    SFX.horn();
    if(james) this.showBubble(james, `Bay ${idx+1}! ${truck.pallets} pallets!\nGET MOVING.`);

    // Highlight the bay
    const gfx = this.add.graphics().setDepth(5);
    gfx.lineStyle(3, 0x44ff44, 1);
    gfx.strokeRect(truck.x-truck.w/2, truck.y-truck.h/2, truck.w, truck.h);
    this.tweens.add({ targets:gfx, alpha:0, duration:6000, onComplete:()=>gfx.destroy() });

    // Open dialogue with choices
    STATE.dialogueActive = true;
    this._pendingAssignTruck = truck;
    this._pendingAssignIdx   = idx;

    const boxY = GH - 145;
    this.dlgBg.setVisible(true);
    this.dlgBg.clear()
      .fillStyle(0x000a00, 0.93).fillRoundedRect(5, boxY-5, GW-10, 145, 10)
      .lineStyle(2, 0x44ff44, 0.9).strokeRoundedRect(5, boxY-5, GW-10, 145, 10);

    this.dlgPortrait.setFillStyle(0x2a5aaa).setVisible(true);
    this.dlgPortraitTxt.setText('James\n(Manager)').setStyle({fill:'#ffa01e',fontSize:'11px'}).setVisible(true);

    const jLines = [
      `"Bay ${idx+1}. ${truck.pallets} pallets. I shouldn't have to say it twice."`,
      `"You're on Bay ${idx+1}. ${truck.pallets} pallets sitting there doing nothing. GO."`,
      `"Bay ${idx+1}. ${truck.pallets} pallets. I have it on the clipboard. Move."`,
      `"I need Bay ${idx+1} cleared. ${truck.pallets} pallets. Not tomorrow. Now."`,
    ];
    const assignLine = Phaser.Math.RND.pick(jLines);
    this.dlgText.setText('James: '+assignLine).setStyle({fill:'#fff'}).setVisible(true);
    this.dlgCloseTxt.setText('[ESC] Ignore (James will notice)').setVisible(true);

    const choices = [
      `✅ On it! (Bay ${idx+1})`,
      `😎 Nah I'm good`,
      `🤔 Which bay again?`,
    ];
    this.dlgChoiceBtns.forEach(b=>b.setVisible(false));
    this.choiceKeys = [];
    choices.forEach((ch, i)=>{
      const btn = this.dlgChoiceBtns[i];
      btn.setText(`${i+1}. ${ch}`).setPosition(130, boxY+30+i*26)
         .setStyle({fill: i===1 ? '#ff8888' : '#ffd700'}).setVisible(true);
      btn.removeAllListeners('pointerdown');
      btn.on('pointerdown', ()=>{ SFX.click(); this.handleAssignmentChoice(i); });
      const k = this.input.keyboard.addKey(49+i);
      k.once('down', ()=>{ if(STATE.dialogueActive) this.handleAssignmentChoice(i); });
      this.choiceKeys.push(k);
    });
  }

  handleAssignmentChoice(idx){
    const truck = this._pendingAssignTruck;
    const truckIdx = this._pendingAssignIdx;
    this.closeDialogue();

    if(idx === 0){ // On it!
      STATE.currentTruckObj = truck;
      const james = this.npcs.find(n=>n.id==='james');
      const okLines = [
        '"Good. I don\'t want to see you back until that bay is clear."',
        '"Finally. Don\'t make me wait."',
        '"That\'s what I needed to hear. Move."',
      ];
      if(james) this.time.delayedCall(400, ()=> this.showBubble(james, Phaser.Math.RND.pick(okLines)));
      this.floatText(this.player.x, this.player.y, `🚛 Head to Bay ${truckIdx+1}! Press E at the truck.`, '#44ff44');
    }
    else if(idx === 1){ // Nah I'm good
      STATE.jamesAnnoyance = Math.min(100, STATE.jamesAnnoyance + 22);
      STATE.suspicion = Math.min(100, STATE.suspicion + 12);
      SFX.miss();
      this.cameras.main.shake(250, 0.01);
      const jamesNo = [
        '"...NAH?! NAH?! Did you just say NAH to me on MY dock?!"',
        '"Excuse me?! EXCUSE ME?! Back to work. NOW. Or I\'m calling corporate."',
        '"I\'m sorry — I don\'t think I heard you correctly. Because you didn\'t just say no."',
        `"You're going to Bay ${truckIdx+1}. I don't know what 'nah' means. Figure it out."`,
      ];
      const james = this.npcs.find(n=>n.id==='james');
      if(james) this.showBubble(james, Phaser.Math.RND.pick(jamesNo));
      this.floatText(this.player.x, this.player.y, '😬 James is FURIOUS. Suspicion +12, Annoyance +22', '#ff4400');
      const chance = this.npcs.find(n=>n.id==='chance');
      if(chance) this.time.delayedCall(2000, ()=> this.showBubble(chance, '"...did they just say nah to James. I\'m going to need a minute."'));
    }
    else { // Which bay again?
      STATE.currentTruckObj = truck;
      STATE.jamesAnnoyance = Math.min(100, STATE.jamesAnnoyance + 6);
      const james = this.npcs.find(n=>n.id==='james');
      if(james) this.showBubble(james, `"BAY ${truckIdx+1}. RIGHT THERE. THE ONE. WITH THE TRUCK. IN IT."`);
      this.floatText(this.player.x, this.player.y, `🤔 Bay ${truckIdx+1} — over there! ${truck.pallets} pallets.`, '#ffaa44');
    }
  }

  // ── NPC AI ─────────────────────────────────────────────────────────────────
  updateNPCs(delta){
    this.npcs.forEach(npc=>{
      if(npc.interacting) return;

      // ── LEE DISTRACTION MODE ────────────────────────────────────────────
      if(npc.id === 'lee' && STATE.leeDistractingJames){
        STATE.leeDistractionTimer -= delta;
        const james = this.npcs.find(n=>n.id==='james');
        if(james){
          // Walk toward James
          npc.targetX = james.sprite.x + 34;
          npc.targetY = james.sprite.y;
          // When Lee is close enough, show distraction bubbles
          const dist = Phaser.Math.Distance.Between(npc.sprite.x, npc.sprite.y, james.sprite.x, james.sprite.y);
          if(dist < 80){
            // Freeze James's patrol while distracted
            james.moveTimer = 1500;
            // Occasional chatter between Lee and James
            if(npc.bubbleTimer <= 0 && Math.random() < 0.004){
              const leeTalking = [
                '"So I heard corporate is doing surprise audits..."',
                '"James I have a question about the door sensor."',
                '"Do you think the inventory counts are accurate? I\'m worried."',
                '"You\'re doing SUCH a good job, honestly. How do you handle it all?"',
                '"I heard Pam mentioned your name in a meeting! A good way, I think!"',
                '"Between us — do you think the loading dock meets code?"',
              ];
              this.showBubble(npc, Phaser.Math.RND.pick(leeTalking));
            }
            if(james.bubbleTimer <= 0 && Math.random() < 0.004){
              const jamesDistracted = [
                '"...AUDITS?! When?! Who said that?!"',
                '"The door sensor?! I\'ve been saying that for MONTHS."',
                '"You know what, you\'re one of the few people here with any sense."',
                '"If the dock doesn\'t meet code I will PERSONALLY—"',
                '"Pam said WHAT?! Tell me everything. From the beginning."',
                '"Inventory counts?! Don\'t get me started. FOURTEEN DISCREPANCIES last quarter."',
              ];
              this.showBubble(james, Phaser.Math.RND.pick(jamesDistracted));
            }
          }
        }
        // Timer expired — Lee returns to normal
        if(STATE.leeDistractionTimer <= 0){
          STATE.leeDistractingJames = false;
          STATE.leeDistractionTimer = 0;
          const endLines = [
            '"Okay I think I bought you like 20 minutes. You\'re welcome."',
            '"He\'s now writing a 4-page email about door sensors. Go."',
            '"Mission accomplished. He thinks corporate is literally on their way."',
          ];
          this.showBubble(npc, Phaser.Math.RND.pick(endLines));
          this.floatText(this.player.x, this.player.y, '✅ Lee\'s distraction expired — nice window!', '#ff80c0');
          // Lee drifts back toward her zone
          const zone = ZONES['breakRoom'];
          npc.targetX = zone.x + 60 + Math.random() * (zone.w - 120);
          npc.targetY = zone.y + 40 + Math.random() * (zone.h - 80);
        }
        // Don't run normal movement when distracted
        // (still falls through to velocity/bubble code below)
        const dxL = npc.targetX - npc.sprite.x;
        const dyL = npc.targetY - npc.sprite.y;
        const dL = Math.hypot(dxL, dyL);
        if(dL > 10) npc.sprite.setVelocity((dxL/dL)*160, (dyL/dL)*160);
        else npc.sprite.setVelocity(0,0);
        if(Math.abs(dxL) > 5) npc.sprite.scaleX = dxL < 0 ? -1 : 1;
        npc.tag.setPosition(npc.sprite.x, npc.sprite.y - 58);
        const bcyL = npc.sprite.y < 180 ? npc.sprite.y + 28 : npc.sprite.y - 70;
        npc.bubble.setPosition(npc.sprite.x, bcyL);
        if(npc.bubble.visible) drawSpeechBubble(npc.bubbleGfx, npc.sprite.x, bcyL, npc.bubble.text, npc.bubble);
        if(npc.bubbleTimer>0){ npc.bubbleTimer-=delta; if(npc.bubbleTimer<=0){ npc.bubble.setVisible(false); npc.bubbleGfx.clear().setVisible(false); } }
        return; // skip normal AI loop for Lee while distracting
      }

      // ── SMOKE FOLLOW MODE ────────────────────────────────────────────────
      const isLeeFollow = npc.id === 'lee' && STATE.leeFollowing;
      const isSmokeFollow = STATE.smokingNPCs.includes(npc.id);
      if(isLeeFollow || isSmokeFollow){
        const atSmoke = STATE.currentZone === 'outside';
        if(atSmoke){
          // Arrived — hang around player in the smoking corner
          npc.targetX = this.player.x + 40 + Math.sin(this.gameTimer*0.001)*20;
          npc.targetY = this.player.y + 20;
          // Occasional idle chatter while smoking
          if(npc.bubbleTimer <= 0 && Math.random() < 0.002){
            const smokeLines = [
              '"This is so good. I needed this."',
              '"Don\'t look now but... okay look. See that?"',
              '"We should do this every day."',
              '"I have more tea whenever you\'re ready."',
              '"Is Pam coming? I feel like Pam\'s coming."',
            ];
            this.showBubble(npc, Phaser.Math.RND.pick(smokeLines));
          }
        } else {
          // Still walking to outside — follow player with slight offset
          npc.targetX = this.player.x - 35;
          npc.targetY = this.player.y + 15;
          if(npc.bubbleTimer <= 0 && Math.random() < 0.001){
            this.showBubble(npc, '"Keep walking, keep walking..."');
          }
        }
      } else {
        // Normal movement
        npc.moveTimer -= delta;
        if(npc.moveTimer <= 0){
          if(npc.patrol && npc.patrolPath.length>0){
            npc.patrolIndex = (npc.patrolIndex+1) % npc.patrolPath.length;
            const pt = npc.patrolPath[npc.patrolIndex];
            npc.targetX = pt.x; npc.targetY = pt.y;
            npc.moveTimer = 3000 + Math.random()*2000;
          } else {
            const zone = ZONES[npc.zone];
            npc.targetX = zone.x + 40 + Math.random()*(zone.w-80);
            npc.targetY = zone.y + 30 + Math.random()*(zone.h-60);
            npc.moveTimer = 4000 + Math.random()*4000;
          }
        }
      }

      // Move toward target
      const dx = npc.targetX - npc.sprite.x;
      const dy = npc.targetY - npc.sprite.y;
      const dist = Math.hypot(dx,dy);
      if(dist > 10){
        // Lee runs faster when following so she doesn't fall behind
        let spd = npc.patrol ? 70 : 45;
        if(STATE.leeFollowing && npc.id === 'lee') spd = 160;
        if(STATE.smokingNPCs.includes(npc.id)) spd = 150;
        npc.sprite.setVelocity((dx/dist)*spd, (dy/dist)*spd);
      } else {
        npc.sprite.setVelocity(0,0);
      }

      // Face direction (flip sprite when moving left)
      const mvx = npc.targetX - npc.sprite.x;
      if(Math.abs(mvx) > 5) npc.sprite.scaleX = mvx < 0 ? -1 : 1;

      // Update tag position (above head)
      npc.tag.setPosition(npc.sprite.x, npc.sprite.y - 58);

      // Update speech bubble position + redraw graphics
      // In the smoke area (top of world) flip bubble below head so HUD doesn't cover it
      const bcy = npc.sprite.y < 180 ? npc.sprite.y + 28 : npc.sprite.y - 70;
      npc.bubble.setPosition(npc.sprite.x, bcy);
      if(npc.bubble.visible){
        drawSpeechBubble(npc.bubbleGfx, npc.sprite.x, bcy, npc.bubble.text, npc.bubble);
      }

      // Bubble timer
      if(npc.bubbleTimer>0){
        npc.bubbleTimer -= delta;
        if(npc.bubbleTimer <= 0){
          npc.bubble.setVisible(false);
          npc.bubbleGfx.clear().setVisible(false);
        }
      }

      // ── PAM: suspicion pressure + inspection speeches ──
      if(npc.id==='pam'){
        const d = Phaser.Math.Distance.Between(this.player.x,this.player.y,npc.sprite.x,npc.sprite.y);
        if(d<120 && STATE.suspicion>30){
          STATE.suspicion = Math.min(100, STATE.suspicion+0.05*delta/16);
          if(STATE.suspicion>80 && !this._pamWarned){
            this._pamWarned=true;
            this.showBubble(npc, '"I\'m writing you up. Don\'t make it worse."');
            STATE.score = Math.max(0, STATE.score-50);
            this.floatText(this.player.x,this.player.y,'😱 PAM CAUGHT YOU! -50 pts','#ff2222');
            this.cameras.main.shake(400,0.015);
            this.time.delayedCall(5000,()=>{ this._pamWarned=false; });
          }
        }
        // Pam occasionally announces herself
        if(npc.bubbleTimer<=0 && Math.random()<0.0008){
          const pamRoam = [
            '"I am doing a walkthrough. Everyone act normal."',
            '"Productivity review. Carry on."',
            '"I can see everything from here. Just so you know."',
            '"Nothing to see here. Keep moving. Both of you."',
            '"I\'ve updated the write-up form. It has more fields now."',
            '"This is an informal check. Informal but official."',
          ];
          this.showBubble(npc, Phaser.Math.RND.pick(pamRoam));
        }
      }

      // ── CHANDLER: mutters to himself, reacts to stress ──
      if(npc.id==='chandler'){
        if(npc.bubbleTimer<=0 && Math.random()<0.0012){
          const chandlerMutters = [
            '"I have a degree. A real one. From a real school."',
            '"...Bread Boy. I can\'t believe this is my life."',
            '"I used to have ambitions. Big ones. Now I\'m here."',
            '"Just three more hours. Three more hours."',
            '"Nobody here respects the bread. Nobody."',
            '"I\'m going to update my resume tonight. For real this time."',
            '"I can feel James staring at me from over there."',
            '"...sourdough. It\'s SOURDOUGH. Why is that so hard."',
          ];
          this.showBubble(npc, Phaser.Math.RND.pick(chandlerMutters));
        }
        // Chandler reacts to high James annoyance
        if(STATE.jamesAnnoyance >= 70 && npc.bubbleTimer<=0 && Math.random()<0.004){
          this.showBubble(npc, '"...when James gets like this I just stare at my shoes and pretend I\'m somewhere else."');
        }
      }

      // ── DREW: wanders toward player occasionally to ask for money ──
      if(npc.id==='drew' && !STATE.dialogueActive){
        if(!this._drewStalking && Math.random()<0.0004){
          this._drewStalking = true;
          npc.targetX = this.player.x + 40;
          npc.targetY = this.player.y;
          const d2 = Phaser.Math.Distance.Between(npc.sprite.x,npc.sprite.y,this.player.x,this.player.y);
          if(d2 < 80 && npc.bubbleTimer<=0){
            const drewHustle = [
              '"Hey... hey you. Psst. You got like $3?"',
              '"Bro real quick — vending machine. $1.50. I have $0.48."',
              '"Okay don\'t make it weird but do you have cash on you right now."',
              '"I\'m not gonna lie I was looking for you specifically."',
            ];
            this.showBubble(npc, Phaser.Math.RND.pick(drewHustle));
            this._drewStalking = false;
          }
          this.time.delayedCall(5000, ()=>{ this._drewStalking = false; });
        }
        if(npc.bubbleTimer<=0 && Math.random()<0.0010){
          const drewIdle = [
            '"I\'m so hungry bro."',
            '"You know what sounds good right now? Literally anything."',
            '"I think the vending machine owes ME money at this point."',
            '"My card is... it\'s a whole situation. Don\'t worry about it."',
            '"I was going to bring lunch. I forgot the lunch. And my wallet."',
            '"Drew\'s Law: if there\'s free pizza anywhere in this building, I will find it."',
          ];
          this.showBubble(npc, Phaser.Math.RND.pick(drewIdle));
        }
      }

      // ── TODD: freezer zone behavior, occasionally emerges ──
      if(npc.id==='todd'){
        if(npc.bubbleTimer<=0 && Math.random()<0.0010){
          const toddCreepy = [
            '"...the temperature dropped two degrees. The freezer is happy today."',
            '"I started talking to the compressor. It listens."',
            '"It\'s been 11 hours. Or 3. Time is different here."',
            '"I found a pallet from 2009. I\'m protecting it now."',
            '"The mystery box hummed a different note today. Lower. Meaningful."',
            '"Someone moved one of my pallets. I know who did it. I\'m not saying."',
            '"I haven\'t blinked in like 20 minutes. I should blink."',
            '"Cold is just warmth that gave up. Think about it."',
          ];
          this.showBubble(npc, Phaser.Math.RND.pick(toddCreepy));
        }
      }

      // ── CHANCE: active instigator AI ───────────────────────────────────────
      if(npc.id==='chance'){
        STATE.chanceRoastTimer = (STATE.chanceRoastTimer||0) + delta;

        // Chance autonomously picks a target every ~18s and walks up to roast them
        if(STATE.chanceRoastTimer > 18000 && !STATE.chanceRoastTarget){
          STATE.chanceRoastTimer = 0;
          // Weighted target selection: Chandler 50%, Drew 30%, Lee (friendly) 20%
          const roll = Math.random();
          STATE.chanceRoastTarget = roll < 0.50 ? 'chandler' : roll < 0.80 ? 'drew' : 'lee';
        }

        if(STATE.chanceRoastTarget){
          const target = this.npcs.find(n=>n.id===STATE.chanceRoastTarget);
          if(target){
            npc.targetX = target.sprite.x + 38;
            npc.targetY = target.sprite.y;
            const dist = Phaser.Math.Distance.Between(npc.sprite.x,npc.sprite.y,target.sprite.x,target.sprite.y);
            if(dist < 75 && npc.bubbleTimer <= 0){
              // Arrived — deliver the roast or friendly chat
              if(STATE.chanceRoastTarget === 'chandler'){
                const chandlerRoasts = [
                  '"Hey Bread Boy. How\'s the sourdough business?"',
                  '"Chandler, real quick — do you put the bread on your resume or nah?"',
                  '"I was telling someone about you. I called you \'the bread guy.\' They knew immediately."',
                  '"Bro I saw you almost drop a pallet. That was CINEMA. Slow-motion and everything."',
                  '"How\'s the degree treating you? Be honest."',
                  '"Chandler I respect the fit. Very \'reluctant warehouse employee.\' You nail it every time."',
                  '"I bet your LinkedIn still says \'open to opportunities.\' Keep hoping king."',
                  '"Hey so quick question — do you like bread? No reason."',
                ];
                this.showBubble(npc, Phaser.Math.RND.pick(chandlerRoasts));
                STATE.chandlerRageLevel = Math.min(5, STATE.chandlerRageLevel + 1);
                // Chandler reacts based on rage level
                this.time.delayedCall(1200, ()=>{
                  const chandRages = [
                    ['"...please stop."','"My name is Chandler."','"I have a DEGREE."'],
                    ['"I swear to God, Chance."','"EVERY TIME."','"You know what?! Fine. FINE."'],
                    ['"I\'M GOING TO HR."','"That\'s IT. I\'ve had ENOUGH."','"You\'re DONE. You hear me?! DONE."'],
                  ];
                  const tier = Math.min(2, Math.floor(STATE.chandlerRageLevel / 2));
                  this.showBubble(target, Phaser.Math.RND.pick(chandRages[tier]));
                  if(STATE.chandlerRageLevel >= 4){
                    STATE.jamesAnnoyance = Math.min(100, STATE.jamesAnnoyance+10);
                    this.floatText(target.sprite.x, target.sprite.y-50, '😤 Chandler is LOSING IT', '#ffd700');
                  }
                });
              }
              else if(STATE.chanceRoastTarget === 'drew'){
                const drewRoasts = [
                  '"Drew. Genuinely. How much money do you owe total? Ballpark."',
                  '"Saw you staring at the vending machine for like 4 minutes. You good?"',
                  '"Drew you\'ve borrowed from like 8 people. Is there a spreadsheet? There should be."',
                  '"What happened to that $5 you borrowed from me in February? I\'m not even mad. I\'m curious."',
                  '"Drew I genuinely cannot tell if you\'re broke or if this is a lifestyle choice."',
                  '"Bro your card got declined at the vending machine. THE VENDING MACHINE."',
                  '"You should start a podcast. \'Broke But Surviving.\' I\'d listen."',
                  '"Drew I believe in you. Financially I do not. But as a person. Mostly."',
                ];
                this.showBubble(npc, Phaser.Math.RND.pick(drewRoasts));
                this.time.delayedCall(1400, ()=>{
                  const drewResponds = [
                    '"Chance please. I\'m having a hard enough day."',
                    '"BRO. NOT NOW."',
                    '"I\'m WORKING ON IT okay?! It\'s a PROCESS."',
                    '"You know what? Fair. But rude."',
                    '"I\'m going to pay everyone back. Next week probably."',
                    '"I\'m not listening. La la la la la."',
                  ];
                  this.showBubble(target, Phaser.Math.RND.pick(drewResponds));
                });
              }
              else if(STATE.chanceRoastTarget === 'lee'){ // Friendly chat
                const leeChatChance = [
                  '"Lee. Tell me everything. What did I miss."',
                  '"Okay so — and I need you to confirm — did Chandler actually cry earlier?"',
                  '"You see what happened with Drew and the vending machine? INCREDIBLE."',
                  '"Me and you need a debrief. Right now. What is going on with James today."',
                  '"Lee I have a new bit and I need a second opinion."',
                ];
                this.showBubble(npc, Phaser.Math.RND.pick(leeChatChance));
                this.time.delayedCall(1200, ()=>{
                  const leeToChance = [
                    '"OKAY so you missed SO much. Sit down—"',
                    '"I was WAITING for you to come over here."',
                    '"Okay I NEED to tell you about the break room situation."',
                    '"Finally. Nobody else here appreciates good drama."',
                    '"I have been DYING to tell someone this."',
                  ];
                  this.showBubble(target, Phaser.Math.RND.pick(leeToChance));
                });
              }
              // Reset so he picks a new target next time
              this.time.delayedCall(5000, ()=>{ STATE.chanceRoastTarget = null; });
            }
          } else {
            STATE.chanceRoastTarget = null; // target not found
          }
        }

        // Chance general idle commentary
        if(npc.bubbleTimer<=0 && !STATE.chanceRoastTarget && Math.random()<0.0008){
          this.showBubble(npc, Phaser.Math.RND.pick(npc.lines));
        }

        // Chance reacts when James annoyance is high — he loves it
        if(STATE.jamesAnnoyance >= 70 && npc.bubbleTimer<=0 && Math.random()<0.003){
          const chanceJamesReacts = [
            '"This is the BEST SHIFT I\'ve ever worked."',
            '"James is at like a 9 out of 10 right now. Phenomenal energy."',
            '"I\'m taking notes. This is content."',
            '"When James gets like this I just... watch. And learn."',
          ];
          this.showBubble(npc, Phaser.Math.RND.pick(chanceJamesReacts));
        }
      }

      // ── LEE: idle chatter in break room when not on a mission ──
      if(npc.id==='lee' && !STATE.leeDistractingJames && !STATE.leeFollowing){
        if(npc.bubbleTimer<=0 && Math.random()<0.0010){
          const leeIdle = [
            '"Okay but has anyone actually READ the break room rules? Hilarious."',
            '"I told James I was on break. He said \'you\'re always on break.\' RUDE."',
            '"Someone needs to restock the coffee. Not me. But someone."',
            '"I have been here for 6 hours and have done maybe 40 minutes of work. Allegedly."',
            '"Group chat is popping off right now. Don\'t ask."',
            '"I could be doing something important right now. I choose not to."',
          ];
          this.showBubble(npc, Phaser.Math.RND.pick(leeIdle));
        }
      }

      // ── JEFF: periodically walks up to someone and asks to smoke ─────────────
      if(npc.id==='jeff'){
        STATE.jeffAskTimer = (STATE.jeffAskTimer||0) + delta;
        if(STATE.jeffAskTimer > 22000 && !STATE.jeffAskTarget){
          STATE.jeffAskTimer = 0;
          // Pick a random target (not pam, not jeff himself)
          const candidates = ['lee','chance','chandler','drew','todd'];
          STATE.jeffAskTarget = Phaser.Math.RND.pick(candidates);
        }
        if(STATE.jeffAskTarget){
          const target = this.npcs.find(n=>n.id===STATE.jeffAskTarget);
          if(target){
            npc.targetX = target.sprite.x + 40;
            npc.targetY = target.sprite.y;
            const dist = Phaser.Math.Distance.Between(npc.sprite.x,npc.sprite.y,target.sprite.x,target.sprite.y);
            if(dist < 70 && npc.bubbleTimer <= 0){
              const askLines = [
                '"Yo... you wanna step outside real quick?"',
                '"Hey between you and me — you smoke?"',
                '"I got something. Just saying. No pressure."',
                '"You look stressed. I have a solution."',
                '"Real quick. Outside. Two minutes. Maybe five."',
              ];
              this.showBubble(npc, Phaser.Math.RND.pick(askLines));
              // Target reacts based on who they are
              this.time.delayedCall(1400, ()=>{
                if(!target) return;
                const reactions = {
                  lee:      ['"JEFF. YES. Let\'s go RIGHT NOW."', '"Oh my god yes. I needed this."'],
                  chance:   ['"You know I\'m good bro. But I respect the hustle."', '"Nah I\'m clean. But I appreciate the offer king."'],
                  chandler: ['"I\'m telling James."', '"That is HIGHLY inappropriate and I will be reporting this."'],
                  drew:     ['"Does it cost anything? Wait — I don\'t even care. Yes."', '"Bro yes. Do I need money for this?"'],
                  todd:     ['"I\'m already somewhere else mentally. So sure."', '"...I\'ve been in the freezer for 9 hours. Yes. Obviously."'],
                };
                const pool = reactions[STATE.jeffAskTarget] || ['"...maybe."'];
                this.showBubble(target, Phaser.Math.RND.pick(pool));
                // Chandler actually does tell James
                if(STATE.jeffAskTarget === 'chandler'){
                  this.time.delayedCall(3000, ()=>{
                    const james = this.npcs.find(n=>n.id==='james');
                    if(james) this.showBubble(james, '"Jeff. My office. NOW. ...After the shift. After the shift."');
                    this.floatText(npc.sprite.x, npc.sprite.y-50, '😬 Chandler snitched on Jeff!', '#ffaa00');
                  });
                }
              });
              this.time.delayedCall(6000, ()=>{ STATE.jeffAskTarget = null; });
            }
          } else {

  _drawDockView(){
    const ax = GW/2 - 240, ay = this._dockViewY || 120, aw = 480, ah = 100;
    const truckSideX = ax + aw - 90; // truck on right
    const storeSideX = ax + 10;      // storage on left
    const jx = this._jackX || GW/2;

    // Background
    this.mgDockBg.clear();
    this.mgDockBg.fillStyle(0x111822, 1);
    this.mgDockBg.fillRoundedRect(ax, ay, aw, ah, 8);
    this.mgDockBg.lineStyle(1, 0x44cc44, 0.4);
    this.mgDockBg.strokeRoundedRect(ax, ay, aw, ah, 8);

    // Floor
    this.mgDockBg.lineStyle(1, 0x333344, 0.8);
    this.mgDockBg.lineBetween(ax+5, ay+ah-12, ax+aw-5, ay+ah-12);

    // TRUCK (right side)
    this.mgDockBg.fillStyle(0x334466, 1);
    this.mgDockBg.fillRoundedRect(truckSideX, ay+8, 80, ah-20, 4);
    this.mgDockBg.fillStyle(0x22334d, 1);
    this.mgDockBg.fillRoundedRect(truckSideX+4, ay+12, 72, ah-28, 2);
    // Pallets remaining in truck
    const cols = 4, maxRows = 4;
    const palletsLeft = Math.max(0, this.mgPalletsLeft || 0);
    for(let r=0; r<maxRows; r++){
      const py = ay + ah - 18 - r*16;
      for(let c=0; c<cols; c++){
        const palIdx = r*cols + c;
        if(palIdx < palletsLeft){
          this.mgDockBg.fillStyle(0xcc8833, 0.95);
          this.mgDockBg.fillRect(truckSideX+6+c*16, py, 14, 12);
          this.mgDockBg.fillStyle(0xddaa44, 0.4);
          this.mgDockBg.fillRect(truckSideX+6+c*16, py, 14, 4);
        }
      }
    }

    // STORAGE RACK (left side)
    this.mgDockBg.fillStyle(0x222233, 1);
    this.mgDockBg.fillRect(storeSideX, ay+10, 70, ah-22);
    // Shelf lines
    this.mgDockBg.lineStyle(1, 0x333355, 0.8);
    for(let r=0;r<3;r++) this.mgDockBg.lineBetween(storeSideX, ay+10+r*28, storeSideX+70, ay+10+r*28);
    // Pallets stored (green = done)
    const stored = (this.mgPalletsTotal||0) - palletsLeft;
    for(let r=0; r<Math.min(4, Math.ceil(stored/3)); r++){
      const py = ay + ah - 18 - r*16;
      for(let c=0; c<3; c++){
        if(r*3+c < stored){
          this.mgDockBg.fillStyle(0x44cc44, 0.85);
          this.mgDockBg.fillRect(storeSideX+4+c*20, py, 17, 12);
        }
      }
    }

    // PALLET JACK (yellow — moves back and forth)
    this.mgJackGfx.clear();
    // Body
    this.mgJackGfx.fillStyle(0xffcc00, 1);
    this.mgJackGfx.fillRoundedRect(jx-22, ay+ah-30, 44, 16, 3);
    // Highlight stripe
    this.mgJackGfx.fillStyle(0xffffff, 0.18);
    this.mgJackGfx.fillRoundedRect(jx-20, ay+ah-29, 40, 5, 2);
    // Handle (left side)
    this.mgJackGfx.fillStyle(0x666666, 1);
    this.mgJackGfx.fillRoundedRect(jx-28, ay+ah-26, 8, 10, 2);
    // Forks (right side extend out)
    this.mgJackGfx.fillStyle(0xeeaa00, 1);
    this.mgJackGfx.fillRect(jx+20, ay+ah-28, 18, 5);
    this.mgJackGfx.fillRect(jx+20, ay+ah-19, 18, 5);
    // Wheels
    this.mgJackGfx.fillStyle(0x222222, 1);
    this.mgJackGfx.fillCircle(jx-18, ay+ah-14, 5);
    this.mgJackGfx.fillCircle(jx+18, ay+ah-14, 5);
    // Pallet ON the jack (when carrying)
    if(this._palletOnJack){
      this.mgJackGfx.fillStyle(0xcc8833, 0.97);
      this.mgJackGfx.fillRoundedRect(jx-16, ay+ah-42, 32, 12, 2);
      this.mgJackGfx.fillStyle(0xddaa44, 0.35);
      this.mgJackGfx.fillRoundedRect(jx-16, ay+ah-42, 32, 5, 2);
    }
  }

  floatText(x, y, text, color='#ffd700'){
    const cam = this.cameras.main;
    const sx = x - cam.scrollX;
    const sy = y - cam.scrollY;
    const t = this.add.text(sx, sy-20, text, {
      fontSize:'14px', fill:color, fontFamily:'monospace',

      onComplete:()=>t.destroy() });
  }

  // ── ZONE DETECTION ─────────────────────────────────────────────────────────
  getCurrentZone(){
    const px=this.player.x, py=this.player.y;
    for(const [key, z] of Object.entries(ZONES)){
      if(px>=z.x && px<z.x+z.w && py>=z.y && py<z.y+z.h) return key;
    }
    return 'floor';
  }

  // ── E PROMPT ──────────────────────────────────────────────────────────────
  updateEPrompt(){
    const range=90, px=this.player.x, py=this.player.y;
    let nearest=null, nearestD=range;

    this.npcs.forEach(n=>{
      const d=Phaser.Math.Distance.Between(px,py,n.sprite.x,n.sprite.y);
      if(d<nearestD){ nearestD=d; nearest={x:n.sprite.x, y:n.sprite.y-40, label:'[E] Talk to '+n.name}; }
    });
    this.interactables.forEach(o=>{
      const d=Phaser.Math.Distance.Between(px,py,o.x,o.y);
      const lbl = o.interactId==='smokearea' ? '[E] 🚬 Smoke Area Menu' : '[E] Use';
      if(d<nearestD){ nearestD=d; nearest={x:o.x, y:o.y-40, label:lbl}; }
    });
    if(STATE.currentTruckObj && !STATE.currentTruckObj.done){
      const t=STATE.currentTruckObj;
      const d=Phaser.Math.Distance.Between(px,py,t.x,t.y);
      if(d<range+50 && d<nearestD){ nearest={x:t.x, y:t.y-80, label:'[E] Unload Truck'}; }
    }

    if(nearest && !STATE.dialogueActive && !STATE.miniGameActive){
      const cam=this.cameras.main;
      this.ePrompt.setPosition(nearest.x-cam.scrollX, nearest.y-cam.scrollY-10)
        .setText(nearest.label).setVisible(true);
    } else {
      this.ePrompt.setVisible(false);
    }
  }
