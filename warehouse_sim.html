// ── PERSON SPRITE GENERATOR ────────────────────────────────────────────────
function makePersonTexture(scene, key, app){
  const W=42, H=60;
  const g = scene.make.graphics({add:false});
  const skin = app.skin  || 0xe8a87a;
  const hair  = app.hair  || 0x3a2010;
  const shirt = app.shirt || 0x4488cc;
  const pants = app.pants || 0x334466;

  g.fillEllipse(21, 59, 28, 8);

  // ── LEGS / PANTS ──
  g.fillStyle(pants, 1);
  g.fillRoundedRect(8,  40, 11, 16, 2);
  g.fillRoundedRect(23, 40, 11, 16, 2);
  // Pant crease shading
  g.fillStyle(0x000000, 0.12);
  g.fillRect(18, 40, 4, 16);
  // Shoes
  g.fillStyle(0x1a1208, 1);
  g.fillRoundedRect(6,  52, 14, 6, 3);
  g.fillRoundedRect(22, 52, 14, 6, 3);

  // ── BODY / SHIRT ──
  g.fillStyle(shirt, 1);
  g.fillRoundedRect(6, 20, 30, 22, 5);
  // Shirt bottom shading
  g.fillStyle(0x000000, 0.10);
  g.fillRoundedRect(6, 35, 30, 7, 5);

  // ── PARKA (Todd) ──
  if(app.parka){
    g.fillStyle(0x1a4422, 1);
    g.fillRoundedRect(4, 19, 34, 24, 5);
    g.fillStyle(0xffffff, 0.15);
    g.fillRoundedRect(4, 19, 34, 8, 5);
    // Fur trim
    g.fillStyle(0xcccccc, 0.7);
    g.fillRoundedRect(4, 18, 34, 5, 4);
  }

  // ── HI-VIS VEST ──
  if(app.hivis){
    g.fillStyle(0xffcc00, 0.93);
    g.fillRoundedRect(8, 21, 26, 19, 3);
    // Reflective stripes
    g.fillStyle(0xffffff, 0.65);
    g.fillRect(8, 30, 26, 3);
    g.fillRect(0, 22, 8, 3);
    g.fillRect(34, 22, 8, 3);
  }

  // ── BLAZER LAPELS (Pam) ──
  if(app.blazer){
    g.fillStyle(0x000000, 0.18);
    g.fillTriangle(14,20, 21,28, 14,38);
    g.fillTriangle(28,20, 21,28, 28,38);
    g.fillStyle(0xffffff, 0.55);
    g.fillTriangle(14,20, 21,26, 18,20);
    g.fillTriangle(28,20, 21,26, 24,20);
  }

  // ── HOODIE DETAILS (Drew) ──
  if(app.hoodie){
    g.fillStyle(0x000000, 0.20);
    g.fillRoundedRect(14, 20, 14, 8, 4);
    g.fillStyle(0x888888, 0.55);
    g.fillRect(19, 26, 2, 12);
    g.fillRect(22, 26, 2, 12);
  }

  // ── ARMS ──
  g.fillStyle(skin, 1);
  g.fillRoundedRect(0,  22, 8, 18, 4);
  g.fillRoundedRect(34, 22, 8, 18, 4);
  // Hands
  g.fillCircle(4,  40, 4);
  g.fillCircle(38, 40, 4);

  // ── CLIPBOARD (managers) ──
  if(app.clipboard){
    g.fillStyle(0xb08040, 1);
    g.fillRoundedRect(33, 24, 10, 13, 2);
    g.fillStyle(0xf0f0f0, 1);
    g.fillRect(34, 25, 8, 10);
    g.fillStyle(0xaaaaaa, 0.7);
    g.fillRect(35, 27, 6, 1);
    g.fillRect(35, 29, 6, 1);
    g.fillRect(35, 31, 4, 1);
    g.fillStyle(0x888888, 1);
    g.fillRect(37, 24, 4, 2);
  }

  // ── NECK ──
  g.fillStyle(skin, 1);
  g.fillRect(16, 16, 10, 6);

  // ── HEAD ──
  g.fillStyle(skin, 1);
  g.fillCircle(21, 10, 12);
  // Cheek blush
  g.fillStyle(0xff9999, 0.15);
  g.fillCircle(14, 12, 5);
  g.fillCircle(28, 12, 5);

  // ── HAIR ──
  g.fillStyle(hair, 1);
  g.fillCircle(21, 3, 11);
  g.fillRect(10, 3, 22, 8);
  // Sideburns
  g.fillRect(9, 8, 5, 6);

  // Irises
  g.fillStyle(0x334488, 1);

  g.fillStyle(0x111111, 1);

    g.fillStyle(0x888888, 0.7);
    g.fillRect(9, 28, 8, 1);
  }

  g.generateTexture(key, W, H);
  g.destroy();
}

// Speech bubble helper — draws a proper rounded-rect bubble with tail
function drawSpeechBubble(gfx, cx, cy, text, textObj){
  gfx.clear();
  const bounds = textObj.getBounds();
  const pad = 9;
  const bx = bounds.x - pad;
  const by = bounds.y - pad;
  const bw = Math.max(bounds.width + pad*2, 60);
  const bh = bounds.height + pad*2;
  const br = 8; // border radius

  // Shadow
  gfx.fillStyle(0x000000, 0.18);
  gfx.fillRoundedRect(bx+3, by+3, bw, bh, br);

  // Bubble fill
  gfx.fillStyle(0xffffff, 0.97);
  gfx.fillRoundedRect(bx, by, bw, bh, br);

  // Border
  gfx.lineStyle(1.5, 0x444444, 0.7);
  gfx.strokeRoundedRect(bx, by, bw, bh, br);

  // Tail pointing down toward character
  const tailX = cx;
  const tailTop = by + bh;
  gfx.fillStyle(0xffffff, 0.97);
  gfx.fillTriangle(tailX-7, tailTop, tailX+7, tailTop, tailX, tailTop+11);
  gfx.lineStyle(1.5, 0x444444, 0.7);
  gfx.strokeTriangle(tailX-7, tailTop, tailX+7, tailTop, tailX, tailTop+11);
  // Cover the border where tail meets bubble
  gfx.lineStyle(2, 0xffffff, 1);
  gfx.lineBetween(tailX-6, tailTop, tailX+6, tailTop);
}

// ═══════════════════════════════════════════════════════════════════════════
//  GAME SCENE
// ═══════════════════════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor(){ super('Game'); }

  create(){
    this.cameras.main.setBackgroundColor('#111111');

    // Build the world
    this.createMap();
    this.createWalls();
    this.createObjects();
    this.createPlayer();
    this.createNPCs();
    this.createTrucks();

    // Camera
    // Physics world bounds MUST match the game world size, not the canvas size
    this.physics.world.setBounds(0, 0, WW, WH);
    this.cameras.main.setBounds(0, 0, WW, WH);
    this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
    this.cameras.main.setZoom(GW < 600 ? 0.7 : 0.85);

    // Input
    this.cursors = this.input.keyboard.createCursorKeys();
    this.wasd = this.input.keyboard.addKeys({ up:'W', left:'A', down:'S', right:'D', interact:'E', map:'M' });
    this.input.keyboard.on('keydown-E', ()=> this.tryInteract());
    this.input.keyboard.on('keydown-M', ()=> this.toggleMiniMap());

    // Mobile touch joystick
    this.createTouchControls();

    // Timers & events
    this.gameTimer = 0; // elapsed real ms
    this.nextEventAt = 60000 + Math.random()*60000; // first random event
    this.energyDrainTimer = 0;
    this.suspicionDecayTimer = 0;
    this.npcChatterTimer = 0;
    this.patrolTimer = 0;

    // Dialogue state
    this.dialogue = null;
    this.createDialogueBox();

    // Mini-game state
    this.miniGame = null;
    this.createMiniGameUI();

    // Message log
    this.msgLog = [];
    this.createMessageLog();

    // Floating text pool
    this.floatTexts = [];

    // Minimap
    this.miniMapVisible = false;
    this.createMiniMap();

    // Start UI scene
    this.scene.launch('UI');
    this.scene.bringToTop('UI');

    // Assign first truck after short delay
    this.time.delayedCall(2000, ()=>{
      if(!STATE.dialogueActive) this.showAssignment();
    });

    console.log('GameScene created');
  }

  // ── MAP ────────────────────────────────────────────────────────────────────
  createMap(){
    const g = this.add.graphics();

    // Draw each zone
    for(const [key, z] of Object.entries(ZONES)){
      g.fillStyle(z.color, 1);
      g.fillRect(z.x, z.y, z.w, z.h);
      // Zone border
      g.lineStyle(2, 0xffa01e, 0.3);
      g.strokeRect(z.x, z.y, z.w, z.h);
      // Zone label
      this.add.text(z.x + z.w/2, z.y + 16, z.name, {
        fontSize:'13px', fill:'#ffa01e', fontFamily:'monospace',
        stroke:'#000', strokeThickness:3, alpha:0.6
      }).setOrigin(0.5, 0);
    }

    // Floor grid lines (just dock and floor)
    g.lineStyle(1, 0xffffff, 0.05);

  genPatrolPath(zone){
    const z = ZONES[zone];
    const pts = [];
    const steps = 4 + Math.floor(Math.random()*3);

      pts.push({
        x: z.x + 40 + Math.random()*(z.w-80),
        y: z.y + 30 + Math.random()*(z.h-60)
      });
    }
    return pts;
  }

  // ── PLAYER MOVEMENT ────────────────────────────────────────────────────────
  movePlayer(delta){
    const speed = 180 * (STATE.energy>0 ? 1 : 0.4);
    const cur = this.cursors;
    const w = this.wasd;
    let vx=0, vy=0;

    const left  = cur.left.isDown  || w.left.isDown  || this.joyDir.left;
    const right = cur.right.isDown || w.right.isDown || this.joyDir.right;
    const up    = cur.up.isDown    || w.up.isDown    || this.joyDir.up;
    const down  = cur.down.isDown  || w.down.isDown  || this.joyDir.down;

    if(left)  vx -= speed;
    if(right) vx += speed;
    if(up)    vy -= speed;
    if(down)  vy += speed;

    if(vx!==0 && vy!==0){ vx*=0.707; vy*=0.707; }

    if(vx||vy){
      this.player.setVelocity(vx, vy);
      // Flip sprite to face movement direction
      if(vx < 0) this.player.scaleX = -1;
      else if(vx > 0) this.player.scaleX = 1;
      // Subtle walk bob
      this._walkTick = (this._walkTick||0) + 1;
      this.player.y += Math.sin(this._walkTick * 0.3) * 0.4;
    } else {
      this.player.setVelocity(0,0);
    }
  }

  // ── TOUCH CONTROLS ─────────────────────────────────────────────────────────
  createTouchControls(){
    this.joyDir = {left:false, right:false, up:false, down:false};
    if(!this.sys.game.device.input.touch && window.innerWidth>600) return;

    const joyZone = this.add.rectangle(80, GH-80, 140, 140, 0x000000, 0)
      .setScrollFactor(0).setInteractive().setDepth(50);

    const joyBase = this.add.circle(80, GH-80, 55, 0xffffff, 0.1)
      .setScrollFactor(0).setDepth(50);
    const joyKnob = this.add.circle(80, GH-80, 22, 0xffa01e, 0.7)
      .setScrollFactor(0).setDepth(51);

    // Interact button
    const intBtn = this.add.circle(GW-70, GH-80, 32, 0xffa01e, 0.7)
      .setScrollFactor(0).setInteractive().setDepth(50);
    this.add.text(GW-70, GH-80, 'E', {fontSize:'18px',fill:'#fff',fontFamily:'monospace'})
      .setScrollFactor(0).setDepth(51).setOrigin(0.5);
    intBtn.on('pointerdown', ()=> this.tryInteract());

    const baseX=80, baseY=GH-80, deadzone=10;
    this.input.on('pointermove', ptr=>{
      const dx=ptr.x-baseX, dy=ptr.y-baseY, d=Math.hypot(dx,dy);
      if(ptr.isDown && d>deadzone && ptr.x<160){
        const max=50;
        const kx=baseX+Phaser.Math.Clamp(dx,-max,max);
        const ky=baseY+Phaser.Math.Clamp(dy,-max,max);
        joyKnob.setPosition(kx,ky);
        this.joyDir.left  = dx < -deadzone;
        this.joyDir.right = dx > deadzone;
        this.joyDir.up    = dy < -deadzone;
        this.joyDir.down  = dy > deadzone;
      }
    });
    this.input.on('pointerup', ()=>{
      joyKnob.setPosition(baseX,baseY);
      this.joyDir = {left:false,right:false,up:false,down:false};
    });
  }

  openDialogue(npc){
    if(STATE.dialogueActive || STATE.miniGameActive) return;
    STATE.dialogueActive = true;
    this.dialogue = npc;
    this.player.setVelocity(0,0);

    // Gossip mode: Lee + following + outside = switch to gossip dialogue
    const gossipMode = (npc.id === 'lee' && STATE.leeFollowing && STATE.currentZone === 'outside');

    const choices = gossipMode ? npc.gossipChoices : npc.choices;

    let line;
    if(gossipMode){
      const gossipOpeners = [
        '"Okay okay okay, I HAVE to tell you something."',
        '"Girl... you will NOT believe what I heard."',
        '"Right, so. Nobody is supposed to know this but—"',
        '"Okay so this stays between us. Who do you want to start with?"',
      ];
      line = Phaser.Math.RND.pick(gossipOpeners);
    } else if(npc.id === 'lee' && STATE.leeFollowing){
      line = '"We\'re almost at the smokers corner! Keep walking, don\'t look suspicious."';
    } else {
      line = Phaser.Math.RND.pick(npc.lines);
    }

    // Draw background (gossip = pink tinted)
    this.dlgBg.clear().setVisible(true);
    this.dlgBg.fillStyle(gossipMode ? 0x1a0010 : 0x000000, 0.88);
    this.dlgBg.fillRect(0, GH-165, GW, 165);
    this.dlgBg.lineStyle(2, gossipMode ? 0xff60c0 : 0xffa01e, 0.6);
    this.dlgBg.strokeRect(0, GH-165, GW, 165);
    if(gossipMode){
      // Smoke emoji trail
      this.dlgBg.fillStyle(0xff80c0, 0.06);
      for(let i=0;i<8;i++) this.dlgBg.fillCircle(20+i*110, GH-155+20, 18+i*3);
    }

    // Portrait
    this.dlgPortrait.setFillStyle(npc.color).setVisible(true);
    const portraitLabel = gossipMode ? 'Lee 🚬\n(Gossip)' : npc.name+'\n'+npc.title;
    this.dlgPortraitTxt.setText(portraitLabel).setVisible(true);

    // Text
    this.dlgText.setText((gossipMode ? '🚬 Lee: ' : npc.name+': ')+line).setVisible(true);
    this.dlgCloseTxt.setVisible(true);

    // Choices
    choices.forEach((choice, i)=>{
      const btn = this.dlgChoiceBtns[i];
      btn.setText(`${i+1}. ${choice}`).setPosition(130, GH-112+i*26).setVisible(true);
      btn.removeAllListeners('pointerdown');
      btn.on('pointerdown', ()=> gossipMode ? this.handleGossip(npc, i) : this.handleChoice(npc, i));

    choices.forEach((_, i) => {

      k.once('down', ()=>{ if(STATE.dialogueActive){
        gossipMode ? this.handleGossip(npc, i) : this.handleChoice(npc, i);

    });

  // ── UNLOADING MINI-GAME ────────────────────────────────────────────────────
  createMiniGameUI(){
    this.mgBg   = this.add.graphics().setScrollFactor(0).setDepth(90).setVisible(false);
    this.mgTitle= this.add.text(GW/2, 60, '', {fontSize:'20px',fill:'#ffa01e',fontFamily:'monospace',stroke:'#000',strokeThickness:4})
      .setOrigin(0.5).setScrollFactor(0).setDepth(91).setVisible(false);
    this.mgPrompt=this.add.text(GW/2, GH/2-20, '', {fontSize:'48px',fill:'#fff',fontFamily:'monospace',stroke:'#000',strokeThickness:4})
      .setOrigin(0.5).setScrollFactor(0).setDepth(91).setVisible(false);
    this.mgStatus=this.add.text(GW/2, GH/2+50, '', {fontSize:'16px',fill:'#aaa',fontFamily:'monospace'})
      .setOrigin(0.5).setScrollFactor(0).setDepth(91).setVisible(false);
    this.mgBar  = this.add.graphics().setScrollFactor(0).setDepth(91).setVisible(false);
    this.mgScore=this.add.text(GW/2, GH-80, '', {fontSize:'18px',fill:'#ffd700',fontFamily:'monospace'})
      .setOrigin(0.5).setScrollFactor(0).setDepth(91).setVisible(false);
    this.mgQuit = this.add.text(GW-20, GH-20, '[Q] Stop Unloading', {fontSize:'11px',fill:'rgba(255,255,255,0.5)',fontFamily:'monospace'})
      .setOrigin(1,1).setScrollFactor(0).setDepth(91).setVisible(false).setInteractive();
    this.mgQuit.on('pointerdown',()=>this.endMiniGame(false));
    this.input.keyboard.on('keydown-Q', ()=>{ if(STATE.miniGameActive) this.endMiniGame(false); });
  }

  startMiniGame(truckIdx){
    if(STATE.dialogueActive || STATE.miniGameActive) return;
    if(truckIdx < 0 || truckIdx >= this.trucks.length || this.trucks[truckIdx].done) return;

    STATE.miniGameActive = true;
    STATE.currentTruck = truckIdx;
    this.mgTruck = this.trucks[truckIdx];
    this.mgPalletsTotal = this.mgTruck.pallets;
    this.mgPalletsLeft = this.mgPalletsTotal;
    this.mgHits = 0; this.mgMisses = 0;
    this.mgCombo = 0; this.mgPts = 0;
    this.mgTimeLeft = 45000; // 45 seconds
    this.mgKeys = ['←','→','↑','↓','SPACE'];
    this.mgKeyMap = { 'ArrowLeft':'←','ArrowRight':'→','ArrowUp':'↑','ArrowDown':'↓',' ':'SPACE' };
    this.mgCurrentKey = '';
    this.mgWindowLeft = 0;
    this.mgShowNext();

    // Show UI
    this.mgBg.clear().setVisible(true);
    this.mgBg.fillStyle(0x000000, 0.9);
    this.mgBg.fillRect(0,0,GW,GH);
    this.mgBg.fillStyle(0x1a2a1a,1);
    this.mgBg.fillRoundedRect(GW/2-300, 40, 600, GH-80, 16);
    this.mgBg.lineStyle(2,0x44cc44,0.8);
    this.mgBg.strokeRoundedRect(GW/2-300, 40, 600, GH-80, 16);

    [this.mgTitle,this.mgPrompt,this.mgStatus,this.mgBar,this.mgScore,this.mgQuit].forEach(o=>o.setVisible(true));
    this.mgTitle.setText(`🚛 UNLOADING TRUCK ${truckIdx+1}  —  ${this.mgPalletsTotal} PALLETS`);

    // Key listener for mini-game
    this.mgKeyListener = (event)=>{
      if(!STATE.miniGameActive) return;
      const pressed = this.mgKeyMap[event.key];
      if(!pressed) return;
      this.mgCheckPress(pressed);
    };
    window.addEventListener('keydown', this.mgKeyListener);

    // Tap for mobile
    this.mgTapArea = this.add.rectangle(GW/2, GH/2, 400, 200, 0, 0)
      .setScrollFactor(0).setDepth(95).setInteractive();
    this.mgTapArea.on('pointerdown', ()=> this.mgCheckPress(this.mgCurrentKey));

    this.mgLoop = this.time.addEvent({
      delay: 100, loop: true,
      callback: ()=>{
        if(!STATE.miniGameActive) return;
        this.mgTimeLeft -= 100;
        this.mgWindowLeft -= 100;
        if(this.mgWindowLeft <= 0 && this.mgPalletsLeft > 0){
          this.mgMisses++; this.mgCombo=0;
          this.mgStatus.setText('❌ Missed! Combo reset.').setStyle({fill:'#ff6666'});
          this.mgShowNext();
        }
        if(this.mgTimeLeft<=0 || this.mgPalletsLeft<=0) this.endMiniGame(this.mgPalletsLeft<=0);
        this.mgUpdateBar();
      }
    });
  }

  mgShowNext(){
    if(this.mgPalletsLeft <= 0){ this.endMiniGame(true); return; }
    const opts = ['←','→','↑','↓'];
    this.mgCurrentKey = opts[Math.floor(Math.random()*opts.length)];
    this.mgWindowLeft = 2000 - this.mgHits * 8; // gets harder
    this.mgWindowLeft = Math.max(700, this.mgWindowLeft);
    this.mgPrompt.setText(this.mgCurrentKey);
    // Flash animation
    this.tweens.add({ targets:this.mgPrompt, scaleX:[1.4,1], scaleY:[1.4,1], duration:200 });
    this.mgScore.setText(`✅ ${this.mgHits} pallets  |  Combo ×${this.mgCombo+1}  |  +${this.mgPts} pts`);
  }

  mgCheckPress(key){
    if(key === this.mgCurrentKey){
      this.mgHits++; this.mgCombo++; this.mgPalletsLeft--;
      const pts = 10 * this.mgCombo;
      this.mgPts += pts;
      STATE.score += pts;
      STATE.energy = Math.max(0, STATE.energy - 1.5);
      this.mgStatus.setText(`✅ PALLET! Combo ×${this.mgCombo} (+${pts} pts)`).setStyle({fill:'#44ff44'});
      this.tweens.add({ targets:this.mgPrompt, y:GH/2-40, yoyo:true, duration:100 });
      this.mgShowNext();
    } else {
      this.mgMisses++; this.mgCombo=0;
      this.mgStatus.setText('❌ Wrong key! Pallet dropped.').setStyle({fill:'#ff4444'});
      this.tweens.add({ targets:this.mgPrompt, x:GW/2+10, yoyo:true, duration:80, repeat:2,
        onComplete:()=>this.mgPrompt.setX(GW/2) });
    }
  }

  mgUpdateBar(){
    this.mgBar.clear();
    const pct = this.mgTimeLeft/45000;
    const bw = 500, bh = 16, bx = GW/2-250, by = 100;
    this.mgBar.fillStyle(0x333333,1); this.mgBar.fillRect(bx,by,bw,bh);
    const col = pct>0.5?0x44cc44:pct>0.25?0xffaa00:0xff3333;
    this.mgBar.fillStyle(col,1); this.mgBar.fillRect(bx,by,bw*pct,bh);
    this.mgBar.lineStyle(1,0xffffff,0.3); this.mgBar.strokeRect(bx,by,bw,bh);
    // Pallets remaining bar
    const pp = 1 - (this.mgPalletsLeft/this.mgPalletsTotal);
    this.mgBar.fillStyle(0x225522,1); this.mgBar.fillRect(bx,by+24,bw,8);
    this.mgBar.fillStyle(0x44ff44,1); this.mgBar.fillRect(bx,by+24,bw*pp,8);
  }

  endMiniGame(success){
    if(!STATE.miniGameActive) return;
    STATE.miniGameActive = false;
    if(this.mgLoop){ this.mgLoop.remove(); this.mgLoop=null; }
    if(this.mgKeyListener){ window.removeEventListener('keydown',this.mgKeyListener); this.mgKeyListener=null; }
    if(this.mgTapArea){ this.mgTapArea.destroy(); this.mgTapArea=null; }

    const truck = this.trucks[STATE.currentTruck];
    if(truck){
      const ratio = this.mgHits / this.mgPalletsTotal;
      const bonus = Math.floor(ratio * 100);
      STATE.score += bonus;
      STATE.trucksUnloaded++;
      STATE.suspicion = Math.max(0, STATE.suspicion - 20);

      if(ratio >= 0.5){ truck.done = true; truck.label.setText('✅ Done!').setStyle({fill:'#44cc44'}); }
      const msg = ratio >= 0.8 ? '💪 Great unload! +'+bonus+' pts' :
                  ratio >= 0.5 ? '👍 Decent work. +'+bonus+' pts' :
                  '😬 Sloppy. +'+bonus+' pts';
      this.floatText(this.player.x, this.player.y, msg, '#ffd700');

      if(STATE.trucksUnloaded >= 3 && !STATE.achievements.includes('3_trucks')){
        STATE.achievements.push('3_trucks');
        this.floatText(this.player.x, this.player.y-40, '🏆 ACHIEVEMENT: Workhorse!', '#ffa01e');
      }
    }

    [this.mgBg,this.mgTitle,this.mgPrompt,this.mgStatus,this.mgBar,this.mgScore,this.mgQuit].forEach(o=>o.setVisible(false));
    STATE.currentTruck = null;

    // Check next assignment
    this.time.delayedCall(1500, ()=>{ if(!STATE.dialogueActive) this.showAssignment(); });
  }

  // ── INTERACTION ────────────────────────────────────────────────────────────
  tryInteract(){
    if(STATE.dialogueActive || STATE.miniGameActive) return;

    const range = 90;
    const px = this.player.x, py = this.player.y;

    // Check NPCs
    for(const npc of this.npcs){
      const d = Phaser.Math.Distance.Between(px,py,npc.sprite.x,npc.sprite.y);
      if(d < range){ this.openDialogue(npc); return; }
    }

    // Check trucks
    for(let i=0;i<this.trucks.length;i++){
      const t = this.trucks[i];
      if(!t.done && t === STATE.currentTruckObj){
        const d = Phaser.Math.Distance.Between(px,py,t.x,t.y);
        if(d < range+50){ this.startMiniGame(i); return; }
      }
    }

    // Check interactables
    for(const obj of this.interactables){
      const d = Phaser.Math.Distance.Between(px,py,obj.x,obj.y);
      if(d < range){ this.useObject(obj.interactId); return; }
    }
  }

  useObject(id){
    const responses = {
      timeclock: ()=>{ this.floatText(this.player.x,this.player.y,'⏱ Clocked in!',  '#44ff44'); STATE.score+=5; },
      tldesk:    ()=>{ this.showAssignment(); },
      vending:   ()=>{ STATE.energy=Math.min(100,STATE.energy+15); this.floatText(this.player.x,this.player.y,'🥤 Energy +15!','#44aaff'); STATE.score+=2; },
      coffee:    ()=>{ STATE.energy=Math.min(100,STATE.energy+25); this.floatText(this.player.x,this.player.y,'☕ Coffee! Energy +25!','#cc8844'); STATE.score+=3; },
      fridge:    ()=>{ STATE.energy=Math.min(100,STATE.energy+20); this.floatText(this.player.x,this.player.y,'🧊 Snack! Energy +20','#44ddff'); STATE.score+=3; },
      smoke:     ()=>{ STATE.energy=Math.min(100,STATE.energy+30); STATE.suspicion=Math.max(0,STATE.suspicion-10); this.floatText(this.player.x,this.player.y,'🚬 Smoke break! Suspicion -10','#aaff88'); STATE.score+=5; },
      extinguisher:()=>{ this.fireExtinguisher(); },
      mysterybox:()=>{ this.openMysteryBox(); },
    };
    if(responses[id]) responses[id]();
  }

  fireExtinguisher(){
    const pam = this.npcs.find(n=>n.id==='pam');
    STATE.score += 50;
    STATE.suspicion = Math.min(100, STATE.suspicion+40);
    this.floatText(this.player.x, this.player.y, '🧯 FIRE EXTINGUISHER! Chaos +50pts', '#ff4444');
    if(pam){ this.showBubble(pam, '"WHAT ARE YOU DOING?!"'); }
    this.cameras.main.shake(500, 0.02);
    if(!STATE.achievements.includes('chaos_agent')){
      STATE.achievements.push('chaos_agent');
      this.time.delayedCall(1000, ()=>
        this.floatText(this.player.x,this.player.y-50,'🏆 ACHIEVEMENT: Chaos Agent!','#ff4444'));
    }
  }

  openMysteryBox(){
    const outcomes = [
      ['Extra Large Pizza (Todd\'s)', 80, '🍕 +80 pts!'],
      ['A single fry', 1, '🍟 ...just one fry. +1 pt.'],
      ['Chandler\'s lunch', 40, '🥪 You ate Chandler\'s lunch! +40'],
      ['Todd\'s secret stash', 100, '🧊 Todd\'s STASH! +100 pts!!'],
      ['A letter from HR', -20, '📋 HR letter... -20 pts.'],
    ];
    const [msg, pts, txt] = Phaser.Math.RND.pick(outcomes);
    STATE.score = Math.max(0, STATE.score+pts);
    this.floatText(this.player.x, this.player.y, txt, '#44ccff');
    if(pts>=100 && !STATE.achievements.includes('mystery_winner')){
      STATE.achievements.push('mystery_winner');
      this.time.delayedCall(1000,()=>this.floatText(this.player.x,this.player.y-50,'🏆 ACHIEVEMENT: Mystery Winner!','#ffd700'));
    }
  }

  // ── ASSIGNMENT SYSTEM ──────────────────────────────────────────────────────
  showAssignment(){
    if(STATE.dialogueActive || STATE.miniGameActive) return;
    const available = this.trucks.filter(t=>!t.done);
    if(available.length === 0){
      this.floatText(this.player.x, this.player.y, '🎉 All trucks done! Bonus!', '#ffd700');
      STATE.score += 100;
      return;
    }
    const truck = Phaser.Math.RND.pick(available);
    STATE.currentTruckObj = truck;
    const idx = this.trucks.indexOf(truck);

    const james = this.npcs.find(n=>n.id==='james');
    if(james) this.showBubble(james, `Go to Bay ${idx+1}!\n${truck.pallets} pallets!`);
    this.floatText(this.player.x, this.player.y, `📋 Assigned: Bay ${idx+1} (${truck.pallets} pallets)\nWalk to the truck & press E`, '#ffa01e');

    // Highlight the bay
    const gfx = this.add.graphics().setDepth(5);
    gfx.lineStyle(3, 0x44ff44, 1);
    gfx.strokeRect(truck.x-truck.w/2, truck.y-truck.h/2, truck.w, truck.h);
    this.tweens.add({ targets:gfx, alpha:0, duration:3000, onComplete:()=>gfx.destroy() });
  }

  // ── NPC AI ─────────────────────────────────────────────────────────────────
  updateNPCs(delta){
    this.npcs.forEach(npc=>{
      if(npc.interacting) return;

      // ── LEE DISTRACTION MODE ────────────────────────────────────────────
      if(npc.id === 'lee' && STATE.leeDistractingJames){
        STATE.leeDistractionTimer -= delta;
        const james = this.npcs.find(n=>n.id==='james');
        if(james){
          // Walk toward James
          npc.targetX = james.sprite.x + 34;
          npc.targetY = james.sprite.y;
          // When Lee is close enough, show distraction bubbles
          const dist = Phaser.Math.Distance.Between(npc.sprite.x, npc.sprite.y, james.sprite.x, james.sprite.y);
          if(dist < 80){
            // Freeze James's patrol while distracted
            james.moveTimer = 1500;
            // Occasional chatter between Lee and James
            if(npc.bubbleTimer <= 0 && Math.random() < 0.004){
              const leeTalking = [
                '"So I heard corporate is doing surprise audits..."',
                '"James I have a question about the door sensor."',
                '"Do you think the inventory counts are accurate? I\'m worried."',
                '"You\'re doing SUCH a good job, honestly. How do you handle it all?"',
                '"I heard Pam mentioned your name in a meeting! A good way, I think!"',
                '"Between us — do you think the loading dock meets code?"',
              ];
              this.showBubble(npc, Phaser.Math.RND.pick(leeTalking));
            }
            if(james.bubbleTimer <= 0 && Math.random() < 0.004){
              const jamesDistracted = [
                '"...AUDITS?! When?! Who said that?!"',
                '"The door sensor?! I\'ve been saying that for MONTHS."',
                '"You know what, you\'re one of the few people here with any sense."',
                '"If the dock doesn\'t meet code I will PERSONALLY—"',
                '"Pam said WHAT?! Tell me everything. From the beginning."',
                '"Inventory counts?! Don\'t get me started. FOURTEEN DISCREPANCIES last quarter."',
              ];
              this.showBubble(james, Phaser.Math.RND.pick(jamesDistracted));
            }
          }
        }
        // Timer expired — Lee returns to normal
        if(STATE.leeDistractionTimer <= 0){
          STATE.leeDistractingJames = false;
          STATE.leeDistractionTimer = 0;
          const endLines = [
            '"Okay I think I bought you like 20 minutes. You\'re welcome."',
            '"He\'s now writing a 4-page email about door sensors. Go."',
            '"Mission accomplished. He thinks corporate is literally on their way."',
          ];
          this.showBubble(npc, Phaser.Math.RND.pick(endLines));
          this.floatText(this.player.x, this.player.y, '✅ Lee\'s distraction expired — nice window!', '#ff80c0');
          // Lee drifts back toward her zone
          const zone = ZONES['breakRoom'];
          npc.targetX = zone.x + 60 + Math.random() * (zone.w - 120);
          npc.targetY = zone.y + 40 + Math.random() * (zone.h - 80);
        }
        // Don't run normal movement when distracted
        // (still falls through to velocity/bubble code below)
        const dxL = npc.targetX - npc.sprite.x;
        const dyL = npc.targetY - npc.sprite.y;
        const dL = Math.hypot(dxL, dyL);
        if(dL > 10) npc.sprite.setVelocity((dxL/dL)*160, (dyL/dL)*160);
        else npc.sprite.setVelocity(0,0);
        if(Math.abs(dxL) > 5) npc.sprite.scaleX = dxL < 0 ? -1 : 1;
        npc.tag.setPosition(npc.sprite.x, npc.sprite.y - 58);
        const bcyL = npc.sprite.y - 70;
        npc.bubble.setPosition(npc.sprite.x, bcyL);
        if(npc.bubble.visible) drawSpeechBubble(npc.bubbleGfx, npc.sprite.x, bcyL, npc.bubble.text, npc.bubble);
        if(npc.bubbleTimer>0){ npc.bubbleTimer-=delta; if(npc.bubbleTimer<=0){ npc.bubble.setVisible(false); npc.bubbleGfx.clear().setVisible(false); } }
        return; // skip normal AI loop for Lee while distracting
      }

      // ── SMOKE FOLLOW MODE ────────────────────────────────────────────────
      const isLeeFollow = npc.id === 'lee' && STATE.leeFollowing;
      const isSmokeFollow = STATE.smokingNPCs.includes(npc.id);
      if(isLeeFollow || isSmokeFollow){
        const atSmoke = STATE.currentZone === 'outside';
        if(atSmoke){
          // Arrived — hang around player in the smoking corner
          npc.targetX = this.player.x + 40 + Math.sin(this.gameTimer*0.001)*20;
          npc.targetY = this.player.y + 20;
          // Occasional idle chatter while smoking
          if(npc.bubbleTimer <= 0 && Math.random() < 0.002){
            const smokeLines = [
              '"This is so good. I needed this."',
              '"Don\'t look now but... okay look. See that?"',
              '"We should do this every day."',
              '"I have more tea whenever you\'re ready."',
              '"Is Pam coming? I feel like Pam\'s coming."',
            ];
            this.showBubble(npc, Phaser.Math.RND.pick(smokeLines));
          }
        } else {
          // Still walking to outside — follow player with slight offset
          npc.targetX = this.player.x - 35;
          npc.targetY = this.player.y + 15;
          if(npc.bubbleTimer <= 0 && Math.random() < 0.001){
            this.showBubble(npc, '"Keep walking, keep walking..."');
          }
        }
      } else {
        // Normal movement
        npc.moveTimer -= delta;
        if(npc.moveTimer <= 0){
          if(npc.patrol && npc.patrolPath.length>0){
            npc.patrolIndex = (npc.patrolIndex+1) % npc.patrolPath.length;
            const pt = npc.patrolPath[npc.patrolIndex];
            npc.targetX = pt.x; npc.targetY = pt.y;
            npc.moveTimer = 3000 + Math.random()*2000;
          } else {
            const zone = ZONES[npc.zone];
            npc.targetX = zone.x + 40 + Math.random()*(zone.w-80);
            npc.targetY = zone.y + 30 + Math.random()*(zone.h-60);
            npc.moveTimer = 4000 + Math.random()*4000;
          }
        }
      }

      // Move toward target
      const dx = npc.targetX - npc.sprite.x;
      const dy = npc.targetY - npc.sprite.y;
      const dist = Math.hypot(dx,dy);
      if(dist > 10){
        // Lee runs faster when following so she doesn't fall behind
        let spd = npc.patrol ? 70 : 45;
        if(STATE.leeFollowing && npc.id === 'lee') spd = 160;
        if(STATE.smokingNPCs.includes(npc.id)) spd = 150;
        npc.sprite.setVelocity((dx/dist)*spd, (dy/dist)*spd);
      } else {
        npc.sprite.setVelocity(0,0);
      }

      // Face direction (flip sprite when moving left)
      const mvx = npc.targetX - npc.sprite.x;
      if(Math.abs(mvx) > 5) npc.sprite.scaleX = mvx < 0 ? -1 : 1;

      // Update tag position (above head)
      npc.tag.setPosition(npc.sprite.x, npc.sprite.y - 58);

      // Update speech bubble position + redraw graphics
      const bcy = npc.sprite.y - 70;
      npc.bubble.setPosition(npc.sprite.x, bcy);
      if(npc.bubble.visible){
        drawSpeechBubble(npc.bubbleGfx, npc.sprite.x, bcy, npc.bubble.text, npc.bubble);
      }

      // Bubble timer
      if(npc.bubbleTimer>0){
        npc.bubbleTimer -= delta;
        if(npc.bubbleTimer <= 0){
          npc.bubble.setVisible(false);
          npc.bubbleGfx.clear().setVisible(false);
        }
      }

      // Pam suspicion check
      if(npc.id==='pam'){
        const d = Phaser.Math.Distance.Between(this.player.x,this.player.y,npc.sprite.x,npc.sprite.y);
        if(d<120 && STATE.suspicion>30){
          STATE.suspicion = Math.min(100, STATE.suspicion+0.05*delta/16);
          if(STATE.suspicion>80 && !this._pamWarned){
            this._pamWarned=true;
            this.showBubble(npc, '"I\'m writing you up."');
            STATE.score = Math.max(0, STATE.score-50);
            this.floatText(this.player.x,this.player.y,'😱 PAM CAUGHT YOU! -50 pts','#ff2222');
            this.cameras.main.shake(400,0.015);
            this.time.delayedCall(5000,()=>{ this._pamWarned=false; });
          }
        }
      }
    });
  }

  showBubble(npc, text){
    if(!npc) return;
    npc.bubble.setText(text).setVisible(true);
    npc.bubbleGfx.setVisible(true);
    npc.bubbleTimer = 3500;
  }

  // ── FLOATING TEXT ──────────────────────────────────────────────────────────
  floatText(x, y, text, color='#ffd700'){
    const cam = this.cameras.main;
    const sx = x - cam.scrollX;
    const sy = y - cam.scrollY;
    const t = this.add.text(sx, sy-20, text, {
      fontSize:'14px', fill:color, fontFamily:'monospace',
      stroke:'#000', strokeThickness:3, align:'center',
      wordWrap:{width:320}
    }).setOrigin(0.5,1).setScrollFactor(0).setDepth(100);
    this.tweens.add({ targets:t, y:sy-80, alpha:0, duration:2200,
      onComplete:()=>t.destroy() });
  }

  // ── ZONE DETECTION ─────────────────────────────────────────────────────────
  getCurrentZone(){
    const px=this.player.x, py=this.player.y;
    for(const [key, z] of Object.entries(ZONES)){
      if(px>=z.x && px<z.x+z.w && py>=z.y && py<z.y+z.h) return key;
    }
    return 'floor';
  }

  // ── MINI MAP ───────────────────────────────────────────────────────────────
  createMiniMap(){
    this.mmGfx = this.add.graphics().setScrollFactor(0).setDepth(60).setVisible(false);
    this.mmPlayerDot = this.add.circle(0,0,4,0xffa01e).setScrollFactor(0).setDepth(61).setVisible(false);
  }

  toggleMiniMap(){
    this.miniMapVisible = !this.miniMapVisible;
    this.mmGfx.setVisible(this.miniMapVisible);
    this.mmPlayerDot.setVisible(this.miniMapVisible);
    if(this.miniMapVisible) this.drawMiniMap();
  }

  drawMiniMap(){
    const scale=0.1, ox=GW-210, oy=GH-120;
    this.mmGfx.clear();
    this.mmGfx.fillStyle(0x000000,0.8); this.mmGfx.fillRect(ox-5,oy-5,WW*scale+10,WH*scale+10);
    for(const [k,z] of Object.entries(ZONES)){
      this.mmGfx.fillStyle(z.color,1);
      this.mmGfx.fillRect(ox+z.x*scale, oy+z.y*scale, z.w*scale, z.h*scale);
    }
    this.mmGfx.lineStyle(1,0xffa01e,0.4); this.mmGfx.strokeRect(ox-5,oy-5,WW*scale+10,WH*scale+10);
    this.mmPlayerDot.setPosition(ox+this.player.x*scale, oy+this.player.y*scale);
    // NPC dots
    this.npcs.forEach(n=>{
      this.mmGfx.fillStyle(n.color,0.9);
      this.mmGfx.fillCircle(ox+n.sprite.x*scale, oy+n.sprite.y*scale, 3);
    });
  }

  // ── MESSAGE LOG ────────────────────────────────────────────────────────────
  createMessageLog(){
    this.msgLogBg = this.add.rectangle(GW-2,2,200,90,0x000000,0.5)
      .setOrigin(1,0).setScrollFactor(0).setDepth(50);
    this.msgLogTexts = [];
    for(let i=0;i<4;i++){
      this.msgLogTexts.push(this.add.text(GW-10, 8+i*20, '', {
        fontSize:'10px', fill:'rgba(255,255,255,0.6)', fontFamily:'monospace', align:'right'
      }).setOrigin(1,0).setScrollFactor(0).setDepth(51));
    }
  }

  logMsg(msg){
    this.msgLog.unshift(msg);
    if(this.msgLog.length>4) this.msgLog.pop();
    this.msgLogTexts.forEach((t,i)=>t.setText(this.msgLog[i]||''));
  }

  // ── E PROMPT ──────────────────────────────────────────────────────────────
  updateEPrompt(){
    const range=90, px=this.player.x, py=this.player.y;
    let nearest=null, nearestD=range;

    this.npcs.forEach(n=>{
      const d=Phaser.Math.Distance.Between(px,py,n.sprite.x,n.sprite.y);
      if(d<nearestD){ nearestD=d; nearest={x:n.sprite.x, y:n.sprite.y-40, label:'[E] Talk to '+n.name}; }
    });
    this.interactables.forEach(o=>{
      const d=Phaser.Math.Distance.Between(px,py,o.x,o.y);
      if(d<nearestD){ nearestD=d; nearest={x:o.x, y:o.y-40, label:'[E] Use'}; }
    });
    if(STATE.currentTruckObj && !STATE.currentTruckObj.done){
      const t=STATE.currentTruckObj;
      const d=Phaser.Math.Distance.Between(px,py,t.x,t.y);
      if(d<range+50 && d<nearestD){ nearest={x:t.x, y:t.y-80, label:'[E] Unload Truck'}; }
    }

    if(nearest && !STATE.dialogueActive && !STATE.miniGameActive){
      const cam=this.cameras.main;
      this.ePrompt.setPosition(nearest.x-cam.scrollX, nearest.y-cam.scrollY-10)
        .setText(nearest.label).setVisible(true);
    } else {
      this.ePrompt.setVisible(false);
    }
  }

  // ── CAUGHT (suspicion = 100) ──────────────────────────────────────────────
  triggerCaught(){
    STATE.miniGameActive = true; // freeze movement
    this.cameras.main.shake(600, 0.025);
    this.cameras.main.flash(400, 200, 0, 0);

    // Pam and James converge on player
    const pam   = this.npcs.find(n=>n.id==='pam');

      '"I\'ve been in that cab since 4AM. I am NOT in the mood."',
      '"WHICH ONE OF YOU is responsible for DOOR ASSIGNMENTS?! I\'ll wait."',
      '"I told y\'all I had a LIVE load. Do you know what LIVE means?! IT BREATHES."',
    ];
    const rant = Phaser.Math.RND.pick(TRUCKER_RANTS);

    // Trucker name bubble
    const tBubbleTxt = this.add.text(tx, 160, rant, {
      fontSize:'12px', fill:'#111', fontFamily:'monospace',
      wordWrap:{width:200}, align:'center', resolution:2
    }).setOrigin(0.5,1).setDepth(20);
    const tBubbleGfx = this.add.graphics().setDepth(19);

    // Name tag
    const tTag = this.add.text(tx, 145, '🚛 Truck Driver', {
      fontSize:'10px', fill:'#ff8844', fontFamily:'monospace',
      stroke:'#000', strokeThickness:3, backgroundColor:'rgba(0,0,0,0.7)',
      padding:{x:4,y:2}
    }).setOrigin(0.5,1).setDepth(20);

    // Make trucker walk toward James or the center dock
    const james = this.npcs.find(n=>n.id==='james');
    let destX = james ? james.sprite.x : 600;
    let destY = james ? james.sprite.y : 350;

    // Update trucker each frame via a timer
    const updateTrucker = this.time.addEvent({ delay:16, loop:true, callback:()=>{
      const dx = destX - trucker.x, dy = destY - trucker.y;
      const d = Math.hypot(dx,dy);
      if(d > 15){
        trucker.setVelocity((dx/d)*110, (dy/d)*110);
        trucker.scaleX = dx < 0 ? -1 : 1;
      } else {
        trucker.setVelocity(0,0);
      }
      tTag.setPosition(trucker.x, trucker.y - 58);
      tBubbleTxt.setPosition(trucker.x, trucker.y - 70);
      drawSpeechBubble(tBubbleGfx, trucker.x, trucker.y-70, rant, tBubbleTxt);
    }});

    // Raise suspicion + James annoyance
    STATE.suspicion = Math.min(99, STATE.suspicion + 12);
    STATE.jamesAnnoyance = Math.min(100, STATE.jamesAnnoyance + 25);
    this.floatText(WW/2, 280, '🚛 ANGRY TRUCK DRIVER ON THE DOCK!', '#ff6622');
    if(james) this.showBubble(james, '"Sir. SIR. Please lower your voice. Or don\'t. I\'m used to it."');

    // Trucker leaves after 12 seconds
    this.time.delayedCall(12000, ()=>{
      updateTrucker.remove();
      trucker.setVelocity(-120, -60);
      // Fade and destroy
      this.tweens.add({ targets:[trucker, tBubbleTxt, tTag], alpha:0, duration:1200,
        onComplete:()=>{ trucker.destroy(); tBubbleTxt.destroy(); tTag.destroy(); tBubbleGfx.destroy(); }
      });
      this._truckerActive = false;
      this.floatText(WW/2, 280, '🚛 Trucker left (still angry, probably)', '#ff8844');
    });
  }

  // ── SHIFT END ──────────────────────────────────────────────────────────────
  endShift(reason='normal'){
    STATE.miniGameActive = false; STATE.dialogueActive = false;
    const final = STATE.score;
    const isNew = final > SAVE.highScore;
    if(isNew) SAVE.highScore = final;
    SAVE.shifts++;
    savePersist();

    // Show end screen via UI scene
    this.scene.get('UI').showEndScreen(final, isNew, reason);
  }

  // ── UPDATE ─────────────────────────────────────────────────────────────────
  update(time, delta){
    if(STATE.miniGameActive){ return; }

    this.movePlayer(delta);
    this.updateNPCs(delta);

    // Tick game clock (display only — no time limit, game ends on lose conditions)
    this.gameTimer += delta;
    STATE.gameMinutes += (delta/1000) * (60/120);
    if(STATE.gameMinutes >= 24*60) STATE.gameMinutes = 7*60; // clock wraps around (endless)

    // LOSE: Energy hits 0 → you passed out / got sent home
    if(STATE.energy <= 0 && !STATE._caught && !STATE.dialogueActive){
      STATE._caught = true;
      this.triggerPassedOut();
      return;
    }

    // Zone detection
    STATE.currentZone = this.getCurrentZone();

    // Energy drain
    this.energyDrainTimer += delta;
    if(this.energyDrainTimer > 8000){ // drain every 8 real seconds
      const moving = this.player.body.speed > 10;
      if(moving) STATE.energy = Math.max(0, STATE.energy - 3);
      // Regen in break room / restroom / outside
      if(['breakRoom','restroom','outside'].includes(STATE.currentZone)){
        STATE.energy = Math.min(100, STATE.energy + 5);
      }
      this.energyDrainTimer = 0;
    }

    // Suspicion decay when in break zone or working
    this.suspicionDecayTimer += delta;
    if(this.suspicionDecayTimer > 5000){
      if(['breakRoom','restroom','outside'].includes(STATE.currentZone)){
        STATE.suspicion = Math.max(0, STATE.suspicion - 2);
      }
      this.suspicionDecayTimer = 0;
    }

    // Suspicion = 100 → CAUGHT (lose condition)
    if(STATE.suspicion >= 100 && !STATE._caught && !STATE.dialogueActive){
      STATE._caught = true;
      this.triggerCaught();
      return;
    }

    // James annoyance passive decay (he calms down when you're working)
    STATE.jamesAnnoyanceTimer += delta;
    if(STATE.jamesAnnoyanceTimer > 20000){
      STATE.jamesAnnoyanceTimer = 0;
      if(STATE.currentZone === 'dock' || STATE.currentZone === 'floor'){
        STATE.jamesAnnoyance = Math.max(0, STATE.jamesAnnoyance - 3);
      }
    }

    // James starts yelling when annoyance is high
    if(STATE.jamesAnnoyance >= 50 && !STATE.dialogueActive){
      const james = this.npcs.find(n=>n.id==='james');
      if(james && james.bubbleTimer <= 0){
        const line = STATE.jamesAnnoyance >= 80
          ? Phaser.Math.RND.pick(JAMES_NUCLEAR)
          : Phaser.Math.RND.pick(JAMES_SALTY);
        this.showBubble(james, '"'+line+'"');
        if(STATE.jamesAnnoyance >= 80){
          // His yelling raises everyone's suspicion
          STATE.suspicion = Math.min(99, STATE.suspicion + 8);
          this.floatText(james.sprite.x, james.sprite.y-40, '😤 JAMES IS LOSING IT!', '#ff4400');
        }
      }
    }

    // Random event
    if(this.gameTimer >= this.nextEventAt && !STATE.dialogueActive){
      this.triggerRandomEvent();
    }

    // NPC chatter
    this.npcChatterTimer += delta;
    if(this.npcChatterTimer > 12000){
      this.npcChatterTimer = 0;
      const npc = Phaser.Math.RND.pick(this.npcs);
      this.showBubble(npc, Phaser.Math.RND.pick(npc.lines));
    }

    // Player name tag (above head — origin is at feet so offset by full height)
    this.playerTag.setPosition(this.player.x, this.player.y-66);

    // E prompt
    this.updateEPrompt();

    // Mini map (update if visible)
    if(this.miniMapVisible) this.drawMiniMap();

    // Peak rush score bonus
    if(this._peakRush && this.player.body.speed > 50) STATE.score++;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  UI SCENE  —  HUD overlay (runs in parallel)
// ═══════════════════════════════════════════════════════════════════════════
class UIScene extends Phaser.Scene {
  constructor(){ super('UI'); }

  create(){
    this.createHUD();
    this.endShown = false;
  }

  createHUD(){
    const pad=10;

    // Background bar top
    this.add.rectangle(GW/2, 0, GW, 46, 0x000000, 0.75).setOrigin(0.5,0).setDepth(40);

    // Clock
    this.clockTxt = this.add.text(GW/2, 24, '7:00 AM', {
      fontSize:'16px', fill:'#ffa01e', fontFamily:'monospace', fontStyle:'bold'
    }).setOrigin(0.5).setDepth(41);
    this.dayTxt = this.add.text(GW/2, 40, '☀ SHIFT IN PROGRESS', {
      fontSize:'10px', fill:'rgba(255,160,30,0.5)', fontFamily:'monospace'
    }).setOrigin(0.5).setDepth(41);

    // Score
    this.scoreTxt = this.add.text(10, 24, 'Score: 0', {
      fontSize:'14px', fill:'#ffd700', fontFamily:'monospace', fontStyle:'bold'
    }).setOrigin(0,0.5).setDepth(41);

    // Energy bar
    this.add.text(GW-130, 10, 'ENERGY', {fontSize:'9px',fill:'#44cc44',fontFamily:'monospace'}).setDepth(41);
    this.energyBg  = this.add.rectangle(GW-130+45, 10, 110, 10, 0x222222).setOrigin(0,0).setDepth(41);
    this.energyBar = this.add.rectangle(GW-130+45, 10, 110, 10, 0x44cc44).setOrigin(0,0).setDepth(42);
    this.energyTxt = this.add.text(GW-130+45+115, 14, '100%', {fontSize:'9px',fill:'#44cc44',fontFamily:'monospace'}).setOrigin(0,0.5).setDepth(42);

    // Suspicion bar
    this.add.text(GW-130, 24, 'SUSPICION', {fontSize:'9px',fill:'#ff6644',fontFamily:'monospace'}).setDepth(41);
    this.suspBg  = this.add.rectangle(GW-130+60, 24, 95, 10, 0x222222).setOrigin(0,0).setDepth(41);
    this.suspBar = this.add.rectangle(GW-130+60, 24, 95, 10, 0xcc2200).setOrigin(0,0).setDepth(42);
    this.suspTxt = this.add.text(GW-130+60+100, 28, '0%', {fontSize:'9px',fill:'#ff6644',fontFamily:'monospace'}).setOrigin(0,0.5).setDepth(42);

    // Zone label bottom
    this.zoneTxt = this.add.text(GW/2, GH-5, '', {
      fontSize:'11px', fill:'rgba(255,160,30,0.55)', fontFamily:'monospace'
    }).setOrigin(0.5,1).setDepth(41);

    // Achievements ticker
    this.achTxt = this.add.text(10, GH-5, '', {
      fontSize:'10px', fill:'#ffd700', fontFamily:'monospace'
    }).setOrigin(0,1).setDepth(41);

    // Controls hint
    this.add.text(10, GH-18, 'WASD: Move  |  E: Interact  |  M: Map  |  Q: Stop unloading', {
      fontSize:'9px', fill:'rgba(255,255,255,0.25)', fontFamily:'monospace'
    }).setOrigin(0,1).setDepth(41);

    this.lastAch = '';
    this.lastAchLen = 0;
  }

  update(){
    // Clock
    const h = Math.floor(STATE.gameMinutes/60);
    const m = Math.floor(STATE.gameMinutes%60);
    const ap = h>=12?'PM':'AM';
    const h12 = h>12?h-12:h===0?12:h;
    this.clockTxt.setText(`${h12}:${m<10?'0'+m:m} ${ap}`);
    const pctShift = (STATE.gameMinutes - 7*60) / (STATE.shiftEnd - 7*60);
    this.clockTxt.setStyle({ fill: pctShift>0.85?'#ff4444':pctShift>0.6?'#ffaa00':'#ffa01e' });

    // Score
    this.scoreTxt.setText('⭐ '+STATE.score);

    // Energy bar
    const epct = STATE.energy/100;
    this.energyBar.setSize(110*epct, 10);
    this.energyBar.setFillStyle(epct>0.5?0x44cc44:epct>0.25?0xffaa00:0xff3333);
    this.energyTxt.setText(Math.round(STATE.energy)+'%');

    // Suspicion bar
    const spct = STATE.suspicion/100;
    this.suspBar.setSize(95*spct, 10);
    this.suspBar.setFillStyle(spct>0.7?0xff2200:spct>0.4?0xff6600:0xcc4400);
    this.suspTxt.setText(Math.round(STATE.suspicion)+'%');
    if(STATE.suspicion>80) this.suspTxt.setStyle({fill:'#ff2200'});

    // Zone
    const zoneName = ZONES[STATE.currentZone]?.name || '';
    this.zoneTxt.setText('📍 '+zoneName);

    // Achievements
    if(STATE.achievements.length > this.lastAchLen){
      this.lastAchLen = STATE.achievements.length;
      this.lastAch = '🏆 '+STATE.achievements[STATE.achievements.length-1];
    }
    this.achTxt.setText(this.lastAch);
  }

  showEndScreen(score, isNew, reason='normal'){
    if(this.endShown) return;
    this.endShown = true;

    const reasonData = {
      caught:     { title:'🚨 YOU GOT FIRED 🚨',       sub:'Pam has your personal items in a box.',         color:0xff2222 },
      passedout:  { title:'💤 YOU PASSED OUT',          sub:'James had to call your emergency contact.',      color:0x4444cc },
      normal:     { title:'🏁 SHIFT SURVIVED!',         sub:STATE.playerName+"'s shift is done.",            color:0xffa01e },
    };
    const rd = reasonData[reason] || reasonData.normal;
    const headColor = isNew ? '#ffd700' : ('#'+rd.color.toString(16).padStart(6,'0'));

    const bg = this.add.rectangle(GW/2, GH/2, GW, GH, 0x000000, 0.93).setDepth(200);
    this.add.text(GW/2, 60, isNew && reason==='normal' ? '🏆 NEW HIGH SCORE! 🏆' : rd.title, {
      fontSize:'26px', fill:headColor, fontFamily:'monospace', fontStyle:'bold', stroke:'#000', strokeThickness:4
    }).setOrigin(0.5).setDepth(201);
    this.add.text(GW/2, 108, rd.sub, {
      fontSize:'13px', fill:'#aaa', fontFamily:'monospace'
    }).setOrigin(0.5).setDepth(201);

    // Stats
    const stats = [
      ['Final Score', score + ' pts'],
      ['Trucks Unloaded', STATE.trucksUnloaded],
      ['Suspicion Level', Math.round(STATE.suspicion)+'%'],
      ['Energy Remaining', Math.round(STATE.energy)+'%'],
      ['Achievements', STATE.achievements.length],
      ['Drew owes you', '$'+(STATE.drewLends*5)],
      ['Chandler provocations', STATE.chandlerCallCount+' times'],
      ['All-time High Score', SAVE.highScore + ' pts'],
      ['Shifts Survived', SAVE.shifts],
    ];
    stats.forEach(([label, val], i)=>{
      this.add.text(GW/2-160, 200+i*34, label+':', {fontSize:'14px',fill:'#888',fontFamily:'monospace'}).setOrigin(0,0.5).setDepth(201);
      this.add.text(GW/2+160, 200+i*34, String(val), {fontSize:'14px',fill:'#ffd700',fontFamily:'monospace',fontStyle:'bold'}).setOrigin(1,0.5).setDepth(201);
    });

    // Rank
    const rank = score >= 2000 ? 'LEGEND 🌟' : score >= 1000 ? 'PRO WORKER 💪' : score >= 500 ? 'DECENT EMPLOYEE 🙂' : score >= 200 ? 'TRYING 😅' : 'CHANDLER TIER 🍞';
    this.add.text(GW/2, GH-130, 'RANK: '+rank, {
      fontSize:'20px', fill:'#ffa01e', fontFamily:'monospace', fontStyle:'bold', stroke:'#000', strokeThickness:3
    }).setOrigin(0.5).setDepth(201);

    // Play again button
    const btn = this.add.rectangle(GW/2, GH-60, 220, 46, 0xcc6800)
      .setInteractive().setDepth(201);
    this.add.text(GW/2, GH-60, '▶ PLAY AGAIN', {fontSize:'16px',fill:'#fff',fontFamily:'monospace',fontStyle:'bold'})
      .setOrigin(0.5).setDepth(202);
    btn.on('pointerdown',()=>{ location.reload(); });
    btn.on('pointerover',()=>btn.setFillStyle(0xff8800));
    btn.on('pointerout',()=>btn.setFillStyle(0xcc6800));
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  GAME BOOTSTRAP
// ═══════════════════════════════════════════════════════════════════════════
let game = null;

function startGame(mode){
  const nameEl = document.getElementById('playerNameInput');
  STATE.playerName = (nameEl.value.trim() || 'Worker').substring(0,12);
  STATE.mode = mode;
  STATE.energy = mode === 'chaos' ? 80 : 100;
  STATE.suspicion = mode === 'chaos' ? 20 : 0;
  STATE.score = mode === 'chaos' ? 0 : 0;

  document.getElementById('menu-overlay').style.display = 'none';

  if(game){ game.destroy(true); }
  game = new Phaser.Game({
    type: Phaser.AUTO,
    width: GW, height: GH,
    parent: document.body,
    backgroundColor: '#111111',
    physics: { default:'arcade', arcade:{ gravity:{y:0}, debug:false } },
    scene: [GameScene, UIScene],
    scale: {
      mode: Phaser.Scale.FIT,
      autoCenter: Phaser.Scale.CENTER_BOTH,
    }
  });
}

document.getElementById('goodWorkerBtn').onclick = ()=> startGame('good');
document.getElementById('chaosBtn').onclick       = ()=> startGame('chaos');
document.getElementById('playerNameInput').addEventListener('keydown', e=>{
  if(e.key==='Enter') startGame('good');
});
</script>
