<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Paper James</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a1628;overflow:hidden;font-family:'Segoe UI',system-ui,Arial,sans-serif;user-select:none;touch-action:none;}
canvas{display:block;}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10;}
.screen{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;background:rgba(5,12,30,0.93);padding:16px;}
.screen.active{display:flex;}
.card{background:linear-gradient(160deg,rgba(20,40,80,0.98),rgba(8,18,45,0.99));border:1px solid rgba(100,160,255,0.22);border-radius:20px;padding:32px 28px;width:min(480px,100%);display:flex;flex-direction:column;align-items:center;gap:14px;max-height:90vh;overflow-y:auto;}
.card h1{font-size:clamp(26px,6vw,42px);font-weight:900;color:#fff;text-shadow:0 0 30px rgba(80,160,255,0.5);}
.card h2{font-size:18px;font-weight:800;color:#7eb8ff;margin-bottom:4px;}
.stat{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:5px 14px;font-size:13px;font-weight:700;color:rgba(255,255,255,0.85);}
.stat span{color:#7eb8ff;}
.btn{border:none;border-radius:12px;padding:13px 22px;font-weight:900;font-size:16px;cursor:pointer;font-family:inherit;transition:transform .12s;}
.btn:active{transform:scale(0.96);}
.btn-primary{background:linear-gradient(135deg,#1e5ccc,#3b8ef0);color:#fff;width:100%;font-size:18px;box-shadow:0 6px 24px rgba(30,90,200,0.45);}
.btn-secondary{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.9);border:1px solid rgba(255,255,255,0.15);}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;}
.upg-item{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s;}
.upg-item:hover{background:rgba(255,255,255,0.1);}
.upg-item.maxed{opacity:0.5;cursor:default;}
.upg-name{flex:1;color:#fff;font-weight:700;font-size:14px;}
.upg-desc{color:rgba(255,255,255,0.5);font-size:12px;}
.upg-cost{color:#ffd700;font-weight:800;font-size:14px;white-space:nowrap;}
.upg-lvl{font-size:20px;}
.map-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;}
.map-tile{border-radius:12px;padding:14px;cursor:pointer;border:2px solid transparent;transition:all .15s;text-align:center;}
.map-tile.sel{border-color:#3b8ef0;box-shadow:0 0 16px rgba(59,142,240,0.4);}
.map-tile.locked{opacity:0.4;cursor:default;}
.map-name{font-weight:800;font-size:15px;color:#fff;}
.map-sub{font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px;}
#hint{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.55);color:#fff;font-weight:700;font-size:15px;padding:10px 22px;border-radius:24px;pointer-events:none;z-index:15;transition:opacity .3s;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">✈️ Click & drag to aim — release to launch!</div>

<!-- MENU -->
<div class="screen active" id="menuScreen">
  <div class="card">
    <h1>✈️ Paper James</h1>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
      <div class="stat">Best: <span id="mBest">0 ft</span></div>
      <div class="stat">Coins: <span id="mCoins">0</span></div>
      <div class="stat">Level: <span id="mLevel">1</span></div>
    </div>
    <button class="btn btn-primary" id="startBtn">▶ LAUNCH</button>
    <div class="btn-row">
      <button class="btn btn-secondary" id="mapsBtn">🗺 Maps</button>
      <button class="btn btn-secondary" id="upgsBtn">⬆ Upgrades</button>
    </div>
  </div>
</div>

<!-- MAPS -->
<div class="screen" id="mapsScreen">
  <div class="card">
    <h2>Choose Map</h2>
    <div class="map-grid" id="mapGrid"></div>
    <button class="btn btn-secondary" id="mapsBack">← Back</button>
  </div>
</div>

<!-- UPGRADES -->
<div class="screen" id="upgsScreen">
  <div class="card">
    <h2>Upgrades &nbsp; 🪙 <span id="uCoins">0</span></h2>
    <div id="upgList" style="width:100%;display:flex;flex-direction:column;gap:8px;"></div>
    <button class="btn btn-secondary" id="upgsBack">← Back</button>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="resultScreen">
  <div class="card">
    <h1 id="rGrade">B</h1>
    <div id="rLabel" style="color:rgba(255,255,255,0.7);font-size:14px;text-align:center;"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px;">
      <div class="stat">Distance: <span id="rDist">0 ft</span></div>
      <div class="stat">Coins: <span id="rCoins">0</span></div>
      <div class="stat">Rings: <span id="rRings">0</span></div>
      <div class="stat">XP: <span id="rXp">0</span></div>
    </div>
    <div id="rLevelNote" style="color:#7eb8ff;font-weight:800;font-size:14px;text-align:center;"></div>
    <div id="rBest" style="color:#ffd700;font-weight:800;font-size:15px;display:none;">🏆 New Best!</div>
    <button class="btn btn-primary" id="rPlayBtn">▶ PLAY AGAIN</button>
    <button class="btn btn-secondary" id="rMenuBtn">Menu</button>
  </div>
</div>

<script>
// ── CANVAS SETUP ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ── MAPS ──────────────────────────────────────────────────────────────────────
const MAPS = [
  { key:'backyard', name:'Backyard',    emoji:'🌳', cost:0,
    skyTop:'#1a6abf', skyBot:'#a8d8f0', groundColor:'#3a7d44', groundLine:'#4a9e55',
    gravity:0.09, wind:0.012, gust:0.035, sink:0.000, weather:'Calm breeze', thermals:8, coinBonus:1, horizon:0.78,
    decoFn:'backyard', desc:'Classic. Forgiving.' },
  { key:'city',     name:'City',        emoji:'🏙', cost:500,
    skyTop:'#1a2030', skyBot:'#bbc8d8', groundColor:'#3a3a3a', groundLine:'#555',
    gravity:0.10, wind:0.025, gust:0.075, sink:0.004, weather:'Crosswind between buildings', thermals:5, coinBonus:1.5, horizon:0.72,
    decoFn:'city', desc:'+50% coins, wind tunnels.' },
  { key:'desert',   name:'Desert',      emoji:'🌵', cost:1000,
    skyTop:'#7a3010', skyBot:'#f0a060', groundColor:'#c8a050', groundLine:'#e0b860',
    gravity:0.10, wind:0.035, gust:0.095, sink:-0.002, weather:'Hot rising air', thermals:14, coinBonus:1.2, horizon:0.80,
    decoFn:'desert', desc:'Strong thermals, brutal crosswind.' },
  { key:'storm',    name:'Storm',       emoji:'⛈', cost:3000,
    skyTop:'#100820', skyBot:'#3a2850', groundColor:'#2a2a2a', groundLine:'#333',
    gravity:0.095, wind:0.06, gust:0.22, sink:0.010, weather:'Heavy gusts and downdrafts', thermals:3, coinBonus:2.0, horizon:0.76,
    decoFn:'storm', desc:'Chaos. 2× coins. Lightning.' },
  { key:'moon',     name:'Moon',        emoji:'🌙', cost:5000,
    skyTop:'#000005', skyBot:'#0c0e22', groundColor:'#6a6a72', groundLine:'#9090a0',
    gravity:0.038, wind:0, gust:0, sink:0, weather:'No atmosphere', thermals:0, coinBonus:1.5, horizon:0.84,
    decoFn:'moon', desc:'0.4× gravity. Huge distances.' },
];

// ── UPGRADES ──────────────────────────────────────────────────────────────────
const UPGRADES = [
  { key:'flaps', name:'Wing Fold', icon:'WG', desc:'Cleaner wing folds add stable lift',
    levels:[{cost:0,label:'Loose notebook fold',unlock:1},{cost:120,label:'Sharp creased wings',unlock:2},{cost:300,label:'Symmetric glider fold',unlock:4},{cost:620,label:'Precision airfoil fold',unlock:7}] },
  { key:'nose',  name:'Nose Crease', icon:'NC', desc:'Balanced nose reduces wobble and drag',
    levels:[{cost:0,label:'Soft nose',unlock:1},{cost:110,label:'Pinched nose crease',unlock:2},{cost:260,label:'Tape-reinforced nose',unlock:5},{cost:560,label:'Balanced nose weight',unlock:8}] },
  { key:'band',  name:'Launch Grip', icon:'LG', desc:'Better release gives more launch speed',
    levels:[{cost:0,label:'Two-finger toss',unlock:1},{cost:90,label:'Consistent wrist snap',unlock:3},{cost:240,label:'Rubber-band launcher',unlock:6},{cost:520,label:'Calibrated launch rig',unlock:9}] },
  { key:'paper', name:'Paper Stock', icon:'PS', desc:'Better paper holds shape longer',
    levels:[{cost:0,label:'Printer paper',unlock:1},{cost:140,label:'Card-stock blend',unlock:4},{cost:340,label:'Waxed sheet',unlock:7},{cost:700,label:'Competition stock',unlock:10}] },
];
const LIFT_K   = [0.40, 0.50, 0.62, 0.76];
const DRAG_K   = [0.0018, 0.0014, 0.0010, 0.0007];
const SPD_MULT = [1.0, 1.20, 1.45, 1.75];
const PAPER_RES = [0.9992, 0.99935, 0.9995, 0.99965];

const LEVELS = [
  { lvl:1, xp:0, title:'Hallway Rookie' },
  { lvl:2, xp:120, title:'Desk Pilot' },
  { lvl:3, xp:300, title:'Backyard Glider' },
  { lvl:4, xp:560, title:'Fold Technician' },
  { lvl:5, xp:920, title:'Airflow Apprentice' },
  { lvl:6, xp:1400, title:'Launch Specialist' },
  { lvl:7, xp:2050, title:'Thermal Hunter' },
  { lvl:8, xp:2900, title:'Distance Chaser' },
  { lvl:9, xp:4000, title:'Precision Pilot' },
  { lvl:10, xp:5400, title:'Paper Ace' },
];

// ── SAVE DATA ──────────────────────────────────────────────────────────────────
let best    = +localStorage.getItem('pj_best')    || 0;
let coins   = +localStorage.getItem('pj_coins')   || 0;
let xp      = +localStorage.getItem('pj_xp')      || 0;
let mapKey  =  localStorage.getItem('pj_map')     || 'backyard';
let unlocked= (() => { try { return JSON.parse(localStorage.getItem('pj_unlocked') || '["backyard"]'); } catch(e){ return ['backyard']; }})();
let upgs    = (() => { try { return JSON.parse(localStorage.getItem('pj_upgs') || '{"flaps":0,"nose":0,"band":0,"paper":0}'); } catch(e){ return {flaps:0,nose:0,band:0,paper:0}; }})();

function save(){
  localStorage.setItem('pj_best', best);
  localStorage.setItem('pj_coins', coins);
  localStorage.setItem('pj_xp', xp);
  localStorage.setItem('pj_map', mapKey);
  localStorage.setItem('pj_unlocked', JSON.stringify(unlocked));
  localStorage.setItem('pj_upgs', JSON.stringify(upgs));
}

function currentMap(){ return MAPS.find(m=>m.key===mapKey) || MAPS[0]; }
function currentLevel(){
  let cur = LEVELS[0];
  for(const lvl of LEVELS){ if(xp >= lvl.xp) cur = lvl; }
  return cur;
}
function nextLevel(){
  return LEVELS.find(lvl => lvl.xp > xp) || null;
}
function stats(){
  return {
    liftK:   LIFT_K[upgs.flaps   || 0],
    dragK:   DRAG_K[upgs.nose    || 0],
    spdMult: SPD_MULT[upgs.band  || 0],
    airRes:  PAPER_RES[upgs.paper || 0],
  };
}

// ── WORLD ─────────────────────────────────────────────────────────────────────
const WORLD = 18000;
let clouds=[], thermals=[], rings=[], decos=[], particles=[];
let tik=0;

function rnd(a,b){ return a + Math.random()*(b-a); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function buildWorld(){
  const map = currentMap();
  clouds=[]; thermals=[]; rings=[]; decos=[]; particles=[]; tik=0;

  // Clouds
  if(map.key !== 'moon'){
    for(let i=0;i<20;i++){
      clouds.push({ x:rnd(100,WORLD), y:rnd(30, H*0.5), r:rnd(28,80), a:rnd(0.25,0.6) });
    }
  }

  // Thermals
  for(let i=0;i<map.thermals;i++){
    thermals.push({ x: rnd(300 + i*(WORLD/Math.max(map.thermals,1)), 300 + (i+1)*(WORLD/Math.max(map.thermals,1))),
      y: H*0.15 + rnd(0, H*0.45), r: rnd(30,60), str: rnd(0.8,1.6) });
  }

  // Rings - spread across world
  const nRings = map.key==='city' ? 22 : 14;
  for(let i=0;i<nRings;i++){
    rings.push({ x: rnd(400+i*(WORLD/nRings), 400+(i+1)*(WORLD/nRings)-60),
      y: H*0.12 + rnd(0, H*0.58), r:rnd(20,34), hit:false, flash:0, value: rnd(1,3)|0 });
  }

  // Decorations - dense near start so you see them immediately
  buildDecos(map, 150, 3000, 30);
  buildDecos(map, 3000, WORLD, 55);
}

function buildDecos(map, x0, x1, count){
  const gy = H * map.horizon;
  for(let i=0;i<count;i++){
    const wx = rnd(x0, x1);
    switch(map.decoFn){
      case 'backyard': addBackyardDeco(wx, gy); break;
      case 'city':     addCityDeco(wx, gy);     break;
      case 'desert':   addDesertDeco(wx, gy);   break;
      case 'storm':    addStormDeco(wx, gy);     break;
      case 'moon':     addMoonDeco(wx, gy);      break;
    }
  }
}

function addBackyardDeco(wx, gy){
  const t = pick(['tree','tree','house','fence']);
  if(t==='tree')  decos.push({type:'tree', wx, h:rnd(35,65), w:rnd(18,32), color:pick(['#3a8040','#2d7035','#4a9048'])});
  else if(t==='house') decos.push({type:'house', wx, w:rnd(50,80), h:rnd(38,56), wall:pick(['#e8cba8','#c8b4a0','#b8ccd8']), roof:pick(['#8b4030','#604040','#405060'])});
  else decos.push({type:'fence', wx, w:rnd(50,100)});
}
function addCityDeco(wx, gy){
  if(Math.random()<0.8){
    const bw=rnd(40,80), bh=rnd(90,240);
    decos.push({type:'building', wx, h:bh, w:bw, color:pick(['#2a3040','#303848','#222a38']), winR:Math.floor(bh/17)|0, winC:Math.floor(bw/15)|0});
  } else {
    decos.push({type:'lamp', wx, h:rnd(36,52)});
  }
}
function addDesertDeco(wx, gy){
  const t = pick(['cactus','cactus','dune']);
  if(t==='cactus') decos.push({type:'cactus', wx, h:rnd(28,56)});
  else decos.push({type:'dune', wx, w:rnd(80,180), h:rnd(16,36)});
}
function addStormDeco(wx, gy){
  decos.push({type:'tree', wx, h:rnd(30,55), w:rnd(14,28), color:'#1a2a18'});
}
function addMoonDeco(wx, gy){
  const t = pick(['crater','crater','rock','flag']);
  if(t==='crater') decos.push({type:'crater', wx, r:rnd(8,28)});
  else if(t==='rock') decos.push({type:'rock', wx, w:rnd(8,20), h:rnd(5,14)});
  else decos.push({type:'flag', wx});
}

// ── PLANE STATE ───────────────────────────────────────────────────────────────
let plane={}, camX=0, dist=0, wind=0, gust=0, stallWarn=0;
let mouseX=0, mouseY=0;
let isDragging=false, aimX=0, aimY=0, aimStartX=0, aimStartY=0;
let coinsRun=0, ringsRun=0, xpRun=0, runStartLevel=1;
let msgText='', msgAlpha=0, msgTimer=0;

const LAUNCH_X = 180;

function resetPlane(){
  const map = currentMap();
  plane = { x:LAUNCH_X, y:H*0.42, vx:0, vy:0, angle:-0.15, trail:[], alive:true };
  camX=0; dist=0; coinsRun=0; ringsRun=0; xpRun=0; runStartLevel=currentLevel().lvl; wind=0; gust=0; stallWarn=0;
  isDragging=false; mouseY=H*0.42;
  msgText=''; msgAlpha=0; msgTimer=0;
}

// ── PHYSICS ───────────────────────────────────────────────────────────────────
const AIR_RES = 0.9992;

function physics(){
  if(!plane.alive) return;
  const map = currentMap();
  const s = stats();
  const gy = H * map.horizon;
  tik++;

  // Wind drift and weather gusts
  wind += (Math.random()-0.5) * map.wind * 0.3;
  wind = Math.max(-0.12, Math.min(0.12, wind * 0.97 + map.wind * 0.02));
  gust *= 0.94;
  if(map.gust && tik % 150 === 0){
    gust += (Math.random()-0.5) * map.gust;
    showMsg(pick(['Crosswind shift','Gust front','Weather changed','Trim the nose']));
  }

  // Storm extra gusts
  if(map.key==='storm' && tik%90===0){ gust += (Math.random()-0.5)*0.28; plane.vy += 0.45; showMsg(pick(['GUST!','Downdraft!','Turbulence!','Wind says no.'])); }

  // Steering — mouse Y controls pitch
  const norm = (mouseY / H) * 2 - 1; // -1 top, +1 bottom
  const targetAngle = norm * 0.55;
  plane.angle += (targetAngle - plane.angle) * 0.08;
  plane.angle = Math.max(-0.7, Math.min(0.7, plane.angle));

  // Speed
  let speed = Math.hypot(plane.vx, plane.vy) || 0.001;
  const velAng = Math.atan2(plane.vy, plane.vx);
  const aoa = plane.angle - velAng;
  const noseTooHigh = plane.angle < -0.34;
  const stallRisk = noseTooHigh && speed < 6.2 && Math.abs(aoa) > 0.42;
  stallWarn = stallRisk ? Math.min(1, stallWarn + 0.08) : Math.max(0, stallWarn - 0.05);

  // Lift. Canvas Y grows downward, so positive lift must push upward.
  // Clamp angle-of-attack so max flaps cannot create endless hover.
  const clampedAoa = Math.max(-0.55, Math.min(0.55, aoa));
  const lift = speed * Math.sin(clampedAoa) * s.liftK;
  plane.vx +=  lift * Math.sin(velAng);
  plane.vy += -lift * Math.cos(velAng);

  // Drag
  const drag = speed * speed * s.dragK;
  plane.vx -= (plane.vx / speed) * drag;
  plane.vy -= (plane.vy / speed) * drag;

  // Gravity + air resistance + wind. Slow planes sink harder so they cannot hang.
  const stallSink = (speed < 3.2 ? (3.2 - speed) * 0.045 : 0) + (stallWarn > 0.55 ? 0.18 : 0);
  plane.vy += map.gravity + stallSink + (map.sink || 0);
  plane.vx *= s.airRes;
  plane.vx += wind + gust;
  if(stallWarn > 0.7 && tik % 34 === 0) showMsg('STALL WARNING - LOWER NOSE');

  // Thermals
  for(const t of thermals){
    const dx=plane.x-t.x, dy=plane.y-t.y;
    const d=Math.hypot(dx,dy);
    if(d < t.r * 2.2){
      const f=(1 - d/(t.r*2.2)) * t.str;
      plane.vy -= f * 0.20;
      if(d < t.r && tik%60===0) showMsg(pick(['Thermal! Free lift.','Going up!','Nature said yes.','Updraft secured.']));
    }
  }

  // Move plane
  plane.x += plane.vx;
  plane.y += plane.vy;

  // Ceiling
  if(plane.y < 0){ plane.y = 0; plane.vy = Math.abs(plane.vy)*0.3; }

  // Camera follows
  const targetCamX = plane.x - W * 0.28;
  camX += (targetCamX - camX) * 0.08;
  dist = Math.max(dist, plane.x - LAUNCH_X);

  // Trail
  plane.trail.push({x:plane.x, y:plane.y, a:1});
  if(plane.trail.length > 35) plane.trail.shift();
  plane.trail.forEach(p=>p.a -= 0.028);

  // Ring collision
  for(const ring of rings){
    if(ring.hit) continue;
    const dx=plane.x-ring.x, dy=plane.y-ring.y;
    if(Math.hypot(dx,dy) < ring.r+10){
      ring.hit=true; ring.flash=20;
      const earned = Math.round(ring.value * currentMap().coinBonus);
      coinsRun += earned; coins += earned; ringsRun++;
      burst(ring.x, ring.y, '#ffd700');
      showMsg(pick(['Ring!','Ding!','Nice one.','Threading the needle.']));
    }
  }

  // Particles
  particles = particles.filter(p=>p.a>0.02);
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.a-=0.025; });

  // Messages
  if(msgAlpha>0){ msgTimer--; if(msgTimer<50) msgAlpha=Math.max(0,msgAlpha-0.025); }

  // Sarcastic mid-flight
  if(plane.y > gy-60 && tik%40===0) showMsg(pick(['The ground says hi.','Come on, pull up!','Not like this.','Up! UP!']));
  if(tik===300) showMsg(pick(["Still airborne. Impressive.", "You're actually not bad.", "Okay this is a good flight."]));

  // Crash
  if(plane.y >= gy+5 || plane.x < -300){
    plane.alive = false;
    awardRunProgress();
    save();
    setTimeout(showResult, 700);
  }
}

function awardRunProgress(){
  if(xpRun > 0) return;
  const distFt = Math.floor(dist * 3.28084);
  const baseCoins = Math.max(1, Math.floor(distFt / 250));
  const ringBonus = ringsRun * 3;
  const landingBonus = Math.abs(plane.vy) < 3.5 ? 4 : 0;
  const earnedCoins = Math.round((baseCoins + ringBonus + landingBonus) * currentMap().coinBonus);
  const earnedXp = Math.max(5, Math.floor(distFt / 40) + ringsRun * 20 + landingBonus * 5);
  coinsRun += earnedCoins;
  coins += earnedCoins;
  xpRun = earnedXp;
  xp += earnedXp;
}

function burst(x,y,color){
  for(let i=0;i<12;i++) particles.push({x,y,vx:rnd(-3,3),vy:rnd(-4,0.5),a:1,color,r:rnd(2,5)});
}

function showMsg(txt){ msgText=txt; msgAlpha=1; msgTimer=200; }

// ── DRAW ──────────────────────────────────────────────────────────────────────
function drawBg(){
  const map = currentMap();
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0, map.skyTop); sky.addColorStop(1, map.skyBot);
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // Storm rain
  if(map.key==='storm'){
    ctx.strokeStyle='rgba(180,200,255,0.12)'; ctx.lineWidth=1;
    for(let i=0;i<80;i++){
      const rx=((i*241+tik*2)%W); const ry=((i*113+tik*3)%H);
      ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx-4,ry+14); ctx.stroke();
    }
  }

  // Moon stars
  if(map.key==='moon'){
    ctx.fillStyle='rgba(255,255,255,0.8)';
    for(let i=0;i<180;i++){
      const sx=((i*137+camX*0.015)%W+W)%W, sy=(i*73.3)%H;
      ctx.beginPath(); ctx.arc(sx,sy,i%5===0?1.4:0.7,0,Math.PI*2); ctx.fill();
    }
  }

  // Clouds
  if(map.key!=='moon'){
    for(const c of clouds){
      const sx = c.x - camX*0.45;
      if(sx<-200||sx>W+200) continue;
      const col=map.key==='storm'?`rgba(50,40,70,${c.a})`:`rgba(230,240,255,${c.a})`;
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(sx,c.y,c.r*1.2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx-c.r*0.5,c.y+c.r*0.1,c.r*0.75,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx+c.r*0.42,c.y+c.r*0.08,c.r*0.65,0,Math.PI*2); ctx.fill();
    }
  }

  // Thermal glow
  for(const t of thermals){
    const sx=t.x-camX;
    if(sx<-200||sx>W+200) continue;
    const tg=ctx.createRadialGradient(sx,t.y,0,sx,t.y,t.r*2.2);
    tg.addColorStop(0,'rgba(255,200,50,0.10)'); tg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=tg; ctx.beginPath(); ctx.arc(sx,t.y,t.r*2.2,0,Math.PI*2); ctx.fill();
  }
}

function drawGround(){
  const map = currentMap();
  const gy = H * map.horizon;
  ctx.fillStyle=map.groundColor; ctx.fillRect(0,gy,W,H-gy);
  ctx.fillStyle=map.groundLine;  ctx.fillRect(0,gy,W,5);
  drawDecos(map, gy);
}

function drawDecos(map, gy){
  for(const d of decos){
    const sx = d.wx - camX;
    if(sx < -350 || sx > W+350) continue;
    ctx.save();
    switch(d.type){
      case 'tree':{
        ctx.fillStyle='#5a3a1a'; ctx.fillRect(sx-3,gy-d.h+d.h*0.55,6,d.h*0.45);
        ctx.fillStyle=d.color;
        ctx.beginPath(); ctx.arc(sx,gy-d.h+d.h*0.3,d.w*0.55,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx,gy-d.h+d.h*0.1,d.w*0.38,0,Math.PI*2); ctx.fill();
        break;
      }
      case 'house':{
        const hy=gy-d.h;
        ctx.fillStyle=d.wall; ctx.fillRect(sx-d.w/2,hy,d.w,d.h);
        ctx.fillStyle=d.roof;
        ctx.beginPath(); ctx.moveTo(sx-d.w/2-4,hy); ctx.lineTo(sx,hy-d.h*0.45); ctx.lineTo(sx+d.w/2+4,hy); ctx.fill();
        ctx.fillStyle='rgba(100,180,255,0.5)';
        ctx.fillRect(sx-d.w*0.27,hy+d.h*0.25,11,11); ctx.fillRect(sx+d.w*0.1,hy+d.h*0.25,11,11);
        break;
      }
      case 'fence':{
        ctx.fillStyle='#c8a87a'; ctx.fillRect(sx-d.w/2,gy-14,d.w,3);
        for(let i=0;i<d.w;i+=10) ctx.fillRect(sx-d.w/2+i,gy-20,5,20);
        break;
      }
      case 'building':{
        const by=gy-d.h;
        ctx.fillStyle=d.color; ctx.fillRect(sx-d.w/2,by,d.w,d.h);
        ctx.fillStyle='rgba(255,255,150,0.22)';
        for(let r=0;r<d.winR;r++) for(let c=0;c<d.winC;c++){
          if(Math.random()<0.55) ctx.fillRect(sx-d.w/2+4+c*15,by+4+r*17,9,10);
        }
        break;
      }
      case 'lamp':{
        ctx.strokeStyle='#888'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(sx,gy); ctx.lineTo(sx,gy-d.h); ctx.lineTo(sx+12,gy-d.h+5); ctx.stroke();
        ctx.fillStyle='rgba(255,255,150,0.85)'; ctx.beginPath(); ctx.arc(sx+12,gy-d.h+5,4,0,Math.PI*2); ctx.fill();
        break;
      }
      case 'cactus':{
        ctx.fillStyle='#3a7a30'; ctx.fillRect(sx-5,gy-d.h,10,d.h);
        ctx.fillRect(sx-18,gy-d.h*0.6,13,6); ctx.fillRect(sx+5,gy-d.h*0.7,13,6);
        ctx.fillRect(sx-18,gy-d.h*0.6-14,6,14); ctx.fillRect(sx+12,gy-d.h*0.7-14,6,14);
        break;
      }
      case 'dune':{
        ctx.fillStyle='#d4a850';
        ctx.beginPath(); ctx.ellipse(sx,gy,d.w/2,d.h,0,Math.PI,0); ctx.fill();
        break;
      }
      case 'crater':{
        ctx.strokeStyle='rgba(80,80,90,0.7)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.ellipse(sx,gy-2,d.r,d.r*0.3,0,0,Math.PI*2); ctx.stroke();
        break;
      }
      case 'rock':{
        ctx.fillStyle='#707080';
        ctx.beginPath(); ctx.ellipse(sx,gy-d.h/2,d.w/2,d.h/2,0,0,Math.PI*2); ctx.fill();
        break;
      }
      case 'flag':{
        ctx.strokeStyle='#aaa'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(sx,gy); ctx.lineTo(sx,gy-40); ctx.stroke();
        ctx.fillStyle='#cc2222';
        ctx.beginPath(); ctx.moveTo(sx,gy-40); ctx.lineTo(sx+18,gy-33); ctx.lineTo(sx,gy-26); ctx.fill();
        break;
      }
    }
    ctx.restore();
  }
}

function drawRings(){
  for(const ring of rings){
    if(ring.hit && ring.flash<=0) continue;
    if(ring.flash>0) ring.flash--;
    const sx=ring.x-camX, sy=ring.y;
    if(sx<-80||sx>W+80) continue;
    ctx.save();
    if(ring.hit){ ctx.globalAlpha=ring.flash/20; ctx.strokeStyle='#ffd700'; ctx.lineWidth=4; }
    else { ctx.strokeStyle='rgba(255,200,50,0.9)'; ctx.lineWidth=2.5; ctx.shadowColor='#ffd700'; ctx.shadowBlur=10; }
    ctx.beginPath(); ctx.arc(sx,sy,ring.r,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

function drawTrail(){
  for(let i=1;i<plane.trail.length;i++){
    const p=plane.trail[i], q=plane.trail[i-1];
    const sx=p.x-camX, sy=p.y, qx=q.x-camX, qy=q.y;
    ctx.strokeStyle=`rgba(180,210,255,${Math.min(p.a,0.45)})`;
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(qx,qy); ctx.lineTo(sx,sy); ctx.stroke();
  }
}

function drawPlane(){
  const sx=plane.x-camX, sy=plane.y;
  ctx.save();
  ctx.translate(sx,sy);
  ctx.rotate(plane.angle);
  // Body
  ctx.fillStyle='#f0f0f0';
  ctx.beginPath(); ctx.moveTo(22,0); ctx.lineTo(-14,-5); ctx.lineTo(-14,5); ctx.closePath(); ctx.fill();
  // Wing
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.beginPath(); ctx.moveTo(4,-1); ctx.lineTo(-10,-20); ctx.lineTo(-18,-1); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(4,1);  ctx.lineTo(-10, 20); ctx.lineTo(-18, 1); ctx.closePath(); ctx.fill();
  // Tail
  ctx.fillStyle='rgba(200,220,255,0.9)';
  ctx.beginPath(); ctx.moveTo(-10,-1); ctx.lineTo(-18,-9); ctx.lineTo(-18,-1); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-10, 1); ctx.lineTo(-18, 9); ctx.lineTo(-18, 1); ctx.closePath(); ctx.fill();
  // Crease
  ctx.strokeStyle='rgba(150,170,200,0.6)'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.moveTo(22,0); ctx.lineTo(-14,0); ctx.stroke();
  ctx.restore();
}

function drawParticles(){
  for(const p of particles){
    const sx=p.x-camX;
    ctx.globalAlpha=p.a;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(sx,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawHUD(){
  const distFt = Math.floor(dist * 3.28084);
  const map = currentMap();
  const lvl = currentLevel();
  // Top-left: distance
  ctx.fillStyle='rgba(0,0,0,0.4)';
  rrect(12,12,210,55,10); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 24px system-ui'; ctx.textAlign='left';
  ctx.fillText(distFt + ' ft', 22, 40);
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='12px system-ui';
  ctx.fillText('Best: '+Math.floor(best*3.28084)+' ft  |  '+map.name+'  |  Lv '+lvl.lvl, 22, 57);
  ctx.fillStyle='rgba(0,0,0,0.4)';
  rrect(12,74,260,34,9); ctx.fill();
  ctx.fillStyle='#d9ecff'; ctx.font='bold 12px system-ui'; ctx.textAlign='left';
  ctx.fillText('Weather: '+(map.weather || 'Clear')+'  Wind '+wind.toFixed(2), 22, 96);
  // Top-right: coins
  ctx.fillStyle='rgba(0,0,0,0.4)';
  rrect(W-130,12,118,36,10); ctx.fill();
  ctx.fillStyle='#ffd700'; ctx.font='bold 15px system-ui'; ctx.textAlign='right';
  ctx.fillText('🪙 '+coins, W-14, 35);
  // Message
  if(msgAlpha>0){
    ctx.save(); ctx.globalAlpha=msgAlpha;
    ctx.fillStyle='rgba(0,0,0,0.55)';
    rrect(W/2-170,H*0.18,340,36,10); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 14px system-ui'; ctx.textAlign='center';
    ctx.fillText(msgText, W/2, H*0.18+23);
    ctx.restore();
  }
  if(stallWarn > 0.15){
    ctx.save();
    ctx.globalAlpha = Math.min(1, 0.25 + stallWarn);
    ctx.fillStyle='rgba(140,0,0,0.72)';
    rrect(W/2-165, H*0.28, 330, 46, 12); ctx.fill();
    ctx.strokeStyle='#ffcc44'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#fff4c2'; ctx.font='900 18px system-ui'; ctx.textAlign='center';
    ctx.fillText('STALL WARNING', W/2, H*0.28+22);
    ctx.font='bold 11px system-ui';
    ctx.fillText('Lower the nose or gain speed', W/2, H*0.28+38);
    ctx.restore();
  }
}

function drawAimUI(){
  const px=plane.x-camX, py=plane.y;
  if(isDragging){
    const dx=aimX-px, dy=aimY-py;
    const d=Math.hypot(dx,dy);
    const power=Math.min(1, d/140);
    // Direction line
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2;
    ctx.setLineDash([8,6]);
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(aimX,aimY); ctx.stroke();
    ctx.setLineDash([]);
    // Arrow head
    if(d>15){
      const a=Math.atan2(dy,dx);
      ctx.fillStyle='rgba(255,255,255,0.75)';
      ctx.beginPath();
      ctx.moveTo(aimX,aimY);
      ctx.lineTo(aimX-15*Math.cos(a-0.4),aimY-15*Math.sin(a-0.4));
      ctx.lineTo(aimX-15*Math.cos(a+0.4),aimY-15*Math.sin(a+0.4));
      ctx.fill();
    }
    // Power bar
    ctx.fillStyle='rgba(0,0,0,0.5)'; rrect(W/2-75,H-65,150,20,8); ctx.fill();
    ctx.fillStyle=power>0.8?'#ff4444':power>0.5?'#ffaa00':'#44cc88';
    rrect(W/2-73,H-63,146*power,16,6); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 10px system-ui'; ctx.textAlign='center';
    ctx.fillText('POWER', W/2, H-49);
    ctx.restore();
  }
}

// roundRect helper (avoids ctx.roundRect browser compatibility issues)
function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ── GAME STATES ───────────────────────────────────────────────────────────────
// 'menu' | 'aim' | 'fly' | 'dead'
let state = 'menu';

function startGame(){
  hideAllScreens();
  buildWorld();
  resetPlane();
  state = 'aim';
  document.getElementById('hint').style.opacity='1';
}

function hideAllScreens(){
  ['menuScreen','mapsScreen','upgsScreen','resultScreen'].forEach(id=>{
    document.getElementById(id).classList.remove('active');
  });
}

function showResult(){
  const distFt = Math.floor(dist*3.28084);
  const lvl = currentLevel();
  const isNew = dist > best;
  if(dist > best){ best = dist; }
  save();
  // Grade
  let grade='F', label='';
  if(distFt>=5000){grade='S';label='"Are you even human?"';}
  else if(distFt>=3000){grade='A';label='"Legitimately impressive."';}
  else if(distFt>=1500){grade='B';label='"Not bad. Not great."';}
  else if(distFt>=700){grade='C';label='"Paper can do better."';}
  else if(distFt>=250){grade='D';label='"The lawn mower flies further."';}
  else{grade='F';label='"Did you even try?"';}
  document.getElementById('rGrade').textContent=grade;
  document.getElementById('rLabel').textContent=label;
  document.getElementById('rDist').textContent=distFt+' ft';
  document.getElementById('rCoins').textContent=coinsRun;
  document.getElementById('rRings').textContent=ringsRun;
  document.getElementById('rXp').textContent=xpRun;
  document.getElementById('rLevelNote').textContent = lvl.lvl > runStartLevel
    ? ('LEVEL UP: ' + lvl.title)
    : ('Level ' + lvl.lvl + ' - ' + lvl.title);
  document.getElementById('rBest').style.display=isNew?'':'none';
  document.getElementById('resultScreen').classList.add('active');
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
let lastTs=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt = Math.min(ts-lastTs, 50); lastTs=ts;
  ctx.clearRect(0,0,W,H);

  if(state==='menu') return;

  drawBg();
  drawGround();
  drawRings();

  if(state==='aim'){
    drawTrail();
    drawPlane();
    drawAimUI();
    // Draw a ground-level marker where plane is
    return;
  }

  if(state==='fly' || state==='dead'){
    if(state==='fly') physics();
    drawTrail();
    drawParticles();
    drawPlane();
    drawHUD();
  }
}
requestAnimationFrame(loop);

// ── INPUT ─────────────────────────────────────────────────────────────────────
function getXY(e){ return e.touches ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY}; }

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); onDown(e); }, {passive:false});
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('touchmove', e=>{ e.preventDefault(); onMove(e); }, {passive:false});
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('touchend', e=>{ e.preventDefault(); onUp(e); }, {passive:false});

function onDown(e){
  const {x,y}=getXY(e);
  if(state==='aim'){
    isDragging=true;
    aimStartX=x; aimStartY=y;
    aimX=x; aimY=y;
  }
  if(state==='fly'){
    mouseX=x; mouseY=y;
  }
}
function onMove(e){
  const {x,y}=getXY(e);
  mouseX=x; mouseY=y;
  if(isDragging){ aimX=x; aimY=y; }
}
function onUp(e){
  if(!isDragging || state!=='aim') return;
  isDragging=false;
  document.getElementById('hint').style.opacity='0';
  const px=plane.x-camX, py=plane.y;
  // Direction: from plane TOWARD where you dragged (point where you want to go)
  const dx=aimX-px, dy=aimY-py;
  const d=Math.hypot(dx,dy);
  const s=stats();
  const power = d<15 ? 0.6 : Math.min(1, d/140);
  const ang   = d<15 ? -0.18 : Math.atan2(dy,dx);
  const spd   = (7 + power*13) * s.spdMult;
  plane.vx = Math.cos(ang)*spd;
  plane.vy = Math.sin(ang)*spd;
  plane.angle = ang;
  mouseY = plane.y; // initialize steering at plane height
  state='fly';
}

// ── UI WIRING ─────────────────────────────────────────────────────────────────
function updateMenuUI(){
  const lvl = currentLevel();
  const nxt = nextLevel();
  document.getElementById('mBest').textContent  = Math.floor(best*3.28084)+' ft';
  document.getElementById('mCoins').textContent = coins;
  document.getElementById('mLevel').textContent = lvl.lvl + ' - ' + lvl.title + (nxt ? ' (' + (nxt.xp - xp) + ' XP next)' : ' (max)');
}

document.getElementById('startBtn').onclick=()=>startGame();
document.getElementById('mapsBtn').onclick=()=>{ buildMapsUI(); hideAllScreens(); document.getElementById('mapsScreen').classList.add('active'); };
document.getElementById('upgsBtn').onclick=()=>{ buildUpgsUI(); hideAllScreens(); document.getElementById('upgsScreen').classList.add('active'); };
document.getElementById('mapsBack').onclick=()=>{ hideAllScreens(); document.getElementById('menuScreen').classList.add('active'); updateMenuUI(); };
document.getElementById('upgsBack').onclick=()=>{ hideAllScreens(); document.getElementById('menuScreen').classList.add('active'); updateMenuUI(); };
document.getElementById('rPlayBtn').onclick=()=>startGame();
document.getElementById('rMenuBtn').onclick=()=>{ hideAllScreens(); document.getElementById('menuScreen').classList.add('active'); updateMenuUI(); };

function buildMapsUI(){
  const grid = document.getElementById('mapGrid');
  grid.innerHTML='';
  const colors=['#1a4a8a','#1a2a4a','#6a3a10','#1a0828','#000820'];
  MAPS.forEach((m,i)=>{
    const locked = !unlocked.includes(m.key);
    const sel    = mapKey===m.key;
    const div=document.createElement('div');
    div.className='map-tile'+(sel?' sel':'')+(locked?' locked':'');
    div.style.background=colors[i]||'#1a2a4a';
    div.innerHTML=`<div style="font-size:28px">${m.emoji}</div><div class="map-name">${m.name}</div><div class="map-sub">${locked?'🔒 '+m.cost+' coins':m.desc}</div>`;
    if(!locked){
      div.onclick=()=>{
        mapKey=m.key; save();
        document.querySelectorAll('.map-tile').forEach(t=>t.classList.remove('sel'));
        div.classList.add('sel');
      };
    } else {
      div.onclick=()=>{
        if(coins>=m.cost){ coins-=m.cost; unlocked.push(m.key); mapKey=m.key; save(); buildMapsUI(); }
        else { alert('Need '+m.cost+' coins. You have '+coins+'.'); }
      };
    }
    grid.appendChild(div);
  });
}

function buildUpgsUI(){
  document.getElementById('uCoins').textContent=coins;
  const list=document.getElementById('upgList');
  list.innerHTML='';
  const playerLevel = currentLevel().lvl;
  UPGRADES.forEach(u=>{
    const lvl=upgs[u.key]||0;
    const maxed=lvl>=u.levels.length-1;
    const next=u.levels[lvl+1];
    const lockedByLevel = next && playerLevel < (next.unlock || 1);
    const div=document.createElement('div');
    div.className='upg-item'+((maxed || lockedByLevel)?' maxed':'');
    div.innerHTML=`<span class="upg-lvl">${u.icon}</span>
      <div style="flex:1"><div class="upg-name">${u.name} — Lvl ${lvl}/${u.levels.length-1}</div>
      <div class="upg-desc">${u.desc}</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px">${u.levels[lvl].label}</div></div>
      <div class="upg-cost">${maxed?'MAX':(lockedByLevel ? ('LV '+next.unlock) : ('Coins '+next.cost))}</div>`;
    if(!maxed && !lockedByLevel){
      div.onclick=()=>{
        if(coins>=next.cost){ coins-=next.cost; upgs[u.key]=(upgs[u.key]||0)+1; save(); buildUpgsUI(); }
        else { div.style.background='rgba(255,50,50,0.15)'; setTimeout(()=>div.style.background='',400); }
      };
    }
    list.appendChild(div);
  });
}

// Unlock maps based on coins earned (run at startup)
function checkUnlocks(){
  MAPS.forEach(m=>{ if(m.cost===0 && !unlocked.includes(m.key)) unlocked.push(m.key); });
  if(!MAPS.find(m=>m.key===mapKey)) mapKey='backyard';
}
checkUnlocks();
updateMenuUI();
</script>
