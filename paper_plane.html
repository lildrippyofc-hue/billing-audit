<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Paper James</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a1628;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, Arial, sans-serif;
  -webkit-user-select: none;
  user-select: none;
  touch-action: none;
}
canvas { display: block; cursor: crosshair; }
.screen {
  position: fixed; inset: 0; z-index: 20;
  display: none; place-items: center;
  background: rgba(5, 12, 30, 0.92);
  padding: 16px;
}
.screen.active { display: grid; }
.menu-card {
  width: min(520px, 100%);
  background: linear-gradient(160deg, rgba(20,40,80,0.98) 0%, rgba(8,18,45,0.99) 100%);
  border: 1px solid rgba(100,160,255,0.22);
  border-radius: 24px;
  box-shadow: 0 32px 100px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.08);
  padding: 36px 32px 32px;
  display: flex; flex-direction: column; align-items: center; gap: 18px;
}
.menu-title {
  font-size: clamp(28px, 7vw, 44px);
  font-weight: 900;
  letter-spacing: -1px;
  color: #fff;
  text-shadow: 0 0 30px rgba(80,160,255,0.5);
  display: flex; align-items: center; gap: 14px;
}
.menu-stats {
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
}
.stat-chip {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 999px;
  padding: 6px 13px;
  font-size: 13px; font-weight: 700;
  color: rgba(255,255,255,0.85);
}
.stat-chip span { color: #7eb8ff; }
.menu-btns {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%;
}
.menu-btns .btn-primary { grid-column: 1 / -1; }
.btn-primary {
  background: linear-gradient(135deg, #1e5ccc, #3b8ef0);
  color: #fff; font-weight: 900; font-size: 17px;
  border: none; border-radius: 14px; padding: 15px;
  cursor: pointer; letter-spacing: 0.5px;
  box-shadow: 0 6px 24px rgba(30,90,200,0.45);
  transition: transform 0.12s, box-shadow 0.12s;
  font-family: inherit;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(30,90,200,0.55); }
.btn-primary:active { transform: translateY(0); }
.btn-secondary {
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.9); font-weight: 800; font-size: 14px;
  border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 12px;
  cursor: pointer; font-family: inherit;
  transition: background 0.12s;
}
.btn-secondary:hover { background: rgba(255,255,255,0.12); }
.big-card {
  width: min(920px, 100%);
  max-height: calc(100vh - 32px);
  overflow-y: auto;
  background: linear-gradient(160deg, rgba(15,28,60,0.99) 0%, rgba(6,14,36,0.99) 100%);
  border: 1px solid rgba(100,160,255,0.2);
  border-radius: 24px;
  box-shadow: 0 32px 100px rgba(0,0,0,0.75);
}
.big-card-head {
  position: sticky; top: 0; z-index: 2;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 26px 16px;
  background: rgba(12,24,54,0.98);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px 24px 0 0;
}
.big-card-head h2 { font-size: 21px; color: #fff; font-weight: 900; }
.head-sub { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 3px; }
.btn-close {
  background: rgba(255,255,255,0.1); color: #fff; border: none;
  border-radius: 10px; padding: 9px 15px; font-weight: 800; cursor: pointer;
  font-family: inherit; font-size: 14px;
}
.btn-close:hover { background: rgba(255,255,255,0.18); }
.big-card-body { padding: 20px 24px 26px; }
.maps-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px;
}
.map-card {
  border-radius: 16px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  position: relative;
}
.map-card.selected { border-color: rgba(74,222,128,0.5); }
.map-banner {
  height: 88px; position: relative; overflow: hidden;
  display: flex; align-items: flex-end; padding: 10px 14px;
}
.map-banner-name {
  font-size: 17px; font-weight: 900; color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.7); z-index: 1; position: relative;
}
.map-body { padding: 12px 14px 14px; }
.map-desc { color: rgba(255,255,255,0.6); font-size: 12px; line-height: 1.45; margin-bottom: 10px; }
.map-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.tag {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 999px; padding: 3px 9px; font-size: 10px; font-weight: 700;
  color: rgba(255,255,255,0.7);
}
.map-btn {
  width: 100%; border: none; border-radius: 10px; padding: 11px;
  font-weight: 900; font-size: 13px; font-family: inherit; cursor: pointer;
  transition: opacity 0.12s;
}
.map-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.map-btn.play { background: linear-gradient(135deg,#1e5ccc,#3b8ef0); color:#fff; }
.map-btn.unlock { background: linear-gradient(135deg,#b8860b,#daa520); color:#fff; }
.map-btn.active { background: rgba(60,200,100,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
.map-lock-overlay {
  position: absolute; inset: 0; border-radius: 16px;
  background: rgba(0,0,0,0.55);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  pointer-events: none;
}
.lock-icon { font-size: 28px; }
.lock-cost { font-size: 13px; font-weight: 900; color: #ffd700; }
.upgrades-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
.upgrade-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px; padding: 15px; display: flex; flex-direction: column; gap: 9px;
}
.upgrade-card h3 { font-size: 15px; color: #fff; font-weight: 800; }
.upgrade-card p { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.4; }
.upgrade-levels { display: flex; gap: 5px; }
.level-dot {
  width: 20px; height: 7px; border-radius: 4px;
  background: rgba(255,255,255,0.12);
  transition: background 0.2s;
}
.level-dot.filled { background: linear-gradient(90deg,#4488ff,#77aaff); }
.level-dot.maxed { background: linear-gradient(90deg,#ffa500,#ffd700); }
.upgrade-meta { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.55); }
.upgrade-btn {
  border: none; border-radius: 9px; padding: 10px; font-weight: 900; font-size: 12px;
  font-family: inherit; cursor: pointer; transition: opacity 0.12s;
}
.upgrade-btn:disabled { opacity: 0.38; cursor: not-allowed; }
.upgrade-btn.buy { background: linear-gradient(135deg,#1e5ccc,#3b8ef0); color: #fff; }
.upgrade-btn.maxed { background: linear-gradient(135deg,#7b5e0a,#c49a0e); color:#fff; }
.skins-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.skin-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 10px;
  align-items: center; text-align: center;
}
.skin-card.equipped { border-color: rgba(74,222,128,0.5); background: rgba(74,222,128,0.06); }
.skin-preview { width: 80px; height: 50px; }
.skin-name { font-size: 14px; font-weight: 800; color: #fff; }
.skin-desc { font-size: 11px; color: rgba(255,255,255,0.5); }
.skin-btn {
  border: none; border-radius: 9px; padding: 9px 14px; font-weight: 900; font-size: 12px;
  font-family: inherit; cursor: pointer; width: 100%;
}
.skin-btn.buy { background: linear-gradient(135deg,#1e5ccc,#3b8ef0); color:#fff; }
.skin-btn.equip { background: rgba(255,255,255,0.1); color:#fff; border: 1px solid rgba(255,255,255,0.2); }
.skin-btn.equipped { background: rgba(74,222,128,0.2); color:#4ade80; border: 1px solid rgba(74,222,128,0.3); cursor:default; }
.skin-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.missions-list { display: flex; flex-direction: column; gap: 10px; }
.mission-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px; padding: 15px; display: flex; align-items: center; gap: 14px;
}
.mission-card.done { border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.05); }
.mission-card.claimed { opacity: 0.45; }
.mission-icon { font-size: 26px; flex-shrink: 0; }
.mission-info { flex: 1; }
.mission-title { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 4px; }
.mission-bar-wrap { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 4px; }
.mission-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg,#4488ff,#77aaff); transition: width 0.3s; }
.mission-prog { font-size: 11px; color: rgba(255,255,255,0.5); }
.mission-reward { font-size: 13px; font-weight: 900; color: #ffd700; white-space: nowrap; }
.mission-btn {
  border: none; border-radius: 9px; padding: 9px 14px; font-weight: 900; font-size: 12px;
  font-family: inherit; cursor: pointer; white-space: nowrap;
  background: linear-gradient(135deg,#1e5ccc,#3b8ef0); color:#fff;
}
.mission-btn:disabled { opacity: 0.38; cursor: not-allowed; }
#hud { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
#result-screen {
  position: fixed; inset: 0; z-index: 18;
  display: none; place-items: center; padding: 16px;
  background: rgba(0,8,24,0.8);
}
#result-screen.active { display: grid; }
.result-card {
  width: min(500px, 100%);
  background: linear-gradient(160deg, rgba(20,40,80,0.99) 0%, rgba(8,18,45,0.99) 100%);
  border: 1px solid rgba(100,160,255,0.25);
  border-radius: 24px;
  box-shadow: 0 32px 100px rgba(0,0,0,0.7);
  padding: 32px 28px 28px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  text-align: center;
}
.result-grade-circle {
  width: 100px; height: 100px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 52px; font-weight: 900; border: 3px solid rgba(255,255,255,0.2);
  flex-shrink: 0;
}
.result-new-best {
  font-size: 15px; font-weight: 900; color: #ffd700;
  background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.3);
  border-radius: 999px; padding: 6px 16px; letter-spacing: 0.1em;
}
.result-dist { font-size: clamp(44px, 10vw, 64px); font-weight: 900; color: #fff; line-height: 1; }
.result-stats-row {
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
}
.result-stat {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 700;
  color: rgba(255,255,255,0.8);
}
.result-stat span { color: #7eb8ff; display: block; font-size: 18px; font-weight: 900; }
.result-coins-row {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,200,0,0.1); border: 1px solid rgba(255,200,0,0.25);
  border-radius: 12px; padding: 9px 16px;
}
.result-coin-text { font-size: 14px; font-weight: 800; color: #ffd700; }
.result-msg { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.5; max-width: 380px; font-style: italic; }
.result-unlocks { display: flex; flex-direction: column; gap: 4px; width: 100%; }
.result-unlock-row {
  background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3);
  border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 800; color: #4ade80;
}
.result-btns { display: flex; gap: 8px; width: 100%; margin-top: 2px; }
.result-btns .btn-primary { flex: 2; font-size: 15px; padding: 13px; }
.result-btns .btn-secondary { flex: 1; font-size: 13px; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 3px; }
@media (max-width: 500px) {
  .big-card-head { padding: 14px 14px 12px; }
  .big-card-body { padding: 14px; }
  .maps-grid { grid-template-columns: 1fr; }
  .menu-card { padding: 26px 18px 22px; }
  .menu-btns { grid-template-columns: 1fr; }
  .menu-btns .btn-primary { grid-column: auto; }
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>

<!-- MAIN MENU -->
<div class="screen active" id="menuScreen">
  <div class="menu-card">
    <div class="menu-title">
      <svg width="44" height="36" viewBox="0 0 46 38" fill="none">
        <polygon points="45,19 2,2 10,19 2,36" fill="#fff" opacity="0.95"/>
        <polygon points="45,19 10,19 2,2" fill="#c8dcff" opacity="0.8"/>
        <line x1="10" y1="19" x2="45" y2="19" stroke="rgba(180,200,255,0.6)" stroke-width="1"/>
      </svg>
      PAPER JAMES
    </div>
    <div class="menu-stats">
      <div class="stat-chip">Best: <span id="menuBest">0</span> ft</div>
      <div class="stat-chip">🪙 <span id="menuCoins">0</span></div>
      <div class="stat-chip" id="menuMapChip">Map: Backyard</div>
    </div>
    <div class="menu-btns">
      <button class="btn-primary" id="menuPlayBtn">✈ PLAY</button>
      <button class="btn-secondary" id="menuMapsBtn">🗺 MAPS</button>
      <button class="btn-secondary" id="menuUpgradesBtn">⚙ UPGRADES</button>
      <button class="btn-secondary" id="menuMissionsBtn">📋 MISSIONS</button>
      <button class="btn-secondary" id="menuSkinsBtn">🎨 SKINS</button>
      <button class="btn-secondary" id="menuSoundBtn">🔊 SOUND</button>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,0.28);letter-spacing:0.08em;text-transform:uppercase;">
      Drag plane to aim · Move mouse/touch to steer
    </div>
  </div>
</div>

<!-- MAPS SCREEN -->
<div class="screen" id="mapsScreen">
  <div class="big-card">
    <div class="big-card-head">
      <div><h2>Select Map</h2><div class="head-sub" id="mapsCoinsLabel">0 coins</div></div>
      <button class="btn-close" id="mapsCloseBtn">✕ Close</button>
    </div>
    <div class="big-card-body"><div class="maps-grid" id="mapsGrid"></div></div>
  </div>
</div>

<!-- UPGRADES SCREEN -->
<div class="screen" id="upgradesScreen">
  <div class="big-card">
    <div class="big-card-head">
      <div><h2>Upgrades</h2><div class="head-sub" id="upgradesCoinsLabel">0 coins</div></div>
      <button class="btn-close" id="upgradesCloseBtn">✕ Close</button>
    </div>
    <div class="big-card-body"><div class="upgrades-grid" id="upgradesGrid"></div></div>
  </div>
</div>

<!-- MISSIONS SCREEN -->
<div class="screen" id="missionsScreen">
  <div class="big-card" style="width:min(600px,100%)">
    <div class="big-card-head">
      <div><h2>Daily Missions</h2><div class="head-sub" id="missionsSubLabel">Resets daily</div></div>
      <button class="btn-close" id="missionsCloseBtn">✕ Close</button>
    </div>
    <div class="big-card-body"><div class="missions-list" id="missionsList"></div></div>
  </div>
</div>

<!-- SKINS SCREEN -->
<div class="screen" id="skinsScreen">
  <div class="big-card">
    <div class="big-card-head">
      <div><h2>Plane Skins</h2><div class="head-sub" id="skinsCoinsLabel">0 coins</div></div>
      <button class="btn-close" id="skinsCloseBtn">✕ Close</button>
    </div>
    <div class="big-card-body"><div class="skins-grid" id="skinsGrid"></div></div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen">
  <div class="result-card">
    <div class="result-grade-circle" id="resultGrade">?</div>
    <div class="result-new-best" id="resultNewBest" style="display:none">🎉 NEW BEST!</div>
    <div class="result-dist" id="resultDist">0 ft</div>
    <div class="result-stats-row">
      <div class="result-stat">Rings<span id="resRings">0</span></div>
      <div class="result-stat">Airtime<span id="resTime">0s</span></div>
      <div class="result-stat">Coins<span id="resCoins">+0</span></div>
    </div>
    <div class="result-coins-row">
      <span style="font-size:18px">🪙</span>
      <div class="result-coin-text" id="resultCoinsTotal">Total: 0 coins</div>
    </div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-unlocks" id="resultUnlocks"></div>
    <div class="result-btns">
      <button class="btn-primary" id="resultFlyBtn">FLY AGAIN</button>
      <button class="btn-secondary" id="resultMapBtn">MAP</button>
      <button class="btn-secondary" id="resultMenuBtn">MENU</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── POLYFILL ──
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = Math.min(+r||0, w/2, h/2);
    this.beginPath();
    this.moveTo(x+r,y); this.arcTo(x+w,y,x+w,y+h,r);
    this.arcTo(x+w,y+h,x,y+h,r); this.arcTo(x,y+h,x,y,r);
    this.arcTo(x,y,x+w,y,r); this.closePath(); return this;
  };
}

// ── CANVAS ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', ()=>{ resize(); if(appState!=='fly') resetPlanePos(); });

// ── SOUND ──
let audioCtx = null;
let soundEnabled = localStorage.getItem('pp_sound') === '1';
function getACtx(){
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  return audioCtx;
}
function playDing(){
  if(!soundEnabled) return;
  try{
    const a = getACtx(); if(!a) return;
    const o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.frequency.setValueAtTime(880, a.currentTime);
    o.frequency.exponentialRampToValueAtTime(1100, a.currentTime+0.05);
    g.gain.setValueAtTime(0.3, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+0.4);
    o.start(); o.stop(a.currentTime+0.4);
  }catch(e){}
}
function playCrash(){
  if(!soundEnabled) return;
  try{
    const a = getACtx(); if(!a) return;
    const buf = a.createBuffer(1, a.sampleRate*0.5, a.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(a.sampleRate*0.12));
    const s = a.createBufferSource(), g = a.createGain(), f = a.createBiquadFilter();
    f.type='bandpass'; f.frequency.value=400; f.Q.value=0.8;
    s.buffer=buf; s.connect(f); f.connect(g); g.connect(a.destination);
    g.gain.setValueAtTime(0.5, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+0.5);
    s.start();
  }catch(e){}
}
function playWhoosh(){
  if(!soundEnabled) return;
  try{
    const a = getACtx(); if(!a) return;
    const buf = a.createBuffer(1, a.sampleRate*0.25, a.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(a.sampleRate*0.05));
    const s = a.createBufferSource(), g = a.createGain(), f = a.createBiquadFilter();
    f.type='highpass'; f.frequency.value=1200;
    s.buffer=buf; s.connect(f); f.connect(g); g.connect(a.destination);
    g.gain.setValueAtTime(0.4, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+0.25);
    s.start();
  }catch(e){}
}
function playThermal(){
  if(!soundEnabled) return;
  try{
    const a = getACtx(); if(!a) return;
    const o = a.createOscillator(), g = a.createGain();
    o.type='sine'; o.connect(g); g.connect(a.destination);
    o.frequency.setValueAtTime(300, a.currentTime);
    o.frequency.exponentialRampToValueAtTime(600, a.currentTime+0.3);
    g.gain.setValueAtTime(0.15, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime+0.35);
    o.start(); o.stop(a.currentTime+0.35);
  }catch(e){}
}

let windNode = null, windGain = null;
function startWindSound(){
  if(!soundEnabled) return;
  try{
    const a = getACtx(); if(!a) return;
    if(windNode) return;
    const buf = a.createBuffer(1, a.sampleRate*2, a.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    windNode = a.createBufferSource(); windNode.loop=true; windNode.buffer=buf;
    const f = a.createBiquadFilter(); f.type='lowpass'; f.frequency.value=200;
    windGain = a.createGain(); windGain.gain.value=0;
    windNode.connect(f); f.connect(windGain); windGain.connect(a.destination);
    windNode.start();
  }catch(e){}
}

  try{ if(windNode){ windNode.stop(); windNode=null; windGain=null; } }catch(e){}
}

  try{ if(windGain) windGain.gain.setValueAtTime(Math.min(0.08, v), getACtx().currentTime); }catch(e){}
}

function buildDecos(map){
  const groundY=H*map.horizon;
  // Dense cluster near start (first 3000 units) so you see stuff immediately
  const nearCount = map.key==='city' ? 30 : 18;
  for(let i=0;i<nearCount;i++){
    const wx=rnd(150, 3000);
    if(map.key==='backyard') worldDecos.push(...genBackyardDeco(wx,groundY));
    else if(map.key==='city') worldDecos.push(...genCityDeco(wx,groundY));
    else if(map.key==='desert') worldDecos.push(...genDesertDeco(wx,groundY));
    else if(map.key==='arctic') worldDecos.push(...genArcticDeco(wx,groundY));
    else if(map.key==='storm') worldDecos.push(...genStormDeco(wx,groundY));
    else if(map.key==='moon') worldDecos.push(...genMoonDeco(wx,groundY));
  }
  // Spread the rest across the full world
  for(let i=0;i<65;i++){
    const wx=rnd(3000, WORLD_LEN);
    if(map.key==='backyard') worldDecos.push(...genBackyardDeco(wx,groundY));
    else if(map.key==='city') worldDecos.push(...genCityDeco(wx,groundY));
    else if(map.key==='desert') worldDecos.push(...genDesertDeco(wx,groundY));
    else if(map.key==='arctic') worldDecos.push(...genArcticDeco(wx,groundY));
    else if(map.key==='storm') worldDecos.push(...genStormDeco(wx,groundY));
    else if(map.key==='moon') worldDecos.push(...genMoonDeco(wx,groundY));
  }
  worldDecos.sort((a,b)=>a.layer-b.layer||a.wx-b.wx);
}

// ── PHYSICS CONSTANTS ──
const AIR_RES = 0.9994;
const MIN_SPD = 1.1;

function physicsStep(){
  const map=currentMapDef(), stats=upgradeStats();
  const groundY=H*map.horizon;
  tik++;

  // Time
  timeThisRun += 1/60;

  // Wind
  wind += (Math.random()-0.5)*map.windGust;
  wind = Math.max(-0.14, Math.min(0.14, wind*0.98+map.windBase*0.02));

  // Storm gusts
  if(map.hasStormGusts){
    stormGustTimer--;
    if(stormGustTimer<=0){
      wind += (Math.random()-0.5)*0.25;
      stormGustTimer = rnd(60,180);
      showMsg(pick(['Brace yourself.','Gust incoming.','Wind says no.','Turbulence is a lifestyle.']));
    }
  }
  // City gusts (horizontal between buildings)
  if(map.hasCityGusts && Math.random()<0.003){
    wind += (Math.random()-0.5)*0.12;
  }
  // Arctic ice bursts
  if(map.hasIceBursts){
    iceBurstTimer--;
    if(iceBurstTimer<=0){
      plane.vx += (Math.random()-0.5)*3.5;
      iceBurstTimer = rnd(180,360);
      showMsg('Ice burst!');
    }
  }

  // Steering
  let norm=(mouseY/H)*2-1;
  let tgtAngle=norm*0.52;
  tgtAngle=Math.max(-0.52, Math.min(0.68, tgtAngle));
  plane.angle += (tgtAngle-plane.angle)*stats.lerpRate;

  let speed=Math.hypot(plane.vx,plane.vy)||0.001;
  let velAng=Math.atan2(plane.vy,plane.vx);
  let aoa=plane.angle-velAng;
  let eff=speed>MIN_SPD?1:speed/MIN_SPD;
  const stallThresh = 0.38 - stats.stallBonus;

  // Lift
  const liftMag=speed*Math.sin(aoa)*stats.liftK*eff;
  plane.vx += -liftMag*Math.sin(velAng);
  plane.vy +=  liftMag*Math.cos(velAng);

  // Drag
  const dragF=speed*speed*stats.dragK;
  plane.vx -= (plane.vx/speed)*dragF;
  plane.vy -= (plane.vy/speed)*dragF;

  plane.vx *= AIR_RES;
  plane.vy += map.gravity;
  plane.vx += wind + stats.speedBonus*0.02;

  // Move plane
  plane.x += plane.vx;
  plane.y += plane.vy;

  // Thermals
  plane.glowTimer=Math.max(0,plane.glowTimer-1);
  plane.thermalGlow=Math.max(0,plane.thermalGlow-1);
  for(const t of worldThermals){
    const dx=plane.x-t.wx, dy=plane.y-t.wy;
    const d=Math.hypot(dx,dy);
    const effectR=t.r*2*stats.senseRange;
    if(d<effectR){
      const fac=(1-d/effectR)*t.strength*stats.senseStrength;
      plane.vy -= fac*0.22;
      plane.glowTimer=18; plane.thermalGlow=22;
      if(d<t.r*0.7){ burst(plane.x,plane.y,'#ffd700',8); playThermal(); thermalSoundTimer=30; showMsg(pick(['Nature said yes','Free lift — suspicious','Thermal secured','Going up.'])); }
    }
  }

  // Camera
  const targetX=plane.x-W*0.28;
  camX += (targetX-camX)*0.08;
  dist=Math.max(dist,plane.x-LAUNCH_X);

  // Wind sound
  setWindVolume(speed*0.004);

  // Trail
  plane.trail.push({x:plane.x,y:plane.y,age:0});
  if(plane.trail.length>32) plane.trail.shift();
  plane.trail.forEach(p=>p.age++);

  // Stall messages
  if(Math.abs(aoa)>stallThresh+0.15 && speed<3 && Math.random()<0.02) showMsg('Speed is your friend. You have no friends.');

  // Altitude messages
  const planeScreenY=plane.y-0;
  if(planeScreenY<H*0.07 && Math.random()<0.01) showMsg('Icarus energy detected');
  if(plane.y>groundY-40 && Math.random()<0.02) showMsg('The worms say hi');

  // Distance milestones
  const distFt=Math.floor(dist*3.28084);
  if(distFt>0 && distFt%500<5 && tik%30===0) showDistMsg(distFt);

  // Long airtime
  if(timeThisRun>30 && tik%300===0) showMsg("You've been up there a while");

  // Map-specific
  if(map.key==='moon' && tik===60) showMsg('One small flight for James...');
  if(map.key==='storm' && tik===120) showMsg('Brave. Stupid. Same thing.');

  // Ring collision
  for(const ring of worldRings){
    if(ring.hit) continue;
    const dx=plane.x-ring.wx, dy=plane.y-ring.wy;
    if(Math.hypot(dx,dy)<ring.r+8){
      ring.hit=true; ring.flash=20;
      const c=Math.round(ring.coins*map.coinBonus);
      coinsThisRun+=c; ppCoins+=c; ringsThisRun++;
      burst(ring.wx,ring.wy,'#ffd700',12); playDing();
      showMsg(pick(['Ring secured. Barely.','That counted somehow','Ding!','Threading the needle.']));
      updateMissionProgress('rings',1); updateMissionProgress('coins',c);
    }
  }

  // Crash check
  if(plane.y>=groundY+4||plane.x<-200){
    appState='crash'; playCrash(); stopWindSound();
    for(let i=0;i<18;i++) crashPieces.push({ x:plane.x,y:plane.y,vx:rnd(-4,4),vy:rnd(-5,1),angle:rnd(0,Math.PI*2),va:rnd(-0.2,0.2),alpha:1 });
    setTimeout(showResult,900);
  }

  // Ceiling
  if(plane.y<0){ plane.y=0; plane.vy=Math.abs(plane.vy)*0.3; }

  // Update mission tracking
  updateMissionProgress('dist', dist*3.28084);
  updateMissionProgress('time', timeThisRun);
  if(map.key==='storm'||map.key==='moon') updateMissionProgress('map', map.key);
}

function showDistMsg(ft){
  const msgs={
    500:"500 feet. Not bad for paper.",
    1000:"1,000 feet. Somebody's been practicing.",
    1500:"1,500 feet. Are you even tired?",
    2000:"2,000 feet. Certified pilot at this point.",
    2500:"2,500 feet. The birds are judging you.",
    3000:"3,000 feet. Physics is just a suggestion.",
    4000:"4,000 feet. Put this on your resume.",
    5000:"5,000 feet. Are you even human?",
  };
  showMsg(msgs[ft]||`${ft} ft and counting...`);
}

function showMsg(txt){
  currentMsg=txt; msgAlpha=1; msgTimer=180;
}

function updateMissionProgress(type, val){
  for(const m of missionData.missions){
    if(m.claimed) continue;
    if(type==='dist' && m.type==='dist') m.progress=Math.max(m.progress,val);
    if(type==='dist' && m.type==='distNoRing' && ringsThisRun===0) m.progress=Math.max(m.progress,val);
    if(type==='rings' && m.type==='rings') m.progress=Math.min(m.target,m.progress+1);
    if(type==='time' && m.type==='time') m.progress=Math.max(m.progress,val);
    if(type==='coins' && m.type==='coins') m.progress=Math.min(m.target, m.progress+val);
    if(type==='map' && m.type==='map' && m.target===val) m.progress=1;
  }
}

// ── PARTICLES ──
function burst(x,y,color,n){
  for(let i=0;i<n;i++) particles.push({ x,y,vx:rnd(-3,3),vy:rnd(-4,0.5),color,alpha:1,r:rnd(2,5) });
}
function stepParticles(){
  particles=particles.filter(p=>p.alpha>0.02);
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.alpha-=0.028; });
  crashPieces=crashPieces.filter(p=>p.alpha>0.02);
  crashPieces.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.angle+=p.va; p.alpha-=0.018; });
}

// ── DRAW ──
function drawBg(){
  const map=currentMapDef();
  // Sky gradient
  const skyGrad=ctx.createLinearGradient(0,0,0,H);
  skyGrad.addColorStop(0, map.skyTop);
  skyGrad.addColorStop(1, map.skyBot);
  ctx.fillStyle=skyGrad; ctx.fillRect(0,0,W,H);

  // Moon map: stars
  if(map.key==='moon'){
    ctx.fillStyle='rgba(255,255,255,0.85)';
    // deterministic stars based on camX
    for(let i=0;i<200;i++){
      const sx=((i*137.5+camX*0.02)%W+W)%W;
      const sy=(i*67.3)%H;
      const sr=i%5===0?1.5:0.8;
      ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
    }
    // Earth
    const ex=W*0.82-camX*0.02;
    const ey=H*0.18;
    const eg=ctx.createRadialGradient(ex-10,ey-10,5,ex,ey,55);
    eg.addColorStop(0,'#4488ff'); eg.addColorStop(0.4,'#2244aa'); eg.addColorStop(0.7,'#44aa44'); eg.addColorStop(1,'rgba(0,0,100,0)');
    ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(ex,ey,55,0,Math.PI*2); ctx.fill();
  }

  // Arctic aurora
  if(map.key==='arctic'){
    for(const d of worldDecos.filter(d=>d.type==='aurora')){
      const sx=d.wx-camX;
      if(sx<-d.w||sx>W+d.w) continue;
      const ag=ctx.createLinearGradient(sx,d.wy,sx,d.wy+d.h);
      ag.addColorStop(0,'rgba(0,0,0,0)');
      ag.addColorStop(0.3,`rgba(${d.color==='#00ff88'?'0,255,136':'0,136,255'},0.18)`);
      ag.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=ag; ctx.fillRect(sx-d.w/2,d.wy,d.w,d.h);
    }
  }

  // Storm rain streaks
  if(map.key==='storm'){
    ctx.strokeStyle='rgba(180,200,255,0.12)'; ctx.lineWidth=1;
    for(let i=0;i<80;i++){
      const rx=((i*241+tik*2)%W+W)%W;
      const ry=((i*113+tik*3)%H);
      ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx-4,ry+14); ctx.stroke();
    }
    // Lightning
    if(Math.random()<0.003){
      const lx=rnd(0,W); ctx.strokeStyle='rgba(255,255,150,0.6)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(lx,0);
      let ly=0; while(ly<H*0.6){ ly+=rnd(20,50); ctx.lineTo(lx+rnd(-20,20),ly); }
      ctx.stroke();
    }
  }

  // Clouds
  if(map.key!=='moon'){
    for(const c of worldClouds){
      const sx=c.wx-camX*0.55;
      if(sx<-200||sx>W+200) continue;
      const g=ctx.createRadialGradient(sx,c.wy,0,sx,c.wy,c.r);
      const col=map.key==='storm'?`rgba(60,50,80,${c.alpha})`:`rgba(${Math.round(230*c.grey)},${Math.round(240*c.grey)},255,${c.alpha})`;
      g.addColorStop(0,col); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(sx,c.wy,c.r*1.3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx-c.r*0.5,c.wy+c.r*0.1,c.r*0.8,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx+c.r*0.45,c.wy+c.r*0.08,c.r*0.7,0,Math.PI*2); ctx.fill();
    }
  }

  // Thermals glow
  const stats=upgradeStats();
  for(const t of worldThermals){
    const sx=t.wx-camX, sy=t.wy;
    if(sx<-200||sx>W+200) continue;
    const tg=ctx.createRadialGradient(sx,sy,0,sx,sy,t.r*2.5*stats.senseRange);
    tg.addColorStop(0,'rgba(255,200,50,0.12)'); tg.addColorStop(0.5,'rgba(255,150,0,0.05)'); tg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=tg; ctx.beginPath(); ctx.arc(sx,sy,t.r*2.5*stats.senseRange,0,Math.PI*2); ctx.fill();
    // Shimmer column for high thermal sense
    if(stats.senseRange>=1.7){
      ctx.strokeStyle=`rgba(255,200,50,${0.08+0.04*Math.sin(tik*0.1+t.phase)})`;
      ctx.lineWidth=t.r*0.6; ctx.beginPath();
      const groundY=H*map.horizon;
      ctx.moveTo(sx,groundY); ctx.lineTo(sx+Math.sin(tik*0.05+t.phase)*8,sy); ctx.stroke();
    }
  }
}

function drawGround(){
  const map=currentMapDef();
  const groundY=H*map.horizon;
  ctx.fillStyle=map.groundColor; ctx.fillRect(0,groundY,W,H-groundY);
  ctx.fillStyle=map.groundTop; ctx.fillRect(0,groundY,W,6);

  // Decorations
  for(const d of worldDecos){
    const sx=d.wx-camX;
    if(sx<-300||sx>W+300) continue;
    drawDeco(d,sx,map);
  }
}

function drawDeco(d,sx,map){
  const gy=H*map.horizon;
  ctx.save();
  switch(d.type){
    case 'tree_back':{
      const tx=sx, ty=gy-d.h;
      ctx.fillStyle='#5a3a1a'; ctx.fillRect(tx-3,ty+d.h*0.6,6,d.h*0.4);
      ctx.fillStyle=d.color;
      ctx.beginPath(); ctx.arc(tx,ty+d.h*0.35,d.w*0.55,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(tx,ty+d.h*0.15,d.w*0.38,0,Math.PI*2); ctx.fill();
      break;
    }
    case 'house':{
      const hx=sx, hy=gy-d.h;
      ctx.fillStyle=d.wallColor; ctx.fillRect(hx-d.w/2,hy,d.w,d.h);
      ctx.fillStyle=d.roofColor;
      ctx.beginPath(); ctx.moveTo(hx-d.w/2-4,hy); ctx.lineTo(hx,hy-d.h*0.45); ctx.lineTo(hx+d.w/2+4,hy); ctx.fill();
      ctx.fillStyle='rgba(100,180,255,0.5)';
      ctx.fillRect(hx-d.w*0.25-6,hy+d.h*0.25,12,12); ctx.fillRect(hx+d.w*0.1,hy+d.h*0.25,12,12);
      ctx.fillStyle='rgba(80,40,10,0.8)'; ctx.fillRect(hx-5,hy+d.h*0.55,10,d.h*0.45);
      if(d.chimney){ ctx.fillStyle='#7a5040'; ctx.fillRect(hx+d.w*0.15,hy-d.h*0.55,8,d.h*0.3); }
      break;
    }
    case 'fence':{
      ctx.fillStyle='#c8a87a'; ctx.fillRect(sx-d.w/2,gy-14,d.w,3);
      for(let i=0;i<d.w;i+=10){ ctx.fillRect(sx-d.w/2+i,gy-20,5,20); }
      break;
    }
    case 'building':{
      const bx=sx-d.w/2, by=gy-d.h;
      ctx.fillStyle=d.color; ctx.fillRect(bx,by,d.w,d.h);
      ctx.fillStyle='rgba(255,255,150,0.25)';
      for(let r=0;r<d.winRows;r++) for(let c=0;c<d.winCols;c++){
        if(Math.random()<0.55) ctx.fillRect(bx+4+c*14,by+4+r*16,8,9);
      }
      if(d.billboard){
        ctx.fillStyle='rgba(255,80,0,0.8)'; ctx.fillRect(bx,by-20,d.w,16);
        ctx.fillStyle='#fff'; ctx.font='bold 8px Arial'; ctx.textAlign='center';
        ctx.fillText('ADS',sx,by-7);
      }
      break;
    }
    case 'lamp':{
      ctx.strokeStyle='#888'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(sx,gy); ctx.lineTo(sx,gy-d.h); ctx.lineTo(sx+12,gy-d.h+5); ctx.stroke();
      ctx.fillStyle='rgba(255,255,150,0.8)'; ctx.beginPath(); ctx.arc(sx+12,gy-d.h+5,4,0,Math.PI*2); ctx.fill();
      break;
    }
    case 'cactus':{
      ctx.fillStyle='#3a7a30'; ctx.fillRect(sx-5,gy-d.h,10,d.h);
      ctx.fillRect(sx-18,gy-d.h*0.6,13,6); ctx.fillRect(sx+5,gy-d.h*0.7,13,6);
      ctx.fillRect(sx-18,gy-d.h*0.6-16,6,16); ctx.fillRect(sx+12,gy-d.h*0.7-16,6,16);
      break;
    }
    case 'dune':{
      ctx.fillStyle='#d4a850';
      ctx.beginPath(); ctx.ellipse(sx,gy,d.w/2,d.h,0,Math.PI,0); ctx.fill();
      break;
    }
    case 'mirage':{
      ctx.fillStyle='rgba(200,180,100,0.15)';
      ctx.fillRect(sx-40,gy-4,80,4);
      break;
    }
    case 'ice_shard':{
      ctx.fillStyle='rgba(180,220,255,0.7)';
      ctx.beginPath(); ctx.moveTo(sx,gy-d.h); ctx.lineTo(sx-d.w/2,gy); ctx.lineTo(sx+d.w/2,gy); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.beginPath(); ctx.moveTo(sx,gy-d.h); ctx.lineTo(sx-d.w/4,gy-d.h*0.4); ctx.lineTo(sx,gy-d.h*0.6); ctx.fill();
      break;
    }
    case 'snow_mound':{
      ctx.fillStyle='rgba(220,235,255,0.9)';
      ctx.beginPath(); ctx.ellipse(sx,gy,d.w/2,d.h,0,Math.PI,0); ctx.fill();
      break;
    }
    case 'crater':{
      ctx.strokeStyle='rgba(80,80,90,0.7)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(sx,gy-2,d.r,d.r*0.35,0,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='rgba(60,60,70,0.25)';
      ctx.beginPath(); ctx.ellipse(sx,gy-2,d.r*0.7,d.r*0.22,0,0,Math.PI*2); ctx.fill();
      break;
    }
    case 'rock':{
      ctx.fillStyle='#707080';
      ctx.beginPath(); ctx.ellipse(sx,gy-d.h/2,d.w/2,d.h/2,0,0,Math.PI*2); ctx.fill();
      break;
    }
    case 'flag':{
      ctx.strokeStyle='#aaa'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(sx,gy); ctx.lineTo(sx,gy-40); ctx.stroke();
      ctx.fillStyle='#cc2222';
      ctx.beginPath(); ctx.moveTo(sx,gy-40); ctx.lineTo(sx+18,gy-34); ctx.lineTo(sx,gy-28); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='5px Arial'; ctx.textAlign='left'; ctx.fillText('NASA',sx+2,gy-33);
      break;
    }
  }
  ctx.restore();
}

function drawRings(){
  const map=currentMapDef();
  for(const ring of worldRings){
    if(ring.hit && ring.flash<=0) continue;
    const sx=ring.wx-camX, sy=ring.wy;
    if(sx<-60||sx>W+60) continue;
    if(ring.flash>0) ring.flash--;
    ctx.save();
    if(ring.hit){
      ctx.globalAlpha=ring.flash/20;
      ctx.strokeStyle='#ffd700'; ctx.lineWidth=4;
    } else {
      ctx.strokeStyle=map.key==='moon'?'rgba(150,200,255,0.9)':'rgba(255,200,50,0.85)';
      ctx.lineWidth=2.5;
      // glow
      ctx.shadowColor=map.key==='moon'?'#88bbff':'#ffd700';
      ctx.shadowBlur=10;
    }
    ctx.beginPath(); ctx.arc(sx,sy,ring.r,0,Math.PI*2); ctx.stroke();
    if(!ring.hit){
      ctx.fillStyle='rgba(255,200,50,0.08)'; ctx.shadowBlur=0;
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawPlane(){
  const stats=upgradeStats();
  ctx.save();
  ctx.translate(plane.x-camX, plane.y);
  ctx.rotate(plane.angle);

  // Thermal glow
  if(plane.thermalGlow>0){
    const a=plane.thermalGlow/22*0.4;
    const gg=ctx.createRadialGradient(0,0,0,0,0,28);
    gg.addColorStop(0,`rgba(255,200,50,${a})`); gg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2); ctx.fill();
  }

  drawPlaneSkin(ppSkin, stats.flapsLvl, stats.noseLvl, stats.tailLvl);
  ctx.restore();
}

function drawPlaneSkin(skin, flapsLvl, noseLvl, tailLvl){
  // Wing scale based on flaps level
  const wingScale = 1 + flapsLvl*0.12;
  // Nose sharpness: extra nose length
  const noseExtra = noseLvl*2;
  // Tail prominence
  const tailH = 4 + tailLvl*2.5;

  let bodyColor, wingTopColor, wingBotColor, accentColor, lineColor;
  switch(skin){
    case 'notebook':  bodyColor='#e8f0ff'; wingTopColor='#d0e4ff'; wingBotColor='#c0d8ff'; accentColor='#3366cc'; lineColor='#6699ee'; break;
    case 'gold':      bodyColor='#f0d060'; wingTopColor='#e8c030'; wingBotColor='#c8a010'; accentColor='#8a6000'; lineColor='#ffd700'; break;
    case 'cardboard': bodyColor='#c8a060'; wingTopColor='#b89050'; wingBotColor='#a07840'; accentColor='#604020'; lineColor='#987040'; break;
    case 'receipt':   bodyColor='#f5f0e8'; wingTopColor='#ede8e0'; wingBotColor='#e0dcd4'; accentColor='#888'; lineColor='#aaa'; break;
    case 'jh':        bodyColor='#cc1122'; wingTopColor='#aa0011'; wingBotColor='#880008'; accentColor='#ffd700'; lineColor='#ff4444'; break;
    case 'ea':        bodyColor='#1a2a4a'; wingTopColor='#142038'; wingBotColor='#0e1828'; accentColor='#ff7700'; lineColor='#ff9933'; break;
    default:          bodyColor='#f8f6f0'; wingTopColor='#eae6dc'; wingBotColor='#ddd8cc'; accentColor='#e84040'; lineColor='#c8c0b8'; break;
  }

  const W2=18+flapsLvl*3, H2=7*wingScale;
  // Top wing
  ctx.fillStyle=wingTopColor;
  ctx.beginPath(); ctx.moveTo(22+noseExtra,0); ctx.lineTo(-W2,-H2); ctx.lineTo(-W2+3,0); ctx.fill();
  // Bottom wing
  ctx.fillStyle=wingBotColor;
  ctx.beginPath(); ctx.moveTo(22+noseExtra,0); ctx.lineTo(-W2,H2*0.7); ctx.lineTo(-W2+3,0); ctx.fill();
  // Body
  ctx.fillStyle=bodyColor;
  ctx.beginPath(); ctx.moveTo(22+noseExtra,0); ctx.lineTo(-W2+3,0); ctx.lineTo(-W2+3+2,-3); ctx.closePath(); ctx.fill();
  // Crease line
  ctx.strokeStyle=lineColor; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.moveTo(22+noseExtra,0); ctx.lineTo(-W2+3,0); ctx.stroke();
  // Tail fin
  if(tailLvl>0){
    ctx.fillStyle=accentColor; ctx.globalAlpha=0.7;
    ctx.beginPath(); ctx.moveTo(-W2+3,0); ctx.lineTo(-W2+3-8,-tailH); ctx.lineTo(-W2+3+2,0); ctx.fill();
    ctx.globalAlpha=1;
  }
  // Nose accent
  ctx.fillStyle=accentColor;
  ctx.beginPath(); ctx.moveTo(22+noseExtra,0); ctx.lineTo(18+noseExtra,-2); ctx.lineTo(18+noseExtra,2); ctx.fill();

  // Skin-specific details
  if(skin==='notebook'){
    ctx.strokeStyle='rgba(100,150,255,0.5)'; ctx.lineWidth=0.6;
    for(let i=-2;i<3;i++){ ctx.beginPath(); ctx.moveTo(10,-i*2.2); ctx.lineTo(-14,-i*2.2); ctx.stroke(); }
  }
  if(skin==='receipt'){
    ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.font='3px monospace'; ctx.textAlign='center';
    ctx.fillText('THANK YOU', 0, -2);
  }
  if(skin==='jh'){
    ctx.fillStyle='#ffd700'; ctx.font='bold 7px Arial'; ctx.textAlign='center';
    ctx.fillText('JH', -2, 2);
    ctx.strokeStyle='#ffd700'; ctx.lineWidth=0.5;
    ctx.strokeRect(-W2+5,-H2+1,W2+14,H2*1.6);
  }
  if(skin==='ea'){
    ctx.fillStyle='#ff7700'; ctx.font='bold 6px Arial'; ctx.textAlign='center';
    ctx.fillText('EA', -2, 2);
    ctx.strokeStyle='#ff7700'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(22+noseExtra,0); ctx.lineTo(-W2+3,0); ctx.stroke();
  }
  if(skin==='gold'){
    // shine effect
    const sg=ctx.createLinearGradient(-W2,-H2,0,0);
    sg.addColorStop(0,'rgba(255,255,255,0)'); sg.addColorStop(0.4,'rgba(255,255,200,0.3)'); sg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sg;
    ctx.beginPath(); ctx.moveTo(22+noseExtra,0); ctx.lineTo(-W2,-H2); ctx.lineTo(-W2+3,0); ctx.closePath(); ctx.fill();
  }
}

function drawTrail(){
  if(plane.trail.length<2) return;
  ctx.save();
  for(let i=1;i<plane.trail.length;i++){
    const a=i/plane.trail.length*0.35;
    const sx1=plane.trail[i-1].x-camX, sy1=plane.trail[i-1].y;
    const sx2=plane.trail[i].x-camX,   sy2=plane.trail[i].y;
    ctx.strokeStyle=`rgba(180,210,255,${a})`;
    ctx.lineWidth=1.2; ctx.beginPath(); ctx.moveTo(sx1,sy1); ctx.lineTo(sx2,sy2); ctx.stroke();
  }
  ctx.restore();
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.alpha; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x-camX,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  for(const p of crashPieces){
    ctx.save(); ctx.globalAlpha=p.alpha; ctx.translate(p.x-camX,p.y); ctx.rotate(p.angle);
    ctx.fillStyle='#f0ece4'; ctx.fillRect(-6,-2,12,3);
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

function drawHUD(){
  const distFt = Math.floor(dist*3.28084);
  const map = currentMapDef();
  // top bar
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.roundRect(12,12,200,52,10); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 22px system-ui'; ctx.textAlign='left';
  ctx.fillText(distFt+' ft', 22, 38);
  ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='12px system-ui';
  ctx.fillText('Best: '+Math.floor(best*3.28084)+' ft  |  '+map.name, 22, 56);
  // coins
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.roundRect(W-140,12,128,36,10); ctx.fill();
  ctx.fillStyle='#ffd700'; ctx.font='bold 15px system-ui'; ctx.textAlign='right';
  ctx.fillText('🪙 '+ppCoins, W-18, 35);
  ctx.restore();

  // Floating message
  if(msgAlpha>0){
    msgTimer--; if(msgTimer<60) msgAlpha=Math.max(0,msgAlpha-0.02);
    ctx.save(); ctx.globalAlpha=msgAlpha;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.roundRect(W/2-180,H*0.22-18,360,36,10); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 14px system-ui'; ctx.textAlign='center';
    ctx.fillText(currentMsg, W/2, H*0.22+5);
    ctx.restore();
  }

  // Launch aim line
  if(appState==='aim'&&isDragging){
    const px=plane.x-camX, py=plane.y;
    const dx=px-aimX, dy=py-aimY;
    launchPower=Math.min(1, Math.hypot(dx,dy)/180);
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.setLineDash([8,6]);
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(aimX,aimY); ctx.stroke();
    ctx.setLineDash([]);
    // Power bar
    const barX=W/2-80, barY=H-70;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.roundRect(barX,barY,160,20,8); ctx.fill();
    ctx.fillStyle=launchPower>0.8?'#ff4444':launchPower>0.5?'#ffaa00':'#44cc88';
    ctx.roundRect(barX+2,barY+2,156*launchPower,16,6); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 11px system-ui'; ctx.textAlign='center';
    ctx.fillText('POWER', W/2, barY+14);
    ctx.restore();
  }

  // Sound icon (always visible during flight)
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.roundRect(W-46,H-46,34,34,8); ctx.fill();
  ctx.font='16px system-ui'; ctx.textAlign='center';
  ctx.fillText(soundEnabled?'🔊':'🔇', W-29, H-23);
  ctx.restore();
}

// ── LAUNCH SCREEN (aim) ──
function drawAimScreen(){
  drawBg(); drawGround(); drawRings();
  const px=plane.x-camX, py=plane.y;
  // Aim arrow: from plane toward mouse
  if(isDragging){
    const dx=aimX-px, dy=aimY-py;
    const dist2=Math.hypot(dx,dy);
    launchPower=Math.min(1, dist2/150);
    ctx.save();
    // Dotted direction line
    ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=2; ctx.setLineDash([8,6]);
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(aimX,aimY); ctx.stroke();
    ctx.setLineDash([]);
    // Arrow head
    if(dist2>20){
      const ang2=Math.atan2(dy,dx);
      ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.moveTo(aimX,aimY);
      ctx.lineTo(aimX-16*Math.cos(ang2-0.4),aimY-16*Math.sin(ang2-0.4));
      ctx.lineTo(aimX-16*Math.cos(ang2+0.4),aimY-16*Math.sin(ang2+0.4));
      ctx.fill();
    }
    // Power bar
    const barX=W/2-80, barY=H-70;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.roundRect(barX,barY,160,20,8); ctx.fill();
    ctx.fillStyle=launchPower>0.8?'#ff4444':launchPower>0.5?'#ffaa00':'#44cc88';
    ctx.roundRect(barX+2,barY+2,156*launchPower,16,6); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 11px system-ui'; ctx.textAlign='center';
    ctx.fillText('POWER', W/2, barY+14);
    ctx.restore();
  }
  drawPlane(); drawHUD();
  // Hint text
  if(!isDragging){
    ctx.save();
    ctx.globalAlpha=0.88;
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.roundRect(W/2-165,H-110,330,40,10); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 15px system-ui'; ctx.textAlign='center';
    ctx.fillText('✈️  Click the plane, drag to aim, release to launch!', W/2, H-85);
    ctx.restore();
  }
}

// ── MAIN GAME LOOP ──
let lastTime=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min(ts-lastTime,50); lastTime=ts;
  ctx.clearRect(0,0,W,H);
  if(appState==='aim'){ drawAimScreen(); return; }
  if(appState==='menu'){ drawBg(); return; }
  drawBg();
  if(appState==='fly'||appState==='crash'){
    if(appState==='fly') physicsStep();
    stepParticles();
    drawGround(); drawRings(); drawTrail();
    drawParticles(); drawPlane(); drawHUD();
  }
}
requestAnimationFrame(loop);

// ── RESULT SCREEN ──
function showResult(){
  const distFt=Math.floor(dist*3.28084);
  const wasNewBest=dist>best;
  if(dist>best){ best=dist; localStorage.setItem('ppBest2',String(best)); }
  consecutiveRuns++;

  // Mission completion finalization
  updateMissionProgress('dist', distFt);
  updateMissionProgress('time', timeThisRun);
  updateMissionProgress('coins', coinsThisRun);
  if(ringsThisRun===0) updateMissionProgress('distNoRing', distFt);
  if(wasNewBest) updateMissionProgress('newBest', 1);
  if(maxPowerLaunched) updateMissionProgress('maxPower', 1);
  updateMissionProgress('runs', consecutiveRuns);

  // Check map missions
  const map=currentMapDef();
  if(map.key==='storm') updateMissionProgress('map','storm');
  if(map.key==='moon') updateMissionProgress('map','moon');

  persist();

  // Grade
  let grade, gradeColor;
  if(distFt<50)        { grade='F';  gradeColor='#cc2222'; }
  else if(distFt<200)  { grade='D';  gradeColor='#cc5522'; }
  else if(distFt<500)  { grade='C+'; gradeColor='#cc9900'; }
  else if(distFt<1000) { grade='B';  gradeColor='#88aa22'; }
  else if(distFt<2000) { grade='A-'; gradeColor='#44aa44'; }
  else                  { grade='S';  gradeColor='#cc9900'; }

  // Sarcastic message
  const msgs={
    'F':["Did the plane want to fly? Because it didn't.","Bold attempt. Catastrophic result.","Zero to ground in record time."],
    'D':["Respectable for a paper napkin.","It flew. Briefly.","The runway was right there."],
    'C+':["C+ for effort, F for landing.","Mediocre in an inspiring way.","The thermometer of adequacy."],
    'B':["Getting there. Slowly.","Almost competent.","A solid meh."],
    'A-':["Okay you can actually fly.","This is getting suspicious.","Respectable. Annoyingly so."],
    'S':["Are you even human?","Paper can do that?","We may have a situation."],
  };
  const msg=pick(msgs[grade]||["Hm."]);

  document.getElementById('resultGrade').textContent=grade;
  document.getElementById('resultGrade').style.background=gradeColor;
  document.getElementById('resultGrade').style.color='#fff';
  document.getElementById('resultNewBest').style.display=wasNewBest?'block':'none';
  document.getElementById('resultDist').textContent=distFt+' ft';
  document.getElementById('resRings').textContent=ringsThisRun;
  document.getElementById('resTime').textContent=Math.floor(timeThisRun)+'s';
  document.getElementById('resCoins').textContent='+'+coinsThisRun;
  document.getElementById('resultCoinsTotal').textContent='Total: '+ppCoins+' coins';
  document.getElementById('resultMsg').textContent=msg;

  // Unlocks
  const unlockDiv=document.getElementById('resultUnlocks');
  unlockDiv.innerHTML='';
  for(const m of MAP_DEFS){
    if(!ppUnlocked.includes(m.key)&&ppCoins>=m.unlockCoins&&m.unlockCoins>0){
      ppUnlocked.push(m.key);
      unlockDiv.innerHTML+=`<div class="result-unlock-row">🔓 ${m.name} Map Unlocked!</div>`;
    }
  }
  for(const s of SKIN_DEFS){
    if(!ppSkinOwned.includes(s.key)&&ppCoins>=s.cost&&s.cost>0&&s.cost<=300){
      ppSkinOwned.push(s.key);
      unlockDiv.innerHTML+=`<div class="result-unlock-row">🎨 ${s.name} Skin Unlocked!</div>`;
    }
  }
  persist();

  appState='result';
  document.getElementById('result-screen').classList.add('active');
}

// ── UI BUILDERS ──
function updateMenuUI(){
  document.getElementById('menuBest').textContent=Math.floor(best*3.28084);
  document.getElementById('menuCoins').textContent=ppCoins;
  document.getElementById('menuMapChip').textContent='Map: '+currentMapDef().name;
  document.getElementById('menuSoundBtn').textContent=(soundEnabled?'🔊':'🔇')+' SOUND';
}

function buildMapsUI(){
  document.getElementById('mapsCoinsLabel').textContent=ppCoins+' coins available';
  const grid=document.getElementById('mapsGrid'); grid.innerHTML='';
  for(const map of MAP_DEFS){
    const owned=ppUnlocked.includes(map.key);
    const active=map.key===ppMap;
    const card=document.createElement('div');
    card.className='map-card'+(active?' selected':'');
    // Banner
    const banner=document.createElement('div');
    banner.className='map-banner';
    banner.style.background=`linear-gradient(135deg,${map.skyTop},${map.skyBot})`;
    const nameEl=document.createElement('div');
    nameEl.className='map-banner-name'; nameEl.textContent=map.name;
    banner.appendChild(nameEl);
    // Body
    const body=document.createElement('div'); body.className='map-body';
    const desc=document.createElement('div'); desc.className='map-desc'; desc.textContent=map.desc;
    const meta=document.createElement('div'); meta.className='map-meta';
    map.tags.forEach(t=>{ const tag=document.createElement('span'); tag.className='tag'; tag.textContent=t; meta.appendChild(tag); });
    const btn=document.createElement('button'); btn.className='map-btn';
    if(active){ btn.className+=' active'; btn.textContent='✓ SELECTED'; }
    else if(owned){ btn.className+=' play'; btn.textContent='SELECT'; }
    else if(ppCoins>=map.unlockCoins){ btn.className+=' unlock'; btn.textContent='🔓 UNLOCK ('+map.unlockCoins+' 🪙)'; }
    else{ btn.className+=' unlock'; btn.textContent='🔒 '+map.unlockCoins+' 🪙'; btn.disabled=true; }
    btn.onclick=()=>{
      if(active) return;
      if(owned){ ppMap=map.key; persist(); buildMapsUI(); updateMenuUI(); }
      else if(ppCoins>=map.unlockCoins){ ppCoins-=map.unlockCoins; ppUnlocked.push(map.key); ppMap=map.key; persist(); buildMapsUI(); updateMenuUI(); }
    };
    body.appendChild(desc); body.appendChild(meta); body.appendChild(btn);
    card.appendChild(banner); card.appendChild(body);
    if(!owned&&ppCoins<map.unlockCoins){
      const ov=document.createElement('div'); ov.className='map-lock-overlay';
      ov.innerHTML=`<div class="lock-icon">🔒</div><div class="lock-cost">${map.unlockCoins} 🪙</div>`;
      card.appendChild(ov);
    }
    grid.appendChild(card);
  }
}

function buildUpgradesUI(){
  document.getElementById('upgradesCoinsLabel').textContent=ppCoins+' coins available';
  const grid=document.getElementById('upgradesGrid'); grid.innerHTML='';
  for(const def of UPGRADE_DEFS){
    const lvl=ppUpgrades[def.key];
    const maxed=lvl>=def.levels.length-1;
    const card=document.createElement('div'); card.className='upgrade-card';
    const h3=document.createElement('h3'); h3.textContent=def.icon+' '+def.name;
    const p=document.createElement('p'); p.textContent=def.desc;
    const dotsWrap=document.createElement('div'); dotsWrap.className='upgrade-levels';
    for(let i=0;i<def.levels.length;i++){
      const dot=document.createElement('div'); dot.className='level-dot';
      if(i<lvl) dot.classList.add(maxed&&i===def.levels.length-1?'maxed':'filled');
      else if(i===lvl&&maxed) dot.classList.add('maxed');
      dotsWrap.appendChild(dot);
    }
    const meta=document.createElement('div'); meta.className='upgrade-meta';
    meta.innerHTML=`<span>Level ${lvl+1}/${def.levels.length}</span><span>${def.levels[lvl].label}</span>`;
    const btn=document.createElement('button'); btn.className='upgrade-btn';
    if(maxed){ btn.className+=' maxed'; btn.textContent='MAX LEVEL ⭐'; btn.disabled=true; }
    else{
      const next=def.levels[lvl+1];
      if(ppCoins>=next.cost){ btn.className+=' buy'; btn.textContent=`UPGRADE — ${next.cost} 🪙`; }
      else{ btn.className+=' buy'; btn.textContent=`${next.cost} 🪙 needed`; btn.disabled=true; }
      btn.onclick=()=>{
        if(ppCoins>=next.cost){ ppCoins-=next.cost; ppUpgrades[def.key]++; persist(); buildUpgradesUI(); updateMenuUI(); }
      };
    }
    card.appendChild(h3); card.appendChild(p); card.appendChild(dotsWrap); card.appendChild(meta); card.appendChild(btn);
    grid.appendChild(card);
  }
}

function buildSkinsUI(){
  document.getElementById('skinsCoinsLabel').textContent=ppCoins+' coins available';
  const grid=document.getElementById('skinsGrid'); grid.innerHTML='';
  for(const skin of SKIN_DEFS){
    const owned=ppSkinOwned.includes(skin.key)||skin.cost===0;
    const equipped=ppSkin===skin.key;
    const card=document.createElement('div'); card.className='skin-card'+(equipped?' equipped':'');
    // Preview canvas
    const previewCanvas=document.createElement('canvas'); previewCanvas.className='skin-preview'; previewCanvas.width=80; previewCanvas.height=50;
    const pc=previewCanvas.getContext('2d');
    pc.translate(50,25); pc.rotate(-0.1);
    drawPlaneSkinOnCtx(pc, skin.key, 3, 3, 3);
    const nameEl=document.createElement('div'); nameEl.className='skin-name'; nameEl.textContent=skin.name;
    const descEl=document.createElement('div'); descEl.className='skin-desc'; descEl.textContent=skin.desc;
    const btn=document.createElement('button');
    if(equipped){ btn.className='skin-btn equipped'; btn.textContent='✓ EQUIPPED'; btn.disabled=true; }
    else if(owned){ btn.className='skin-btn equip'; btn.textContent='EQUIP'; btn.onclick=()=>{ ppSkin=skin.key; persist(); buildSkinsUI(); }; }
    else if(ppCoins>=skin.cost){ btn.className='skin-btn buy'; btn.textContent='BUY — '+skin.cost+' 🪙'; btn.onclick=()=>{ if(ppCoins>=skin.cost){ ppCoins-=skin.cost; ppSkinOwned.push(skin.key); ppSkin=skin.key; persist(); buildSkinsUI(); updateMenuUI(); } }; }
    else{ btn.className='skin-btn buy'; btn.textContent=skin.cost+' 🪙'; btn.disabled=true; }
    card.appendChild(previewCanvas); card.appendChild(nameEl); card.appendChild(descEl); card.appendChild(btn);
    grid.appendChild(card);
  }
}

function drawPlaneSkinOnCtx(c, skin, flapsLvl, noseLvl, tailLvl){
  // Minimal version for preview - just call drawPlaneSkin with context swap
  const savedCtx=ctx;
  // We need to draw on c instead of ctx
  // Override temporarily
  const noseExtra=noseLvl*1.5, wingScale=1+flapsLvl*0.1, tailH=3+tailLvl*2, W2=16+flapsLvl*2;
  let bodyColor, wingTopColor, wingBotColor, accentColor;
  switch(skin){
    case 'notebook':  bodyColor='#e8f0ff'; wingTopColor='#d0e4ff'; wingBotColor='#c0d8ff'; accentColor='#3366cc'; break;
    case 'gold':      bodyColor='#f0d060'; wingTopColor='#e8c030'; wingBotColor='#c8a010'; accentColor='#8a6000'; break;
    case 'cardboard': bodyColor='#c8a060'; wingTopColor='#b89050'; wingBotColor='#a07840'; accentColor='#604020'; break;
    case 'receipt':   bodyColor='#f5f0e8'; wingTopColor='#ede8e0'; wingBotColor='#e0dcd4'; accentColor='#888'; break;
    case 'jh':        bodyColor='#cc1122'; wingTopColor='#aa0011'; wingBotColor='#880008'; accentColor='#ffd700'; break;
    case 'ea':        bodyColor='#1a2a4a'; wingTopColor='#142038'; wingBotColor='#0e1828'; accentColor='#ff7700'; break;
    default:          bodyColor='#f8f6f0'; wingTopColor='#eae6dc'; wingBotColor='#ddd8cc'; accentColor='#e84040'; break;
  }
  const H2=6*wingScale;
  c.fillStyle=wingTopColor; c.beginPath(); c.moveTo(20+noseExtra,0); c.lineTo(-W2,-H2); c.lineTo(-W2+3,0); c.fill();
  c.fillStyle=wingBotColor; c.beginPath(); c.moveTo(20+noseExtra,0); c.lineTo(-W2,H2*0.7); c.lineTo(-W2+3,0); c.fill();
  c.fillStyle=bodyColor; c.beginPath(); c.moveTo(20+noseExtra,0); c.lineTo(-W2+3,0); c.lineTo(-W2+3+2,-3); c.closePath(); c.fill();
  c.fillStyle=accentColor; c.beginPath(); c.moveTo(20+noseExtra,0); c.lineTo(16+noseExtra,-2); c.lineTo(16+noseExtra,2); c.fill();
  if(tailLvl>0){ c.fillStyle=accentColor; c.globalAlpha=0.7; c.beginPath(); c.moveTo(-W2+3,0); c.lineTo(-W2+3-6,-tailH); c.lineTo(-W2+3+2,0); c.fill(); c.globalAlpha=1; }
  if(skin==='jh'){ c.fillStyle='#ffd700'; c.font='bold 5px Arial'; c.textAlign='center'; c.fillText('JH',-2,2); }
  if(skin==='ea'){ c.fillStyle='#ff7700'; c.font='bold 5px Arial'; c.textAlign='center'; c.fillText('EA',-2,2); }
}

function buildMissionsUI(){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('missionsSubLabel').textContent='Daily missions — '+today;
  const list=document.getElementById('missionsList'); list.innerHTML='';
  for(const m of missionData.missions){
    const done=m.progress>=m.target;
    const card=document.createElement('div');
    card.className='mission-card'+(done?' done':'')+(m.claimed?' claimed':'');
    const progress=Math.min(1, m.progress/m.target);
    const progText=m.type==='newBest'||m.type==='maxPower'||m.type==='map'
      ? (done?'Done':'Not yet')
      : `${m.type==='dist'||m.type==='distNoRing'?Math.floor(m.progress):Math.floor(m.progress)}/${m.target}`;
    card.innerHTML=`
      <div class="mission-icon">${m.icon}</div>
      <div class="mission-info">
        <div class="mission-title">${m.desc}</div>
        <div class="mission-bar-wrap"><div class="mission-bar-fill" style="width:${progress*100}%"></div></div>
        <div class="mission-prog">${progText}${m.claimed?' — CLAIMED':''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="mission-reward">+${m.reward} 🪙</div>
        ${done&&!m.claimed?`<button class="mission-btn" data-id="${m.id}">CLAIM</button>`:''}
      </div>
    `;
    list.appendChild(card);
  }
  list.querySelectorAll('.mission-btn').forEach(btn=>{
    btn.onclick=()=>{
      const id=btn.dataset.id;
      const m=missionData.missions.find(x=>x.id===id);
      if(m&&m.progress>=m.target&&!m.claimed){ m.claimed=true; ppCoins+=m.reward; persist(); buildMissionsUI(); updateMenuUI(); }
    };
  });
}

// ── INPUT ──
function getXY(e){ if(e.touches) return {x:e.touches[0].clientX,y:e.touches[0].clientY}; return {x:e.clientX,y:e.clientY}; }

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); onDown(e); }, {passive:false});
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('touchmove', e=>{ e.preventDefault(); onMove(e); }, {passive:false});
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('touchend', e=>{ e.preventDefault(); onUp(e); }, {passive:false});

function onDown(e){
  const {x,y}=getXY(e);
  if(appState==='aim'){
    // Click anywhere to start aiming — no tiny hitbox required
    isDragging=true; dragSX=x; dragSY=y; aimX=x; aimY=y;
  }
  if(appState==='fly'){
    // Check sound toggle
    if(x>W-50&&y>H-50){ toggleSound(); return; }
    mouseX=x; mouseY=y;
  }
}

function onMove(e){
  const {x,y}=getXY(e);
  mouseX=x; mouseY=y;
  if(isDragging){ aimX=x; aimY=y; }
}

function onUp(e){
  if(isDragging && appState==='aim'){
    isDragging=false;
    const px=plane.x-camX, py=plane.y;
    // Direction: from plane TOWARD where you aimed (intuitive — point where you want to go)
    const dx=aimX-px, dy=aimY-py;
    const rawPow=Math.min(1, Math.hypot(dx,dy)/150);
    // Minimum power 0.55 so a simple click always launches forward-ish
    const power=rawPow<0.1 ? 0.55 : rawPow;
    const ang=rawPow<0.1 ? -0.18 : Math.atan2(dy,dx); // default: slight upward-right if no drag
    const stats=upgradeStats();
    const spd=(6+power*14)*stats.speedMult;
    plane.vx=Math.cos(ang)*spd;
    plane.vy=Math.sin(ang)*spd;
    plane.angle=ang;
    if(power>0.9){ maxPowerLaunched=true; showMsg('Full power!'); }
    appState='fly';
    playWhoosh();
    startWindSound();
    updateMissionProgress('maxPower', power>0.9?1:0);
  }
}

function toggleSound(){
  soundEnabled=!soundEnabled;
  persist();
  updateMenuUI();
}
